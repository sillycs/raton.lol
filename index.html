<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coming soon</title>
<link rel="icon" type="image/png" href="https://raton.wtf/img/RATA.png">

<style>
    body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #121212 0%, #000 70%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    .page {
        text-align: center;
        max-width: 620px;
        padding: 30px 20px;
        z-index: 2;
        transform: scale(0.95);
    }

    .notice {
        display: flex;
        gap: 10px;
        text-align: left;
        max-width: 600px;
        margin: 0 auto 25px auto;
        padding: 12px 14px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        font-size: 12px;
        color: rgba(255,255,255,0.7);
    }

    .headline {
        font-size: 24px;
        font-weight: 300;
        margin-bottom: 25px;
        color: rgba(255,255,255,0.92);
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .nav {
        display: flex;
        justify-content: center;
        gap: 30px;
    }

    .nav a {
        text-decoration: none;
        color: rgba(255,255,255,0.65);
        font-size: 14px;
        transition: 0.25s;
        position: relative;
    }

    .nav a:hover {
        color: #fff;
        transform: translateY(-3px);
    }

    .nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -5px;
        width: 0%;
        height: 1px;
        background: white;
        transition: 0.3s;
    }

    .nav a:hover::after {
        width: 100%;
    }
</style>
</head>

<body>

<div class="page">

<div class="notice">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0; margin-top:2px;">
        <path d="M12 2L1 21h22L12 2z" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none"/>
        <path d="M12 9v4" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M12 17h.01" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <span>This software is intended strictly for IT support and system administration purposes only.</span>
</div>

        We are doing big changes to the Raton brand
    </div>


    <div class="nav">
        <a href="/download">Download</a>
        <a href="/professional">Purchase</a>
        <a href="/blog">Blog</a>
    </div>

</div>

</body>
</html>
