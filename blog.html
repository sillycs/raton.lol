<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog</title>
<meta name="description" content="The latest from Raton: updates, guides, and community posts">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Raton">
<meta property="og:title" content="The Raton Forum">
<meta property="og:description" content="The latest from Raton: updates, guides, and community posts">
<meta property="og:image" content="https://raton.lol/img/RATA.png">
<meta property="og:url" content="https://raton.lol/blog">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="The Raton Forum">
<meta name="twitter:description" content="The latest from Raton: updates, guides, and community posts">
<meta name="twitter:image" content="https://raton.lol/img/RATA.png">
<link rel="icon" type="image/png" href="https://raton.lol/img/RATA.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/kunal" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/nishiki-teki" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;--surface3:#222;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --purple:#8b5cf6;--purple2:#a78bfa;--purple-dim:rgba(139,92,246,0.15);
  --text:#f4f4f8;--text2:#a0a0b8;--text3:#606078;
  --font-display:'Nishiki-teki',sans-serif;--font-logo:'kunal',sans-serif;--font-body:'DM Sans',sans-serif;
  --radius:14px;--upvote:#7ddc8b;--upvote-dim:rgba(125,220,139,0.15);
  --downvote:#ff8a8a;--downvote-dim:rgba(255,138,138,0.12);
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--purple),#5b21b6);border-radius:99px}
*{cursor:url('https://raton.lol/img/default.png') 0 0,auto}
a,button,[role="button"]{cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.6;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:64px;background:rgba(13,13,13,0.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:var(--font-logo);font-weight:800;font-size:1.5rem;color:var(--text);text-decoration:none}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
.nav-links a{text-decoration:none;color:var(--text2);font-size:0.875rem;font-weight:400;transition:color 0.2s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--purple2)}
.nav-auth{display:flex;align-items:center;gap:0.6rem;flex-shrink:0}
.nav-mobile-toggle{display:none;background:none;border:none;color:var(--text);padding:6px}

/* ── AUTH BUTTONS ── */
.auth-btn{display:inline-flex;align-items:center;gap:6px;padding:0.35rem 0.8rem;border-radius:8px;font-family:var(--font-body);font-size:0.75rem;font-weight:600;transition:.2s;border:none}
.auth-btn-outline{background:none;border:1px solid var(--border2);color:var(--text2)}
.auth-btn-outline:hover{border-color:var(--purple);color:var(--purple2);background:var(--purple-dim)}
.auth-btn-fill{background:var(--purple);color:#fff}
.auth-btn-fill:hover{background:#7c3aed}
.auth-btn-user{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.auth-btn-user:hover{border-color:var(--purple);color:var(--purple2)}
.auth-btn-logout{background:none;border:1px solid rgba(239,68,68,0.3);color:#ef4444}
.auth-btn-logout:hover{background:rgba(239,68,68,0.12)}

/* ── AUTH MODAL ── */
.auth-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s}
.auth-modal-backdrop.show{opacity:1;pointer-events:auto}
.auth-modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:2rem 2.2rem;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,0.6);transform:scale(0.94) translateY(10px);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.auth-modal-backdrop.show .auth-modal{transform:scale(1) translateY(0)}
.auth-modal-logo{display:flex;align-items:center;justify-content:center;margin-bottom:1.4rem}
.auth-modal-logo img{width:36px;height:36px;filter:drop-shadow(0 0 8px rgba(139,92,246,0.5))}
.auth-tabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:1.6rem;gap:2px}
.auth-tab{flex:1;padding:0.4rem;border-radius:8px;border:none;font-family:var(--font-body);font-size:0.8rem;font-weight:600;color:var(--text3);background:none;transition:.2s}
.auth-tab.active{background:var(--purple);color:#fff;box-shadow:0 2px 8px rgba(139,92,246,0.35)}
.auth-form{display:flex;flex-direction:column;gap:0.8rem}
.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:0.65rem 0.9rem;color:var(--text);font-family:var(--font-body);font-size:0.875rem;outline:none;transition:.2s}
.auth-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.auth-submit{background:var(--purple);color:#fff;border:none;border-radius:9px;padding:0.65rem;font-family:var(--font-body);font-size:0.875rem;font-weight:600;width:100%;transition:.2s}
.auth-submit:hover{background:#7c3aed}
.auth-submit:disabled{opacity:.5;pointer-events:none}
.auth-err{font-size:0.75rem;color:#fca5a5;text-align:center;min-height:1.1em}
.auth-ok{font-size:0.75rem;color:var(--upvote);text-align:center}
.auth-hint{font-size:0.7rem;color:var(--text3);text-align:center}
.auth-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text3);font-size:1.2rem;line-height:1;padding:4px;transition:color .2s}
.auth-close:hover{color:var(--text)}

/* ── BLOG ── */
.blog-hero{position:relative;padding:4rem 2rem 3rem;text-align:center;border-bottom:1px solid var(--border);overflow:hidden}
.blog-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 50% 0%,rgba(139,92,246,0.08) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--purple2);font-weight:600;margin-bottom:1rem}
.hero-eyebrow span{display:inline-block;width:18px;height:1px;background:var(--purple2)}
.blog-hero h1{font-family:var(--font-display);font-size:clamp(2.2rem,5vw,3.8rem);font-weight:900;letter-spacing:0.04em;color:var(--text);line-height:1.1;margin-bottom:0.8rem}
.blog-hero p{color:var(--text2);font-size:1rem;max-width:460px;margin:0 auto}
.broadcast-banner{position:relative;z-index:1;margin:0 2rem;margin-top:1.5rem;border-radius:12px;overflow:hidden}
.broadcast-banner-inner{display:flex;align-items:center;gap:12px;padding:0.85rem 1.2rem;font-size:0.875rem;line-height:1.4}
.broadcast-banner-icon{flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.broadcast-banner-icon svg{width:20px;height:20px}
.broadcast-banner-text{flex:1;color:inherit}
.live-warning-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.35s ease}
.live-warning-overlay.show{opacity:1;pointer-events:auto}
.live-warning-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px)}
.live-warning-box{position:relative;z-index:1;background:#fff;color:#0a0a0a;border-radius:16px;padding:2rem 2.4rem;max-width:520px;width:90%;box-shadow:0 32px 80px rgba(0,0,0,0.7);transform:scale(0.92) translateY(10px);transition:transform 0.35s cubic-bezier(.22,1,.36,1)}
.live-warning-overlay.show .live-warning-box{transform:scale(1) translateY(0)}
.live-warning-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:800;color:#6b7280;margin-bottom:0.6rem;display:flex;align-items:center;gap:6px}
.live-warning-label::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:#ef4444;animation:livePulse 1.2s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
.live-warning-msg{font-size:1.05rem;font-weight:500;line-height:1.5;color:#111}
.live-warning-timer{margin-top:1rem;font-size:0.72rem;color:#9ca3af}
.live-warning-bar{margin-top:0.5rem;height:3px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.live-warning-bar-fill{height:100%;background:#0a0a0a;border-radius:99px;transition:width linear}
.blog-wrap{flex:1;max-width:900px;width:100%;margin:0 auto;padding:3rem 2rem;display:flex;flex-direction:column;gap:2rem}
.search-bar-wrap{position:relative}
.search-bar-wrap svg{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:0.6rem 1rem 0.6rem 2.4rem;color:var(--text);font-family:var(--font-body);font-size:0.875rem;transition:.2s;outline:none}
.search-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.search-input::placeholder{color:var(--text3)}
.posts-grid{display:flex;flex-direction:column;gap:1.4rem}
.post-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;transition:border-color .25s,transform .25s,box-shadow .25s;text-decoration:none;display:block;cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer;position:relative}
.post-card.pinned .pin-badge{position:absolute;top:8px;right:8px;width:28px;height:28px;z-index:2;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.6));transform:rotate(8deg);transition:transform 0.2s}
.post-card.pinned:hover .pin-badge{transform:rotate(0deg) scale(1.1)}
.post-card:hover{border-color:rgba(139,92,246,0.4);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(139,92,246,0.15)}
.post-card-img-wrap{position:relative;width:100%;height:220px;overflow:hidden;border-bottom:1px solid var(--border)}
.post-card-img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:transform 0.35s ease}
.post-card:hover .post-card-img{transform:scale(1.04)}
.post-card-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background 0.25s}
.post-card-img-overlay span{opacity:0;transform:translateY(6px);transition:opacity 0.2s,transform 0.2s;background:rgba(0,0,0,0.72);color:#fff;font-size:0.78rem;font-weight:600;letter-spacing:0.06em;padding:0.4rem 0.9rem;border-radius:99px;border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(4px);display:flex;align-items:center;gap:6px}
.post-card:hover .post-card-img-overlay{background:rgba(0,0,0,0.28)}
.post-card:hover .post-card-img-overlay span{opacity:1;transform:translateY(0)}
.post-card-body{padding:1.4rem 1.6rem 1.2rem}
.post-meta{display:flex;align-items:center;gap:0.75rem;font-size:0.72rem;color:var(--text3);letter-spacing:0.06em;margin-bottom:0.6rem;flex-wrap:wrap}
.post-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}
.post-tag{padding:0.15rem 0.55rem;border-radius:99px;background:var(--purple-dim);border:1px solid rgba(139,92,246,0.25);color:var(--purple2);font-size:0.67rem;font-weight:600;letter-spacing:0.08em}
.post-card h2{font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:0.4rem;letter-spacing:0.02em;line-height:1.25}
.post-card p{color:var(--text2);font-size:0.875rem;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-card-footer{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.6rem;border-top:1px solid var(--border)}
.post-stats{display:flex;align-items:center;gap:1.2rem}
.stat{display:flex;align-items:center;gap:5px;font-size:0.78rem;color:var(--text3)}
.like-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;font-size:0.78rem;color:var(--text3);transition:.2s;padding:4px 8px;border-radius:8px}
.like-btn:hover{color:var(--purple2);background:var(--purple-dim)}
.like-btn.liked{color:var(--purple2)}
.like-btn.liked svg{fill:var(--purple2)}
.pagination{display:flex;gap:0.5rem;justify-content:center;align-items:center}
.page-btn{padding:0.45rem 0.9rem;border-radius:9px;background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--text2);font-size:0.82rem;font-weight:500;transition:.2s}
.page-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.page-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.page-btn:disabled{opacity:.35;pointer-events:none}
.single-wrap{max-width:720px;margin:0 auto;padding:3rem 2rem;width:100%}
.post-back{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text3);text-decoration:none;margin-bottom:2rem;transition:color .2s}
.post-back:hover{color:var(--text)}
.single-header{margin-bottom:2rem}
.single-header h1{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:0.03em;color:var(--text);line-height:1.15;margin-bottom:0.8rem}
.single-header .post-meta{margin-bottom:0}
.single-hero-img-wrap{position:relative;width:100%;height:420px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:2rem}
.single-hero-img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:transform 0.35s ease}
.single-hero-img-wrap:hover .single-hero-img{transform:scale(1.03)}
.single-hero-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:flex-end;justify-content:flex-end;padding:1rem;transition:background 0.25s}
.single-hero-img-overlay span{opacity:0;transform:translateY(4px);transition:opacity 0.2s,transform 0.2s;background:rgba(0,0,0,0.72);color:#fff;font-size:0.75rem;font-weight:600;letter-spacing:0.06em;padding:0.35rem 0.8rem;border-radius:99px;border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(4px);display:flex;align-items:center;gap:5px}
.single-hero-img-wrap:hover .single-hero-img-overlay{background:rgba(0,0,0,0.2)}
.single-hero-img-wrap:hover .single-hero-img-overlay span{opacity:1;transform:translateY(0)}
.post-body{color:var(--text2);line-height:1.8;font-size:1rem}
.post-body p{margin-bottom:1.1em}
.post-body h2{font-family:var(--font-display);color:var(--text);font-size:1.4rem;font-weight:800;margin:1.8em 0 0.6em}
.post-body h3{color:var(--text);font-size:1.1rem;font-weight:600;margin:1.4em 0 0.4em}
.post-body img{max-width:100%;border-radius:10px;border:1px solid var(--border);margin:1rem 0}
.post-body a{color:var(--purple2);text-decoration:underline;text-underline-offset:3px}
.post-body code{background:var(--surface2);padding:0.1em 0.4em;border-radius:5px;font-size:0.85em}
.post-body pre{background:var(--surface2);padding:1.2rem;border-radius:12px;overflow-x:auto;border:1px solid var(--border);margin:1rem 0}
.post-body ul{padding-left:1.4em;margin:.6em 0;color:var(--text2)}
.post-body ul li{margin-bottom:.25em;line-height:1.7}
.post-actions{display:flex;align-items:center;gap:1rem;padding:1.2rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:2.5rem 0}
.action-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:10px;padding:0.5rem 1rem;font-size:0.82rem;font-weight:500;color:var(--text2);transition:.2s}
.action-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.action-btn.liked{background:var(--purple-dim);border-color:var(--purple);color:var(--purple2)}
.action-btn.liked svg{fill:var(--purple2)}
.action-btn:disabled{opacity:0.5;pointer-events:none}
.footer-note{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1rem;font-size:0.72rem;color:var(--text3);text-decoration:none;padding-top:0.5rem}
.footer-note:hover{color:var(--text2)}
.locked-notice{display:flex;align-items:center;gap:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:0.7rem 1rem;font-size:0.82rem;color:#f59e0b;margin-bottom:1.2rem}
.comments-section{margin-top:0.5rem}
.comments-section h3{font-family:var(--font-display);font-size:1.1rem;font-weight:800;letter-spacing:0.04em;color:var(--text);margin-bottom:1.4rem}
.comment-form{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:1.2rem;margin-bottom:1.6rem}
.form-row{display:flex;gap:0.7rem;margin-bottom:0.7rem}
.form-row input{flex:1}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:0.6rem 0.9rem;color:var(--text);font-family:var(--font-body);font-size:0.875rem;transition:.2s;outline:none}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.form-input[readonly]{opacity:0.7;background:var(--surface3)}
.form-textarea{min-height:80px;resize:vertical}
.form-row-submit{display:flex;justify-content:flex-end;margin-top:0.7rem}
.submit-btn{display:inline-flex;align-items:center;gap:7px;background:var(--purple);color:#fff;border:none;border-radius:9px;padding:0.5rem 1.2rem;font-family:var(--font-body);font-size:0.82rem;font-weight:600;transition:.2s}
.submit-btn:hover{background:#7c3aed;transform:translateY(-1px)}
.submit-btn:disabled{opacity:.5;pointer-events:none}
.comment-list{display:flex;flex-direction:column;gap:1rem}

/* ── PINNED COMMENT ── */
.comment.pinned-comment{border-color:rgba(139,92,246,0.4);background:rgba(139,92,246,0.04)}
.pinned-comment-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;color:var(--purple2);background:var(--purple-dim);border:1px solid rgba(139,92,246,0.25);border-radius:99px;padding:1px 7px;margin-left:6px}

.comment{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;position:relative;overflow:visible}
.comment.deleted{opacity:.55}
.comment.ragebait{background:#f5eedf!important;border-color:rgba(180,140,60,0.35)!important;color:#2a2010}
.comment.ragebait .comment-name{color:#2a2010}
.comment.ragebait .comment-body{color:#4a3c20}
.comment.ragebait .comment-ts{color:#7a6840}
.comment.ragebait .comment-upvote,.comment.ragebait .comment-downvote,.comment.ragebait .reply-toggle,.comment.ragebait .reaction-picker-btn{color:#7a6840}
.comment.ragebait .comment-avatar{background:none!important;border:none!important}
.comment.ragebait::after{content:'';position:absolute;top:-14px;right:-14px;width:28px;height:28px;background:url('https://raton.lol/img/clown.png') center/contain no-repeat;animation:ragebaitSpin 3s linear infinite;pointer-events:none;z-index:5;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4))}
@keyframes ragebaitSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.comment.administrator{background:rgba(139,92,246,0.07)!important;border-color:rgba(139,92,246,0.35)!important}
.comment.administrator .comment-name{color:var(--purple2)}
.comment.administrator .comment-body{color:#c4b8f0}
.comment.administrator .comment-ts{color:#7060a8}
.comment.administrator::after{content:'';position:absolute;top:-14px;right:-14px;width:28px;height:28px;background:url('https://raton.lol/img/RATA.png') center/contain no-repeat;animation:ragebaitSpin 2.5s linear infinite;pointer-events:none;z-index:5;filter:drop-shadow(0 0 6px rgba(139,92,246,0.7)) brightness(1.1)}
.comment.reply{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.05);border-radius:10px;margin-top:0.7rem;margin-left:1.5rem;padding:0.8rem 1rem}

let currentUser = null; // { username, tag, sessionToken, sessionExpiresAt }

function getStoredSession() {
  try {
    const raw = localStorage.getItem('raton_session');
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s.token || !s.expiresAt || Date.now() > s.expiresAt) { clearStoredSession(); return null; }
    return s;
  } catch(_) { return null; }
}
function saveStoredSession(token, username, tag, expiresAt) {
  localStorage.setItem('raton_session', JSON.stringify({ token, username, tag, expiresAt }));
  setCookie('_rsession', token, 90);
}
function clearStoredSession() {
  localStorage.removeItem('raton_session');
  setCookie('_rsession', '', -1);
}

function renderNavAuth() {

async function doLogout() {
  const s = getStoredSession();
  if (s) {

async function submitLogin() {

  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginSubmitBtn');
  errEl.textContent = '';

      setTimeout(() => newCaptcha('captchaCanvas-main','captchaInput-main','main'), 100);
    }

}

async function submitRegister() {

async function newCaptcha(canvasId, inputId, formId) {
  const canvas = document.getElementById(canvasId);

  let tokenData = null;
  try {
    const res = await fetch(WORKER + '/captcha/new', { headers: { 'X-Client-FP': CLIENT_FP } });
    tokenData = await res.json();
  } catch(_) { return null; }

  const charW = W/(CAPTCHA_LEN+0.8);
  for(let i=0;i<chars.length;i++){const ch=chars[i],cx=charW*(i+0.7),cy=H/2+rnd(-3,3);ctx.save();ctx.translate(cx,cy);ctx.rotate((Math.random()*36-18)*Math.PI/180);const sc=0.82+Math.random()*0.28;ctx.scale(sc,sc+(Math.random()-0.5)*0.18);const fs=rnd(20,27);ctx.font=`bold ${fs}px 'Courier New',monospace`;ctx.textBaseline='middle';ctx.textAlign='center';const hue=rnd(240,310),sat=rnd(60,90),lig=rnd(68,85);ctx.fillStyle=`hsl(${hue},${sat}%,${lig}%)`;ctx.shadowColor=`hsla(${hue},${sat}%,30%,0.7)`;ctx.shadowBlur=3;ctx.shadowOffsetX=1;ctx.shadowOffsetY=1;ctx.fillText(ch,0,0);ctx.restore()}

  for(let i=0;i<4;i++){const tx=rnd(10,W-10),ty=rnd(6,H-6),dc=CAPTCHA_CHARS[rnd(0,CAPTCHA_CHARS.length-1)];ctx.save();ctx.translate(tx,ty);ctx.rotate((Math.random()*60-30)*Math.PI/180);ctx.font=`bold ${rnd(8,14)}px 'Courier New',monospace`;ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillStyle=`rgba(${rnd(100,200)},${rnd(80,160)},${rnd(180,255)},${(Math.random()*0.22+0.10).toFixed(2)})`;ctx.fillText(dc,0,0);ctx.restore()}
  const ov=ctx.createLinearGradient(0,0,W,H);ov.addColorStop(0,'rgba(80,40,160,0.06)');ov.addColorStop(0.5,'rgba(200,100,255,0.04)');ov.addColorStop(1,'rgba(40,80,200,0.06)');ctx.fillStyle=ov;ctx.fillRect(0,0,W,H);

function getFingerprint(){
  const stored=sessionStorage.getItem('_rfp')||localStorage.getItem('_rfp');if(stored)return stored;
  const canvas=document.createElement('canvas'),gl=canvas.getContext('webgl'),glInfo=gl?gl.getParameter(gl.RENDERER)+gl.getParameter(gl.VENDOR):'';
  const data=[navigator.userAgent,navigator.language,screen.width+'x'+screen.height+'x'+screen.colorDepth,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.deviceMemory||0,glInfo,navigator.platform||''].join('|');
  let hash=0;for(let i=0;i<data.length;i++){hash=((hash<<5)-hash)+data.charCodeAt(i);hash|=0}
  const fp=Math.abs(hash).toString(36)+Date.now().toString(36).slice(-4);localStorage.setItem('_rfp',fp);sessionStorage.setItem('_rfp',fp);return fp;
}
function getSessionId(){let sid=getCookie('_rsid')||localStorage.getItem('_rsid');if(!sid){sid=Math.random().toString(36).slice(2)+Date.now().toString(36);setCookie('_rsid',sid,90);localStorage.setItem('_rsid',sid)}return sid}
function setCookie(name,val,days){const exp=new Date(Date.now()+days*864e5).toUTCString();document.cookie=`${name}=${val};expires=${exp};path=/;SameSite=Lax`}
function getCookie(name){return document.cookie.split('; ').reduce((r,c)=>{const[k,v]=c.split('=');return k===name?v:r},null)}

async function loadIdentity(){
  // First try session token from storage
  const stored = getStoredSession();
  if (stored) {
    try {
      showLoading('Resuming session...');
      const data = await fetch(WORKER+'/auth/me?token='+encodeURIComponent(stored.token), {
        headers:{'X-Client-FP':CLIENT_FP,'X-Session-Token':stored.token}
      }).then(r=>r.json());
      if (data.ok && data.authenticated && data.user) {
        currentUser = { username: data.user.username, tag: data.user.tag, sessionToken: stored.token };
        commentAuthorName = data.user.username;
        identityBoundName = data.user.username;
        saveAuthorName(data.user.username);
        hideLoading();
        return;
      } else {
        clearStoredSession();
      }
    } catch(_) { clearStoredSession(); }
    finally { hideLoading(); }
  }
  // Fall back to IP/FP binding
  try {
    showLoading('Checking identity...');
    const data = await api('/my-identity');
    if(data.ok&&data.name){identityBoundName=data.name;commentAuthorName=data.name;saveAuthorName(data.name)}
    else{if(commentAuthorName&&!data.name){saveAuthorName('');identityBoundName=null}}
  } catch(_) {}
  finally{hideLoading()}
}

async function dislikeComment(e,postId,type,commentId,replyId){e.stopPropagation();showLoading('Sending...');const body={postId,type,commentId};if(replyId)body.replyId=replyId;const data=await api('/dislike',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});hideLoading();if(!data.ok){showToast(data.error,true);return}const lKey=type==='reply'?`r:${replyId}`:`c:${commentId}`;dislikedComments[lKey]=data.disliked;saveDislikedComments();const btnId=type==='reply'?`dlbtn-${replyId}`:`dlbtn-${commentId}`,countId=type==='reply'?`dl-${replyId}`:`dl-${commentId}`,btn=document.getElementById(btnId),countEl=document.getElementById(countId);if(btn){btn.classList.toggle('downvoted',data.disliked);const svg=btn.querySelector('svg');if(svg)svg.setAttribute('fill',data.disliked?'currentColor':'none')}if(countEl)countEl.textContent=data.count;showToast(data.disliked?' Downvoted':'Removed downvote')}

let _mentionState={};
function handleMentionInput(textarea,dropdownId){const val=textarea.value,cursor=textarea.selectionStart,textBefore=val.slice(0,cursor),match=textBefore.match(/@(\w*)$/),dropdown=document.getElementById(dropdownId);if(!dropdown)return;if(!match){dropdown.classList.remove('open');_mentionState[dropdownId]=null;return}const query=match[1].toLowerCase(),results=knownCommenters.filter(n=>n.toLowerCase().includes(query)&&n!==(identityBoundName||commentAuthorName)).slice(0,6);if(!results.length){dropdown.classList.remove('open');_mentionState[dropdownId]=null;return}_mentionState[dropdownId]={results,selected:0,query,start:cursor-match[0].length};dropdown.innerHTML=results.map((n,i)=>`<div class="mention-item${i===0?' selected':''}" data-idx="${i}" onmousedown="insertMention(event,'${dropdownId}')"><div class="mention-item-avatar">${n[0].toUpperCase()}</div><span>@${escHtml(n)}</span></div>`).join('');dropdown.classList.add('open')}
function handleMentionKeydown(e,textarea,dropdownId){const state=_mentionState[dropdownId],dropdown=document.getElementById(dropdownId);if(!dropdown||!state||!dropdown.classList.contains('open'))return;if(e.key==='ArrowDown'){e.preventDefault();state.selected=Math.min(state.selected+1,state.results.length-1);updateMentionSelection(dropdown,state.selected)}else if(e.key==='ArrowUp'){e.preventDefault();state.selected=Math.max(state.selected-1,0);updateMentionSelection(dropdown,state.selected)}else if(e.key==='Enter'||e.key==='Tab'){if(dropdown.classList.contains('open')){e.preventDefault();commitMention(textarea,dropdownId,state.results[state.selected])}}else if(e.key==='Escape'){dropdown.classList.remove('open');_mentionState[dropdownId]=null}}
function updateMentionSelection(dropdown,idx){dropdown.querySelectorAll('.mention-item').forEach((el,i)=>el.classList.toggle('selected',i===idx))}
function insertMention(e,dropdownId){e.preventDefault();const idx=parseInt(e.currentTarget.dataset.idx),state=_mentionState[dropdownId];if(!state)return;const textareaId=dropdownId.replace('-autocomplete',''),textarea=document.getElementById(textareaId);if(!textarea)return;commitMention(textarea,dropdownId,state.results[idx])}
function commitMention(textarea,dropdownId,name){const state=_mentionState[dropdownId];if(!state)return;const val=textarea.value,before=val.slice(0,state.start),after=val.slice(textarea.selectionStart);textarea.value=before+'@'+name+' '+after;const newCursor=before.length+name.length+2;textarea.setSelectionRange(newCursor,newCursor);textarea.focus();const dropdown=document.getElementById(dropdownId);if(dropdown)dropdown.classList.remove('open');_mentionState[dropdownId]=null}
function setupMentionAutocomplete(){document.addEventListener('click',e=>{if(!e.target.closest('.textarea-wrap'))document.querySelectorAll('.mention-autocomplete.open').forEach(d=>d.classList.remove('open'))},{capture:true})}
function renderCommentBody(body){if(!body)return'';return escHtml(body).replace(/@(\w+)/g,(match,name)=>`<span class="mention">@${escHtml(name)}</span>`)}

const UPVOTE_SVG_ON=`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>`;
const UPVOTE_SVG_OFF=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>`;
const DOWNVOTE_SVG_ON=`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;
const DOWNVOTE_SVG_OFF=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;

function commentHTML(c,postId,allComments,locked){
  const isDeleted=c.deleted,cLiked=likedComments[`c:${c.id}`],cDisliked=dislikedComments[`c:${c.id}`],replies=(c.replies||[]),canInteract=!isDeleted&&!c.hardDeleted,isRagebait=!!c.rageBait,isAdmin=!isDeleted&&c.userTag==='developer',isPinned=!!c.pinned;
  const avatarContent=getAvatarHTML(c.name,isDeleted,isRagebait,c.userTag);
  const pinnedBadge=isPinned?`<span class="pinned-comment-badge"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17z"/></svg>Pinned</span>`:''
  return`<div class="comment ${isDeleted?'deleted':''} ${isRagebait?'ragebait':''} ${isAdmin?'administrator':''} ${isPinned?'pinned-comment':''}" id="comment-${c.id}"><div class="comment-header"><div class="comment-avatar">${avatarContent}</div><span class="comment-name">${escHtml(isDeleted?'deleted':c.name)}${!isDeleted?tagBadge(c.userTag,c.name):''}${c.authenticated&&!isDeleted?'<span class="authenticated-badge">✓ registered</span>':''}${pinnedBadge}</span>${c.editedByAdmin&&!isDeleted?`<span class="comment-edited">[edited by a moderator]</span>`:''}<span class="comment-ts">${timeAgo(c.ts)}</span></div><div class="comment-body ${isDeleted?'deleted-msg':''}">${isDeleted?escHtml(c.body):renderCommentBody(c.body)}</div><div class="comment-actions">${canInteract?`<button class="comment-upvote ${cLiked?'upvoted':''}" id="clbtn-${c.id}" onclick="likeComment(event,'${postId}','comment','${c.id}')">${cLiked?UPVOTE_SVG_ON:UPVOTE_SVG_OFF}<span id="cl-${c.id}">${c.likes||0}</span></button><button class="comment-downvote ${cDisliked?'downvoted':''}" id="dlbtn-${c.id}" onclick="dislikeComment(event,'${postId}','comment','${c.id}')">${cDisliked?DOWNVOTE_SVG_ON:DOWNVOTE_SVG_OFF}<span id="dl-${c.id}">${c.dislikes||0}</span></button>${reactionsHTML(c.id,'comment',null,c.reactions||{})}`:''}`+(canInteract&&!locked?`<button class="reply-toggle" onclick="toggleReplyForm('${c.id}','${postId}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>Reply</button>`:'')+`</div><div id="replyForm-${c.id}"></div>${replies.length?`<div class="reply-list" id="replies-${c.id}">${replies.map(r=>replyHTML(r,c.id,postId,locked)).join('')}</div>`:`<div id="replies-${c.id}"></div>`}</div>`
}

function replyHTML(r,parentId,postId,locked){
  const isDeleted=r.deleted,rLiked=likedComments[`r:${r.id}`],rDisliked=dislikedComments[`r:${r.id}`],canInteract=!isDeleted&&!r.hardDeleted,isRagebait=!!r.rageBait,isAdmin=!isDeleted&&r.userTag==='developer';
  const avatarContent=getAvatarHTML(r.name,isDeleted,isRagebait,r.userTag);
  return`<div class="comment reply ${isDeleted?'deleted':''} ${isRagebait?'ragebait':''} ${isAdmin?'administrator':''}" id="reply-${r.id}"><div class="comment-header"><div class="comment-avatar" style="width:20px;height:20px;font-size:0.6rem">${avatarContent}</div><span class="comment-name">${escHtml(isDeleted?'deleted':r.name)}${!isDeleted?tagBadge(r.userTag,r.name):''}${r.authenticated&&!isDeleted?'<span class="authenticated-badge">✓ registered</span>':''}</span>${r.editedByAdmin&&!isDeleted?`<span class="comment-edited">[edited by a moderator]</span>`:''}<span class="comment-ts">${timeAgo(r.ts)}</span></div><div class="comment-body ${isDeleted?'deleted-msg':''}">${isDeleted?escHtml(r.body):renderCommentBody(r.body)}</div><div class="comment-actions">${canInteract?`${reactionsHTML(r.id,'reply',parentId,r.reactions||{})}<button class="comment-upvote ${rLiked?'upvoted':''}" id="rlbtn-${r.id}" onclick="likeComment(event,'${postId}','reply','${parentId}','${r.id}')">${rLiked?UPVOTE_SVG_ON:UPVOTE_SVG_OFF}<span id="rl-${r.id}">${r.likes||0}</span></button><button class="comment-downvote ${rDisliked?'downvoted':''}" id="dlbtn-${r.id}" onclick="dislikeComment(event,'${postId}','reply','${parentId}','${r.id}')">${rDisliked?DOWNVOTE_SVG_ON:DOWNVOTE_SVG_OFF}<span id="dl-${r.id}">${r.dislikes||0}</span></button>`:''}</div></div>`
}

function handleNameInput(val){if(!identityBoundName&&!currentUser)commentAuthorName=val}
function clearName(e){e&&e.preventDefault();if(identityBoundName||currentUser){showToast('The name is yours',true);return}saveAuthorName('');const postId=currentPostId;if(postId){api(`/comments?postId=${postId}`).then(cData=>{const isLocked=!!document.querySelector('.locked-notice');document.getElementById('commentsSection').innerHTML=renderCommentsHTML(cData.comments||[],postId,isLocked);setupDeveloperRain();setupMentionAutocomplete();setTimeout(()=>newCaptcha('captchaCanvas-main','captchaInput-main','main'),100)})}}

function toggleReplyForm(commentId,postId){const el=document.getElementById(`replyForm-${commentId}`);if(el.innerHTML){el.innerHTML='';return}const savedName=identityBoundName||commentAuthorName,nameIsLocked=!!(identityBoundName||currentUser),taId=`rBody-${commentId}`,acId=`${taId}-autocomplete`,replyFormId=`reply-${commentId}`;el.innerHTML=`<div class="reply-form"><div class="form-row"><input class="form-input" id="rName-${commentId}" placeholder="Your name" maxlength="32" value="${escHtml(savedName)}" ${nameIsLocked?'readonly':''} oninput="${nameIsLocked?'':'commentAuthorName=this.value'}"></div>${savedName?`<p class="name-locked-hint">Replying as <strong>${escHtml(savedName)}</strong>${nameIsLocked?' (Your name)':''}</p>`:''}<div class="textarea-wrap"><textarea class="form-input form-textarea" id="${taId}" placeholder="Write a reply... Use @name to mention someone" style="min-height:60px" maxlength="500" oninput="handleMentionInput(this,'${acId}')" onkeydown="handleMentionKeydown(event,this,'${acId}')"></textarea><div class="mention-autocomplete" id="${acId}"></div></div>${captchaHTML(replyFormId)}<div class="form-row-submit"><button class="submit-btn" id="replyBtn-${commentId}" onclick="submitComment('${commentId}','${postId}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>Reply</button></div></div>`;setTimeout(()=>newCaptcha(`captchaCanvas-${replyFormId}`,`captchaInput-${replyFormId}`,replyFormId),80)}

async function submitComment(parentId,postId){
  const nameEl=document.getElementById(parentId?`rName-${parentId}`:'cName'),bodyEl=document.getElementById(parentId?`rBody-${parentId}`:'cBody'),btnEl=document.getElementById(parentId?`replyBtn-${parentId}`:'submitCommentBtn');
  const formId=parentId?`reply-${parentId}`:'main';
  const name=(currentUser?currentUser.username:identityBoundName||nameEl?.value||'').trim();
  const body=bodyEl?.value.trim();
  if(!name||name.length<2){showToast('Name must be at least 2 characters',true);return}
  if(!body||body.length<2){showToast('Comment must be at least 2 characters',true);return}
  const captchaPayload=getCaptchaPayload(formId);
  if(!captchaPayload){showToast('Please complete the captcha',true);document.getElementById(`captchaInput-${formId}`)?.focus();return}
  if(btnEl){btnEl.disabled=true;btnEl.textContent='Checking...'}
  showLoading('Checking name availability...');
  const nameCheck=await api('/check-name',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({postId,name})});
  if(!nameCheck.ok){hideLoading();if(btnEl){btnEl.disabled=false;btnEl.innerHTML=parentId?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg> Reply':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Post Comment'}showToast(nameCheck.error,true);return}
  if(btnEl)btnEl.textContent='Posting...';
  showLoading('Posting comment...');
  const data=await api('/comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({postId,name,body,parentId,...captchaPayload})});
  hideLoading();
  if(btnEl){btnEl.disabled=false;btnEl.innerHTML=parentId?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg> Reply':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Post Comment'}
  if(data.captchaFailed){markCaptchaError(formId);showToast('Wrong captcha — try again',true);return}
  if(!data.ok){showToast(data.error,true);return}
  markCaptchaOk(formId);
  if(!currentUser){identityBoundName=name;saveAuthorName(name)}
  showToast('Comment posted!');
  showLoading('Refreshing comments...');
  const cData=await api(`/comments?postId=${postId}`);
  hideLoading();
  knownCommenters=collectCommenters(cData.comments||[]);
  const isLocked=!!document.querySelector('.locked-notice');
  document.getElementById('commentsSection').innerHTML=renderCommentsHTML(cData.comments||[],postId,isLocked);
  setupDeveloperRain();setupMentionAutocomplete();
  setTimeout(()=>newCaptcha('captchaCanvas-main','captchaInput-main','main'),100);
}

async function likeComment(e,postId,type,commentId,replyId){e.stopPropagation();showLoading('Sending...');const body={postId,type,commentId};if(replyId)body.replyId=replyId;const data=await api('/like',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});hideLoading();if(!data.ok){showToast(data.error,true);return}const lKey=type==='reply'?`r:${replyId}`:`c:${commentId}`;likedComments[lKey]=data.liked;saveLikedComments();const btnId=type==='reply'?`rlbtn-${replyId}`:`clbtn-${commentId}`,countId=type==='reply'?`rl-${replyId}`:`cl-${commentId}`,btn=document.getElementById(btnId);if(btn){btn.classList.toggle('upvoted',data.liked);btn.innerHTML=(data.liked?UPVOTE_SVG_ON:UPVOTE_SVG_OFF)+`<span id="${countId}">${data.count}</span>`}showToast(data.liked?' Upvoted':'Removed upvote')}

async function likePostSingle(id){const btn=document.getElementById('post-like-btn');if(btn)btn.disabled=true;await doLikePostSingle(id,null);if(btn)btn.disabled=false}
async function doLikePostSingle(id,captchaPayload){showLoading('Sending like...');const body={postId:id,type:'post',...(captchaPayload||{})};const data=await api('/like',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});hideLoading();if(data.needsCaptcha){showCaptchaModal("Too many likes too fast — prove you're human 🐭",async(cp)=>{await doLikePostSingle(id,cp)});return}if(data.captchaFailed){markCaptchaError('modal');showToast('Wrong captcha, try again',true);return}if(!data.ok){showToast(data.error,true);return}likedPosts[id]=data.liked;saveLikedPosts();const cnt=document.getElementById('single-lc'),btn=document.getElementById('post-like-btn');if(btn){btn.classList.toggle('liked',data.liked);const svg=btn.querySelector('svg');if(svg)svg.setAttribute('fill',data.liked?'currentColor':'none')}if(cnt)cnt.textContent=data.count;showToast(data.liked?' Liked':'Unliked')}

function goList(e){e&&e.preventDefault();currentPostId=null;currentPostAuthor=null;allPostsCache=[];setUrl({post:null,page:null});renderList();scrollTo({top:0})}

function inlineFormat(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')}
function renderMarkdown(md){if(!md)return'';let s=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>');s=s.replace(/((?:^- .+\n?)+)/gm,block=>{const items=block.split('\n').filter(l=>l.trim().startsWith('- ')).map(l=>`<li>${l.replace(/^- /,'').trim()}</li>`).join('');return`<ul style="margin:.5em 0 .8em 1.4em;padding:0">${items}</ul>\n`});s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');const blocks=s.split(/\n{2,}/);return blocks.map(block=>{const trimmed=block.trim();if(!trimmed)return'';if(/^<(h[1-6]|ul|ol|li|pre|blockquote)[\s>]/.test(trimmed))return trimmed;return'<p>'+trimmed.replace(/\n/g,'<br>')+'</p>'}).filter(Boolean).join('\n')}
function escHtml(s){if(typeof s!=='string')return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

route();
setupDeveloperRain();
