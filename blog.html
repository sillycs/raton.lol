<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog</title>
<link rel="icon" type="image/png" href="https://raton.lol/img/RATA.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/kunal" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/nishiki-teki" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --surface:#141414;
  --surface2:#1c1c1c;
  --surface3:#222;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --purple-dim:rgba(139,92,246,0.15);
  --text:#f4f4f8;
  --text2:#a0a0b8;
  --text3:#606078;
  --font-display:'Nishiki-teki',sans-serif;
  --font-logo:'kunal',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --radius:14px;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--purple),#5b21b6);border-radius:99px}
*{cursor:url('https://raton.lol/img/default.png') 0 0,auto}
a,button,[role="button"]{cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 3rem;height:64px;
  background:rgba(13,13,13,0.88);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-logo);font-weight:800;
  font-size:1.5rem;color:var(--text);text-decoration:none;
}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
.nav-links a{
  text-decoration:none;color:var(--text2);
  font-size:0.875rem;font-weight:400;transition:color 0.2s;
}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--purple2)}
.nav-mobile-toggle{display:none;background:none;border:none;color:var(--text);padding:6px}
.blog-hero{
  position:relative;
  padding:4rem 2rem 3rem;
  text-align:center;
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.blog-hero::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 70% at 50% 0%,rgba(139,92,246,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--purple2);font-weight:600;margin-bottom:1rem;
}
.hero-eyebrow span{display:inline-block;width:18px;height:1px;background:var(--purple2)}
.blog-hero h1{
  font-family:var(--font-display);
  font-size:clamp(2.2rem,5vw,3.8rem);
  font-weight:900;letter-spacing:0.04em;
  color:var(--text);line-height:1.1;
  margin-bottom:0.8rem;
}
.blog-hero p{color:var(--text2);font-size:1rem;max-width:460px;margin:0 auto;}
.broadcast-banner{
  position:relative;z-index:1;
  margin:0 2rem;
  margin-top:1.5rem;
  border-radius:12px;
  overflow:hidden;
}
.broadcast-banner-inner{
  display:flex;align-items:center;gap:12px;
  padding:0.85rem 1.2rem;
  font-size:0.875rem;
  line-height:1.4;
}
.broadcast-banner-icon{
  flex-shrink:0;
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
}
.broadcast-banner-icon svg{width:20px;height:20px}
.broadcast-banner-text{flex:1;color:inherit}
.live-warning-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:9000;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.35s ease;
}
.live-warning-overlay.show{
  opacity:1;
  pointer-events:auto;
}
.live-warning-backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(6px);
}
.live-warning-box{
  position:relative;z-index:1;
  background:#fff;
  color:#0a0a0a;
  border-radius:16px;
  padding:2rem 2.4rem;
  max-width:520px;
  width:90%;
  box-shadow:0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.1);
  transform:scale(0.92) translateY(10px);
  transition:transform 0.35s cubic-bezier(.22,1,.36,1);
}
.live-warning-overlay.show .live-warning-box{
  transform:scale(1) translateY(0);
}
.live-warning-label{
  font-size:0.65rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  font-weight:800;
  color:#6b7280;
  margin-bottom:0.6rem;
  display:flex;align-items:center;gap:6px;
}
.live-warning-label::before{
  content:'';
  display:inline-block;
  width:7px;height:7px;
  border-radius:50%;
  background:#ef4444;
  animation:livePulse 1.2s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
.live-warning-msg{
  font-size:1.05rem;
  font-weight:500;
  line-height:1.5;
  color:#111;
}
.live-warning-timer{
  margin-top:1rem;
  font-size:0.72rem;
  color:#9ca3af;
}
.live-warning-bar{
  margin-top:0.5rem;
  height:3px;
  background:#e5e7eb;
  border-radius:99px;
  overflow:hidden;
}
.live-warning-bar-fill{
  height:100%;
  background:#0a0a0a;
  border-radius:99px;
  transition:width linear;
}
.blog-wrap{
  flex:1;max-width:900px;width:100%;
  margin:0 auto;padding:3rem 2rem;
  display:flex;flex-direction:column;gap:2rem;
}
.search-bar-wrap{position:relative;}
.search-bar-wrap svg{
  position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
}
.search-input{
  width:100%;background:var(--surface);
  border:1px solid var(--border2);border-radius:10px;
  padding:0.6rem 1rem 0.6rem 2.4rem;
  color:var(--text);font-family:var(--font-body);font-size:0.875rem;
  transition:.2s;outline:none;
}
.search-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.search-input::placeholder{color:var(--text3)}
.posts-grid{display:flex;flex-direction:column;gap:1.4rem}
.post-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  overflow:hidden;
  transition:border-color .25s, transform .25s, box-shadow .25s;
  text-decoration:none;
  display:block;
  cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer;
  position:relative;
}
/* Pin image badge - replaces text */
.post-card.pinned .pin-badge{
  position:absolute;top:8px;right:8px;
  width:28px;height:28px;
  z-index:2;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  transform:rotate(8deg);
  transition:transform 0.2s;
}
.post-card.pinned:hover .pin-badge{transform:rotate(0deg) scale(1.1)}
.post-card:hover{
  border-color:rgba(139,92,246,0.4);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(139,92,246,0.15);
}
.post-card-img{width:100%;height:220px;object-fit:cover;display:block;border-bottom:1px solid var(--border);}
.post-card-body{padding:1.4rem 1.6rem 1.2rem}
.post-meta{
  display:flex;align-items:center;gap:0.75rem;
  font-size:0.72rem;color:var(--text3);
  letter-spacing:0.06em;margin-bottom:0.6rem;flex-wrap:wrap;
}
.post-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}
.post-tag{
  padding:0.15rem 0.55rem;border-radius:99px;
  background:var(--purple-dim);border:1px solid rgba(139,92,246,0.25);
  color:var(--purple2);font-size:0.67rem;font-weight:600;letter-spacing:0.08em;
}
.post-card h2{
  font-family:var(--font-display);
  font-size:1.3rem;font-weight:800;
  color:var(--text);margin-bottom:0.4rem;letter-spacing:0.02em;
  line-height:1.25;
}
.post-card p{color:var(--text2);font-size:0.875rem;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.85rem 1.6rem;border-top:1px solid var(--border);
}
.post-stats{display:flex;align-items:center;gap:1.2rem}
.stat{display:flex;align-items:center;gap:5px;font-size:0.78rem;color:var(--text3)}
.stat svg{opacity:.7}
.like-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:none;
  font-size:0.78rem;color:var(--text3);
  transition:.2s;padding:4px 8px;border-radius:8px;
}
.like-btn:hover{color:var(--purple2);background:var(--purple-dim)}
.like-btn.liked{color:var(--purple2)}
.like-btn.liked svg{fill:var(--purple2)}
.pagination{display:flex;gap:0.5rem;justify-content:center;align-items:center}
.page-btn{
  padding:0.45rem 0.9rem;border-radius:9px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  color:var(--text2);font-size:0.82rem;font-weight:500;
  transition:.2s;
}
.page-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.page-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.page-btn:disabled{opacity:.35;pointer-events:none}
.single-wrap{max-width:720px;margin:0 auto;padding:3rem 2rem;width:100%}
.post-back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.8rem;color:var(--text3);text-decoration:none;
  margin-bottom:2rem;transition:color .2s;
}
.post-back:hover{color:var(--text)}
.single-header{margin-bottom:2rem}
.single-header h1{
  font-family:var(--font-display);
  font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:900;letter-spacing:0.03em;
  color:var(--text);line-height:1.15;
  margin-bottom:0.8rem;
}
.single-header .post-meta{margin-bottom:0}
.single-hero-img{
  width:100%;border-radius:var(--radius);
  border:1px solid var(--border);
  margin-bottom:2rem;
  max-height:420px;object-fit:cover;
}
.post-body{color:var(--text2);line-height:1.8;font-size:1rem;}
.post-body p{margin-bottom:1.1em}
.post-body h2{font-family:var(--font-display);color:var(--text);font-size:1.4rem;font-weight:800;margin:1.8em 0 0.6em;}
.post-body h3{color:var(--text);font-size:1.1rem;font-weight:600;margin:1.4em 0 0.4em;}
.post-body img{max-width:100%;border-radius:10px;border:1px solid var(--border);margin:1rem 0;}
.post-body a{color:var(--purple2);text-decoration:underline;text-underline-offset:3px}
.post-body code{background:var(--surface2);padding:0.1em 0.4em;border-radius:5px;font-size:0.85em;}
.post-body pre{background:var(--surface2);padding:1.2rem;border-radius:12px;overflow-x:auto;border:1px solid var(--border);margin:1rem 0;}
.post-actions{
  display:flex;align-items:center;gap:1rem;
  padding:1.2rem 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin:2.5rem 0;
}
.action-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:0.5rem 1rem;
  font-size:0.82rem;font-weight:500;color:var(--text2);
  transition:.2s;
}
.footer-note{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-top:1rem;
  font-size:0.72rem;
  color:var(--text3);
  text-decoration:none;
  padding-top:0.5rem;
}
.footer-note:hover{color:var(--text2);}
.action-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.action-btn.liked{background:var(--purple-dim);border-color:var(--purple);color:var(--purple2)}
.action-btn.liked svg{fill:var(--purple2)}
.action-btn:disabled{opacity:0.5;pointer-events:none}
.locked-notice{
  display:flex;align-items:center;gap:8px;
  background:rgba(245,158,11,0.08);
  border:1px solid rgba(245,158,11,0.2);
  border-radius:10px;padding:0.7rem 1rem;
  font-size:0.82rem;color:#f59e0b;
  margin-bottom:1.2rem;
}
.comments-section{margin-top:0.5rem}
.comments-section h3{
  font-family:var(--font-display);
  font-size:1.1rem;font-weight:800;letter-spacing:0.04em;
  color:var(--text);margin-bottom:1.4rem;
}
.comment-form{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:1.2rem;
  margin-bottom:1.6rem;
}
.form-row{display:flex;gap:0.7rem;margin-bottom:0.7rem}
.form-row input{flex:1}
.form-input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:9px;
  padding:0.6rem 0.9rem;
  color:var(--text);font-family:var(--font-body);font-size:0.875rem;
  transition:.2s;outline:none;
}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.form-input[readonly]{opacity:0.7;background:var(--surface3)}
.form-textarea{min-height:80px;resize:vertical;}
.form-row-submit{display:flex;justify-content:flex-end;margin-top:0.7rem}
.submit-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--purple);color:#fff;
  border:none;border-radius:9px;
  padding:0.5rem 1.2rem;
  font-family:var(--font-body);font-size:0.82rem;font-weight:600;
  transition:.2s;
}
.submit-btn:hover{background:#7c3aed;transform:translateY(-1px)}
.submit-btn:disabled{opacity:.5;pointer-events:none}
.comment-list{display:flex;flex-direction:column;gap:1rem}
.comment{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem 1.1rem;
}
.comment.deleted{opacity:.55}
.comment.reply{
  background:rgba(255,255,255,0.02);
  border-color:rgba(255,255,255,0.05);
  border-radius:10px;
  margin-top:0.7rem;
  margin-left:1.5rem;
  padding:0.8rem 1rem;
}
.comment-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.4rem}
.comment-avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--purple-dim);border:1px solid rgba(139,92,246,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:700;color:var(--purple2);
  flex-shrink:0;
}
.comment-name{font-size:0.82rem;font-weight:600;color:var(--text)}
.comment-ts{font-size:0.7rem;color:var(--text3);margin-left:auto}
.comment-body{font-size:0.875rem;color:var(--text2);line-height:1.55;margin-bottom:0.6rem}
.comment-body.deleted-msg{color:var(--text3);font-style:italic}
.comment-edited{font-size:0.67rem;color:var(--text3);font-style:italic;margin-left:4px}
.comment-actions{display:flex;align-items:center;gap:0.6rem}
.comment-like{
  display:inline-flex;align-items:center;gap:4px;
  background:none;border:none;
  font-size:0.73rem;color:var(--text3);
  padding:3px 7px;border-radius:6px;transition:.2s;
}
.comment-like:hover{background:var(--purple-dim);color:var(--purple2)}
.comment-like.liked{color:var(--purple2)}
.comment-like.liked svg{fill:var(--purple2)}
.reply-toggle{
  background:none;border:none;
  font-size:0.73rem;color:var(--text3);
  padding:3px 7px;border-radius:6px;transition:.2s;
}
.reply-toggle:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.reply-form{
  margin-top:0.8rem;margin-left:1.5rem;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;padding:0.9rem;
}
.name-locked-hint{
  font-size:0.68rem;color:var(--text3);margin-top:0.3rem;
  font-style:italic;
}
.identity-notice{
  display:flex;align-items:center;gap:8px;
  background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);
  border-radius:8px;padding:0.5rem 0.8rem;
  font-size:0.72rem;color:var(--purple2);margin-bottom:0.7rem;
}
.empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
.spinner{
  width:28px;height:28px;border:2px solid var(--border2);
  border-top-color:var(--purple);border-radius:50%;
  animation:spin .7s linear infinite;
  margin:2rem auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{
  position:fixed;
  bottom:1.5rem;
  left:50%;
  transform:translateX(-50%) translateY(12px);

  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:0.7rem 1.1rem;
  font-size:0.82rem;
  color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  z-index:9999;
  opacity:0;
  transition:.3s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
.toast.error{border-color:rgba(239,68,68,0.4);color:#fca5a5}
.action-loading{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:0.6rem 1.1rem;
  font-size:0.82rem;color:var(--text2);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  z-index:9998;opacity:0;
  transition:.25s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
  display:flex;align-items:center;gap:8px;
}
.action-loading.show{opacity:1;transform:translateX(-50%) translateY(0)}
.action-loading .mini-spin{
  width:13px;height:13px;border:1.5px solid var(--border2);
  border-top-color:var(--purple2);border-radius:50%;
  animation:spin .6s linear infinite;flex-shrink:0;
}
.user-tag{
  display:inline-flex;
  align-items:center;
  gap:3px;
  padding:1px 6px;
  border-radius:99px;
  font-size:0.6rem;
  font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
  margin-left:8px;
  vertical-align:middle;
  position:relative;
  overflow:hidden;
  transition:.2s ease;
  z-index:1;
  color:#fff;
}

/* DELUXE */

.user-tag.deluxe{
  background:linear-gradient(
    90deg,
    #7a0050,
    #9c5c00,
    #006d60,
    #003c8f,
    #5222a8,
    #7a0050
  );
  background-size:400% 100%;
  border:1px solid rgba(255,255,255,.12);
  text-shadow:0 1px 2px rgba(0,0,0,.8);
  animation:rainbowMove 7s linear infinite;
}

.user-tag.deluxe:hover{
  transform:scale(1.08);
  animation:rainbowMove .45s linear infinite;
  box-shadow:0 0 16px rgba(255,255,255,.15);
}

@keyframes rainbowMove{
  from{background-position:0% 50%;}
  to{background-position:400% 50%;}
}

/* GOLD */

.user-tag.gold{
  background:linear-gradient(
    135deg,
    #7a5600,
    #b8860b,
    #d4a017
  );
  border:1px solid rgba(255,215,0,.35);
  box-shadow:0 0 12px rgba(255,215,0,.15);
}

.user-tag.gold::before,
.user-tag.gold::after{
  content:"✦";
  position:absolute;
  color:#fff7c7;
  font-size:9px;
  opacity:0;
  pointer-events:none;
}

.user-tag.gold:hover::before{
  top:1px;
  left:3px;
  animation:sparkle .8s ease;
}

.user-tag.gold:hover::after{
  bottom:1px;
  right:4px;
  animation:sparkle .8s ease .1s;
}

@keyframes sparkle{
  0%{
    opacity:0;
    transform:scale(.3) rotate(0deg);
  }
  40%{
    opacity:1;

<script>

function getFingerprint() {
  const stored = sessionStorage.getItem('_rfp') || localStorage.getItem('_rfp');
  if (stored) return stored;
  const canvas = document.createElement('canvas');
  const gl = canvas.getContext('webgl');
  const glInfo = gl ? gl.getParameter(gl.RENDERER) + gl.getParameter(gl.VENDOR) : '';
  const data = [
    navigator.userAgent,
    navigator.language,
    screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || 0,
    navigator.deviceMemory || 0,
    glInfo,
    navigator.platform || '',
  ].join('|');
  let hash = 0;
  for (let i = 0; i < data.length; i++) {
    hash = ((hash << 5) - hash) + data.charCodeAt(i);
    hash |= 0;
  }
  const fp = Math.abs(hash).toString(36) + Date.now().toString(36).slice(-4);
  localStorage.setItem('_rfp', fp);
  sessionStorage.setItem('_rfp', fp);
  return fp;
}

function getSessionId() {
  let sid = getCookie('_rsid') || localStorage.getItem('_rsid');
  if (!sid) {
    sid = Math.random().toString(36).slice(2) + Date.now().toString(36);
    setCookie('_rsid', sid, 90);
    localStorage.setItem('_rsid', sid);
  }
  return sid;
}

function setCookie(name, val, days) {
  const exp = new Date(Date.now() + days * 864e5).toUTCString();
  document.cookie = `${name}=${val};expires=${exp};path=/;SameSite=Lax`;
}

function getCookie(name) {
  return document.cookie.split('; ').reduce((r, c) => {
    const [k, v] = c.split('=');
    return k === name ? v : r;
  }, null);
}

const CLIENT_FP = getFingerprint();
const SESSION_ID = getSessionId();

let loadingTimer = null;
function showLoading(msg = 'Loading...') {
  const el = document.getElementById('actionLoading');
  const msgEl = document.getElementById('actionLoadingMsg');
  msgEl.textContent = msg;
  el.classList.add('show');
  clearTimeout(loadingTimer);
  loadingTimer = setTimeout(() => hideLoading(), 12000);
}
function hideLoading() {
  clearTimeout(loadingTimer);
  document.getElementById('actionLoading').classList.remove('show');
}

function showToast(msg, isError = false, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}
function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

let currentPage=1, currentPostId=null, searchQuery='';
const likedPosts = JSON.parse(localStorage.getItem('liked_posts')||'{}');
const likedComments = JSON.parse(localStorage.getItem('liked_comments')||'{}');

let commentAuthorName = localStorage.getItem('comment_author_name') || '';
let identityBoundName = null;

function saveLikedPosts(){ localStorage.setItem('liked_posts',JSON.stringify(likedPosts)); }
function saveLikedComments(){ localStorage.setItem('liked_comments',JSON.stringify(likedComments)); }
function saveAuthorName(n){
  commentAuthorName=n;
  localStorage.setItem('comment_author_name',n);
}

async function api(path, opts={}){
  opts.headers = opts.headers || {};
  opts.headers['X-Client-FP'] = CLIENT_FP;
  const r = await fetch(WORKER+path, opts);
  return r.json();
}

async function loadIdentity() {
  try {
    showLoading('Checking identity...');
    const data = await api('/my-identity');
    if (data.ok && data.name) {
      identityBoundName = data.name;
      commentAuthorName = data.name;
      saveAuthorName(data.name);
    } else {
      // Identity was reset server-side — clear local storage too
      if (commentAuthorName && !data.name) {
        saveAuthorName('');
        identityBoundName = null;
      }
    }
  } catch(_) {}
  finally { hideLoading(); }
}

function getUrlParam(k){ return new URLSearchParams(window.location.search).get(k); }
function setUrl(params){
  const u = new URL(window.location);
  Object.keys(params).forEach(k=>{
    if(params[k]!=null) u.searchParams.set(k,params[k]);
    else u.searchParams.delete(k);
  });
  history.pushState({},'',u);
}

let liveWarningDismissed = {};
let liveWarningTimer = null;

function showLiveWarning(warning) {
  if (liveWarningDismissed[warning.id]) return;
  const overlay = document.getElementById('liveWarningOverlay');
  const msgEl = document.getElementById('liveWarningMsg');
  const timerEl = document.getElementById('liveWarningTimer');
  const barEl = document.getElementById('liveWarningBar');

  msgEl.textContent = warning.message;
  overlay.classList.add('show');

  const durationMs = (warning.duration || 10) * 1000;
  let remaining = warning.duration || 10;

  timerEl.textContent = `Closing in ${remaining}s`;
  barEl.style.transition = 'none';
  barEl.style.width = '100%';

  clearInterval(liveWarningTimer);

  setTimeout(() => {
    barEl.style.transition = `width ${durationMs}ms linear`;
    barEl.style.width = '0%';
  }, 50);

  liveWarningTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(liveWarningTimer);
      liveWarningDismissed[warning.id] = true;
      dismissLiveWarning();
    } else {
      timerEl.textContent = `Closing in ${remaining}s`;
    }
  }, 1000);
}

function dismissLiveWarning() {
  const overlay = document.getElementById('liveWarningOverlay');
  overlay.classList.remove('show');
  clearInterval(liveWarningTimer);
}

let lastSeenWarningId = localStorage.getItem('last_seen_warning') || '';
let broadcastPollInterval = null;

async function pollBroadcasts() {
  try {
    const data = await fetch(WORKER + '/broadcasts').then(r => r.json());
    if (!data.ok) return;

    if (data.warning && data.warning.id && data.warning.id !== lastSeenWarningId) {
      lastSeenWarningId = data.warning.id;
      localStorage.setItem('last_seen_warning', data.warning.id);
      showLiveWarning(data.warning);
    }

    renderBroadcastBanner(data.banners || []);
  } catch(_) {}
}

function renderBroadcastBanner(banners) {
  const heroEl = document.querySelector('.blog-hero');
  if (!heroEl) return;

  const existing = document.getElementById('broadcastBannersWrap');
  if (existing) existing.remove();

  const active = banners.filter(b => b && b.text);
  if (!active.length) return;

  const wrap = document.createElement('div');
  wrap.id = 'broadcastBannersWrap';
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:0.5rem;position:relative;z-index:1;padding:0 2rem;padding-top:1.5rem;max-width:900px;margin:0 auto;width:100%';

  active.forEach(b => {
    const color = b.color || '#8b5cf6';
    const div = document.createElement('div');
    div.className = 'broadcast-banner';
    div.style.cssText = `background:${hexToRgba(color,0.1)};border:1px solid ${hexToRgba(color,0.3)}`;
    div.innerHTML = `<div class="broadcast-banner-inner" style="color:${color}">
      ${b.icon ? `<div class="broadcast-banner-icon">${b.icon}</div>` : ''}
      <div class="broadcast-banner-text">${escHtml(b.text)}</div>
    </div>`;
    wrap.appendChild(div);
  });

  heroEl.after(wrap);
}

function hexToRgba(hex, alpha) {
  const clean = hex.replace('#','');
  const r = parseInt(clean.slice(0,2),16);
  const g = parseInt(clean.slice(2,4),16);
  const b = parseInt(clean.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

async function route(){
  await loadIdentity();
  pollBroadcasts();
  clearInterval(broadcastPollInterval);
  broadcastPollInterval = setInterval(pollBroadcasts, 8000);

  const postId = getUrlParam('post');
  const page = parseInt(getUrlParam('page')||'1');

let allPostsCache = [];
let searchDebounce = null;

async function renderList(){
  currentPostId = null;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="blog-hero" style="position:relative;z-index:1">
      <div class="hero-eyebrow"><span></span>Forum<span></span></div>
      <h1>The raton forum</h1>
      <p>The latest from Raton: updates, guides, and leaks (or js shit)</p>
    </div>
    <div class="blog-wrap" style="position:relative;z-index:1">
      <div class="search-bar-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" placeholder="Search posts..." value="${escHtml(searchQuery)}" oninput="handleSearch(this.value)">
      </div>
      <div class="posts-grid" id="postsGrid"><div class="spinner"></div></div>

async function loadAndRender(){
  if(!allPostsCache.length){
    showLoading('Loading posts...');
    const data = await api(`/posts?page=1&limit=100`);
    hideLoading();
    if(!data.ok){ document.getElementById('postsGrid').innerHTML='<div class="empty">Failed to load posts.</div>'; return; }
    allPostsCache = (data.posts||[]).filter(p=>p.published);
    allPostsCache.sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return b.ts - a.ts;
    });
  }
  applySearchAndRender();
}

function handleSearch(val){
  searchQuery = val;
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(()=>{
    currentPage=1;
    setUrl({page:null});
    applySearchAndRender();
  }, 250);
}

function applySearchAndRender(){
  const q = searchQuery.trim().toLowerCase();
  const filtered = q
    ? allPostsCache.filter(p=>
        (p.title||'').toLowerCase().includes(q)||
        (p.excerpt||'').toLowerCase().includes(q)||
        (p.author||'').toLowerCase().includes(q)||
        (p.tags||[]).some(t=>t.toLowerCase().includes(q))
      )
    : allPostsCache;

  const limit = 8;
  const total = filtered.length;
  const pages = Math.ceil(total/limit);
  const page = Math.min(currentPage, Math.max(1, pages));
  const slice = filtered.slice((page-1)*limit, page*limit);

  renderCards(slice);
  renderPagination(total, page, limit);
}

function renderCards(posts){
  const grid = document.getElementById('postsGrid');
  if(!grid) return;
  if(!posts.length){ grid.innerHTML='<div class="empty">No posts yet...</div>'; return; }
  grid.innerHTML = posts.map(p=>cardHTML(p)).join('');
}

function cardHTML(p){
  const liked = likedPosts[p.id];
  const tags = (p.tags||[]).map(t=>`<span class="post-tag">${escHtml(t)}</span>`).join('');
  return `<a class="post-card${p.pinned?' pinned':''}" href="#" onclick="openPost('${p.id}',event)">
    ${p.pinned ? `<img class="pin-badge" src="https://raton.lol/img/office-push-pin.png" alt="Pinned" title="Pinned post">` : ''}
    ${p.imageUrl?`<img class="post-card-img" src="${escHtml(p.imageUrl)}" alt="" loading="lazy">`:''}
    <div class="post-card-body">
      <div class="post-meta">
        <span>${escHtml(p.author||'Admin')}</span>
        <span class="dot"></span>
        <span>${fmtDate(p.ts)}</span>
        ${tags?`<span class="dot"></span>${tags}`:''}
        ${p.locked?`<span class="dot"></span><span style="color:#f59e0b;font-size:0.67rem"> Locked</span>`:''}
      </div>
      <h2>${escHtml(p.title)}</h2>
      <p>${escHtml(p.excerpt||'')}</p>
    </div>
    <div class="post-card-footer">
      <div class="post-stats">
        <span class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${p.commentCount||0}
        </span>
        <span class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="views-${p.id}">${p.views||0}</span>
        </span>
      </div>
      <button class="like-btn ${liked?'liked':''}" onclick="likePost(event,'${p.id}')" id="like-${p.id}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="lc-${p.id}">${p.likes||0}</span>
      </button>
    </div>
  </a>`;
}

function renderPagination(total, page, limit){
  const pages = Math.ceil(total/limit);
  const el = document.getElementById('pagination');
  if(!el) return;
  if(pages<=1){el.innerHTML='';return;}
  let html='';
  html+=`<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Prev
  </button>`;
  for(let i=1;i<=pages;i++){
    html+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>Next
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </button>`;
  el.innerHTML=html;
}

function goPage(p){ currentPage=p; setUrl({page:p}); applySearchAndRender(); scrollTo({top:0,behavior:'smooth'}); }

async function likePost(e, id){
  e.preventDefault(); e.stopPropagation();
  showLoading('Sending like...');
  const data = await api('/like',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId:id,type:'post'})
  });
  hideLoading();
  if(!data.ok){ showToast(data.error, true); return; }
  likedPosts[id]=data.liked; saveLikedPosts();
  const btn = document.getElementById(`like-${id}`);
  const cnt = document.getElementById(`lc-${id}`);
  if(btn){
    btn.classList.toggle('liked', data.liked);
    const svg = btn.querySelector('svg');
    if(svg) svg.setAttribute('fill', data.liked ? 'currentColor' : 'none');
  }
  if(cnt) cnt.textContent=data.count;
  showToast(data.liked?' Liked':'Unliked');
}

function openPost(id, e){
  e&&e.preventDefault();
  allPostsCache=[];
  setUrl({post:id,page:null});
  renderPost(id);
  scrollTo({top:0,behavior:'smooth'});
}

  const p = pData.post;
  const comments = cData.comments||[];
  const liked = likedPosts[p.id];
  const tags = (p.tags||[]).map(t=>`<span class="post-tag">${escHtml(t)}</span>`).join('');

  app.innerHTML = `<div class="single-wrap" style="position:relative;z-index:1">
    <a class="post-back" href="#" onclick="goList(event)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back to blog
    </a>
    <div class="single-header">

        <span class="dot"></span>
        <span>${fmtDate(p.ts)}</span>
        ${p.editedAt?`<span class="dot"></span><span style="color:var(--text3);font-style:italic">edited ${timeAgo(p.editedAt)}</span>`:''}
        ${tags?`<span class="dot"></span>${tags}`:''}
        ${p.pinned?`<span class="dot"></span><img src="https://raton.lol/img/office-push-pin.png" width="14" height="14" style="vertical-align:middle;margin-right:2px;display:inline" alt=""> <span style="color:var(--purple2);vertical-align:middle">Pinned</span>`:''}
        ${p.locked?`<span class="dot"></span><span style="color:#f59e0b">Comments locked</span>`:''}
      </div>
      <h1>${escHtml(p.title)}</h1>
    </div>
    ${p.imageUrl?`<img class="single-hero-img" src="${escHtml(p.imageUrl)}" alt="">`:''}
    <div class="post-body">${renderMarkdown(p.body)}</div>
    <div class="post-actions">
      <button class="action-btn ${liked?'liked':''}" id="post-like-btn" onclick="likePostSingle('${p.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="single-lc">${p.likes||0}</span> Likes
      </button>
      <button class="action-btn" onclick="copyLink('${p.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Share
      </button>
      <span style="margin-left:auto;font-size:0.78rem;color:var(--text3)">
        ${p.commentCount||0} comments
        <span style="margin:0 4px">·</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        ${p.views||0}
      </span>
    </div>
    <div class="comments-section" id="commentsSection">
      ${renderCommentsHTML(comments, id, p.locked)}
    </div>
  </div>`;
}

function tagBadge(tag) {
  if (!tag) return '';
  const labels = { deluxe: 'Professional', gold: 'Start', developer: 'Administrator' };
  const label = labels[tag] || tag;
  return `<span class="user-tag ${tag}">${label}</span>`;
}

function renderCommentsHTML(comments, postId, locked){
  const savedName = identityBoundName || commentAuthorName;
  const nameIsLocked = !!identityBoundName;

  const lockedNotice = locked ? `<div class="locked-notice">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Comments are locked on this post
  </div>` : '';

  const identityNotice = nameIsLocked ? `<div class="identity-notice">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Hello, <strong style="margin:0 3px">${escHtml(savedName)}</strong> this will be your name :)
  </div>` : '';

  const form = locked ? '' : `<div class="comment-form">
    ${identityNotice}
    <div class="form-row">
      <input class="form-input" id="cName" placeholder="Your name" maxlength="32"
        value="${escHtml(savedName)}"
        ${nameIsLocked?'readonly':''}
        oninput="${nameIsLocked?'':'handleNameInput(this.value)'}">
    </div>
    ${!nameIsLocked&&savedName?`<p class="name-locked-hint">Commenting as <strong>${escHtml(savedName)}</strong>. <a href="#" onclick="clearName(event)" style="color:var(--purple2)">Change</a></p>`:''}
    <textarea class="form-input form-textarea" id="cBody" placeholder="Write a comment..." maxlength="1000"></textarea>
    <div class="form-row-submit">
      <button class="submit-btn" id="submitCommentBtn" onclick="submitComment(null,'${postId}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Post Comment
      </button>
    </div>
  </div>`;

  return `<h3>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Comments (${comments.filter(c=>!c.parentId).length})
  </h3>
  ${lockedNotice}
  ${form}
  <div class="comment-list" id="commentList">
    ${comments.filter(c=>!c.parentId).map(c=>commentHTML(c,postId,comments,locked)).join('')}
    ${!comments.filter(c=>!c.parentId).length?'<div class="empty" style="padding:2rem 0">No comments yet...</div>':''}
  </div>`;
}

function commentHTML(c, postId, allComments, locked){
  const isDeleted = c.deleted;
  const cLiked = likedComments[`c:${c.id}`];
  const replies = (c.replies||[]);
  const canInteract = !isDeleted && !c.hardDeleted;

  return `<div class="comment ${isDeleted?'deleted':''}" id="comment-${c.id}">
    <div class="comment-header">
      <div class="comment-avatar">${(c.name||'?')[0].toUpperCase()}</div>
      <span class="comment-name">${escHtml(isDeleted?'deleted':c.name)}${!isDeleted&&c.userTag?tagBadge(c.userTag):''}</span>
      ${c.editedByAdmin&&!isDeleted?`<span class="comment-edited">[edited by a moderator]</span>`:''}
      <span class="comment-ts">${timeAgo(c.ts)}</span>
    </div>
    <div class="comment-body ${isDeleted?'deleted-msg':''}">${escHtml(c.body)}</div>
    <div class="comment-actions">
      ${canInteract ? `<button class="comment-like ${cLiked?'liked':''}" id="clbtn-${c.id}" onclick="likeComment(event,'${postId}','comment','${c.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="${cLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="cl-${c.id}">${c.likes||0}</span>
      </button>` : ''}
      ${canInteract&&!locked?`<button class="reply-toggle" onclick="toggleReplyForm('${c.id}','${postId}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
        Reply
      </button>`:''}
    </div>
    <div id="replyForm-${c.id}"></div>
    ${replies.length?`<div class="reply-list" id="replies-${c.id}">${replies.map(r=>replyHTML(r,c.id,postId,locked)).join('')}</div>`:`<div id="replies-${c.id}"></div>`}
  </div>`;
}

function replyHTML(r, parentId, postId, locked){
  const isDeleted = r.deleted;
  const rLiked = likedComments[`r:${r.id}`];
  const canInteract = !isDeleted && !r.hardDeleted;

  return `<div class="comment reply ${isDeleted?'deleted':''}" id="reply-${r.id}">
    <div class="comment-header">
      <div class="comment-avatar" style="width:20px;height:20px;font-size:0.6rem">${(r.name||'?')[0].toUpperCase()}</div>
      <span class="comment-name">${escHtml(isDeleted?'deleted':r.name)}${!isDeleted&&r.userTag?tagBadge(r.userTag):''}</span>
      ${r.editedByAdmin&&!isDeleted?`<span class="comment-edited">[edited by a moderator]</span>`:''}
      <span class="comment-ts">${timeAgo(r.ts)}</span>
    </div>
    <div class="comment-body ${isDeleted?'deleted-msg':''}">${escHtml(r.body)}</div>
    <div class="comment-actions">
      ${canInteract ? `<button class="comment-like ${rLiked?'liked':''}" id="rlbtn-${r.id}" onclick="likeComment(event,'${postId}','reply','${parentId}','${r.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="${rLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="rl-${r.id}">${r.likes||0}</span>
      </button>` : ''}
    </div>
  </div>`;
}

function handleNameInput(val){
  if (!identityBoundName) commentAuthorName = val;
}

function clearName(e){
  e&&e.preventDefault();
  if (identityBoundName) { showToast('The name is yours', true); return; }
  saveAuthorName('');
  const postId = currentPostId;
  if(postId){
    api(`/comments?postId=${postId}`).then(cData=>{
      const isLocked = !!document.querySelector('.locked-notice');
      document.getElementById('commentsSection').innerHTML = renderCommentsHTML(cData.comments||[], postId, isLocked);
    });
  }
}

function toggleReplyForm(commentId, postId){
  const el = document.getElementById(`replyForm-${commentId}`);
  if(el.innerHTML){el.innerHTML='';return;}
  const savedName = identityBoundName || commentAuthorName;
  const nameIsLocked = !!identityBoundName;
  el.innerHTML=`<div class="reply-form">
    <div class="form-row">
      <input class="form-input" id="rName-${commentId}" placeholder="Your name" maxlength="32"
        value="${escHtml(savedName)}"
        ${nameIsLocked?'readonly':''}
        oninput="${nameIsLocked?'':'commentAuthorName=this.value'}">
    </div>
    ${savedName?`<p class="name-locked-hint">Replying as <strong>${escHtml(savedName)}</strong>${nameIsLocked?' (Your name)':''}</p>`:''}
    <textarea class="form-input form-textarea" id="rBody-${commentId}" placeholder="Write a reply..." style="min-height:60px" maxlength="500"></textarea>
    <div class="form-row-submit">
      <button class="submit-btn" id="replyBtn-${commentId}" onclick="submitComment('${commentId}','${postId}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
        Reply
      </button>
    </div>
  </div>`;
}

async function submitComment(parentId, postId){
  const nameEl = document.getElementById(parentId?`rName-${parentId}`:'cName');
  const bodyEl = document.getElementById(parentId?`rBody-${parentId}`:'cBody');
  const btnEl = document.getElementById(parentId?`replyBtn-${parentId}`:'submitCommentBtn');
  const name = (identityBoundName || nameEl?.value || '').trim();
  const body = bodyEl?.value.trim();
  if(!name||name.length<2){ showToast('Name must be at least 2 characters', true); return; }
  if(!body||body.length<2){ showToast('Comment must be at least 2 characters', true); return; }

  if(btnEl){ btnEl.disabled=true; btnEl.textContent='Checking...'; }
  showLoading('Checking name availability...');

  const nameCheck = await api('/check-name',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId,name})
  });

  if(!nameCheck.ok){
    hideLoading();
    if(btnEl){ btnEl.disabled=false; btnEl.innerHTML=parentId?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg> Reply':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Post Comment'; }
    showToast(nameCheck.error, true); return;
  }

  if(btnEl){ btnEl.textContent='Posting...'; }
  showLoading('Posting comment...');

  const data = await api('/comment',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId,name,body,parentId})
  });

  hideLoading();
  if(btnEl){ btnEl.disabled=false; btnEl.innerHTML=parentId?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg> Reply':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Post Comment'; }

  if(!data.ok){ showToast(data.error, true); return; }

  identityBoundName = name;
  saveAuthorName(name);
  showToast('Comment posted!');

  showLoading('Refreshing comments...');
  const cData = await api(`/comments?postId=${postId}`);
  hideLoading();
  const isLocked = !!document.querySelector('.locked-notice');
  document.getElementById('commentsSection').innerHTML = renderCommentsHTML(cData.comments||[], postId, isLocked);
}

async function likeComment(e, postId, type, commentId, replyId){
  e.stopPropagation();
  showLoading('Sending like...');
  const body = {postId,type,commentId};
  if(replyId) body.replyId=replyId;
  const data = await api('/like',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  hideLoading();
  if(!data.ok){ showToast(data.error, true); return; }

  const lKey = type==='reply'?`r:${replyId}`:`c:${commentId}`;
  likedComments[lKey]=data.liked; saveLikedComments();

  const btnId = type==='reply' ? `rlbtn-${replyId}` : `clbtn-${commentId}`;
  const countId = type==='reply' ? `rl-${replyId}` : `cl-${commentId}`;

  const btn = document.getElementById(btnId);
  const countEl = document.getElementById(countId);

  if(btn){
    btn.classList.toggle('liked', data.liked);
    const svg = btn.querySelector('svg');
    if(svg) svg.setAttribute('fill', data.liked ? 'currentColor' : 'none');
  }
  if(countEl) countEl.textContent = data.count;

  showToast(data.liked?' Liked':'Unliked');
}

async function likePostSingle(id){
  const btn = document.getElementById('post-like-btn');
  if(btn) btn.disabled=true;
  showLoading('Sending like...');
  const data = await api('/like',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId:id,type:'post'})
  });
  hideLoading();
  if(btn) btn.disabled=false;
  if(!data.ok){ showToast(data.error, true); return; }
  likedPosts[id]=data.liked; saveLikedPosts();
  const cnt = document.getElementById('single-lc');
  if(btn){
    btn.classList.toggle('liked', data.liked);
    const svg = btn.querySelector('svg');
    if(svg) svg.setAttribute('fill', data.liked ? 'currentColor' : 'none');
  }
  if(cnt) cnt.textContent=data.count;
  showToast(data.liked?' Liked':'Unliked');
}

function copyLink(id){
  const url = `${SITE}?post=${id}`;
  navigator.clipboard.writeText(url).then(()=>showToast(' Link copied!'));
}

function goList(e){ e&&e.preventDefault(); currentPostId=null; allPostsCache=[]; setUrl({post:null,page:null}); renderList(); scrollTo({top:0}); }

function renderMarkdown(md){
  if(!md) return '';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}

function escHtml(s){
  if(typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

route();
</script>
