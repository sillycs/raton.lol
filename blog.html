<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog</title>
<link rel="icon" type="image/png" href="https://raton.lol/img/RATA.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/kunal" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/nishiki-teki" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --surface:#141414;
  --surface2:#1c1c1c;
  --surface3:#222;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --purple-dim:rgba(139,92,246,0.15);
  --text:#f4f4f8;
  --text2:#a0a0b8;
  --text3:#606078;
  --font-display:'Nishiki-teki',sans-serif;
  --font-logo:'kunal',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --radius:14px;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--purple),#5b21b6);border-radius:99px}
*{cursor:url('https://raton.lol/img/default.png') 0 0,auto}
a,button,[role="button"]{cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 3rem;height:64px;
  background:rgba(13,13,13,0.88);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-logo);font-weight:800;
  font-size:1.5rem;color:var(--text);text-decoration:none;
}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
.nav-links a{
  text-decoration:none;color:var(--text2);
  font-size:0.875rem;font-weight:400;transition:color 0.2s;
}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--purple2)}
.nav-mobile-toggle{display:none;background:none;border:none;color:var(--text);padding:6px}
.blog-hero{
  position:relative;
  padding:4rem 2rem 3rem;
  text-align:center;
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.blog-hero::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 70% at 50% 0%,rgba(139,92,246,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--purple2);font-weight:600;margin-bottom:1rem;
}
.hero-eyebrow span{display:inline-block;width:18px;height:1px;background:var(--purple2)}
.blog-hero h1{
  font-family:var(--font-display);
  font-size:clamp(2.2rem,5vw,3.8rem);
  font-weight:900;letter-spacing:0.04em;
  color:var(--text);line-height:1.1;
  margin-bottom:0.8rem;
}
.blog-hero p{
  color:var(--text2);font-size:1rem;max-width:460px;margin:0 auto;
}
.blog-wrap{
  flex:1;max-width:900px;width:100%;
  margin:0 auto;padding:3rem 2rem;
  display:flex;flex-direction:column;gap:2rem;
}
.search-bar-wrap{
  position:relative;
}
.search-bar-wrap svg{
  position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
}
.search-input{
  width:100%;background:var(--surface);
  border:1px solid var(--border2);border-radius:10px;
  padding:0.6rem 1rem 0.6rem 2.4rem;
  color:var(--text);font-family:var(--font-body);font-size:0.875rem;
  transition:.2s;outline:none;
}
.search-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.search-input::placeholder{color:var(--text3)}
.posts-grid{display:flex;flex-direction:column;gap:1.4rem}
.post-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  overflow:hidden;
  transition:border-color .25s, transform .25s, box-shadow .25s;
  text-decoration:none;
  display:block;
  cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer;
}
.post-card:hover{
  border-color:rgba(139,92,246,0.4);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(139,92,246,0.15);
}
.post-card-img{
  width:100%;height:220px;object-fit:cover;
  display:block;border-bottom:1px solid var(--border);
}
.post-card-body{padding:1.4rem 1.6rem 1.2rem}
.post-meta{
  display:flex;align-items:center;gap:0.75rem;
  font-size:0.72rem;color:var(--text3);
  letter-spacing:0.06em;margin-bottom:0.6rem;flex-wrap:wrap;
}
.post-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}
.post-tag{
  padding:0.15rem 0.55rem;border-radius:99px;
  background:var(--purple-dim);border:1px solid rgba(139,92,246,0.25);
  color:var(--purple2);font-size:0.67rem;font-weight:600;letter-spacing:0.08em;
}
.post-card h2{
  font-family:var(--font-display);
  font-size:1.3rem;font-weight:800;
  color:var(--text);margin-bottom:0.4rem;letter-spacing:0.02em;
  line-height:1.25;
}
.post-card p{
  color:var(--text2);font-size:0.875rem;line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.post-card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.85rem 1.6rem;border-top:1px solid var(--border);
}
.post-stats{display:flex;align-items:center;gap:1.2rem}
.stat{display:flex;align-items:center;gap:5px;font-size:0.78rem;color:var(--text3)}
.stat svg{opacity:.7}
.like-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:none;
  font-size:0.78rem;color:var(--text3);
  transition:.2s;padding:4px 8px;border-radius:8px;
}
.like-btn:hover{color:var(--purple2);background:var(--purple-dim)}
.like-btn.liked{color:var(--purple2)}
.like-btn.liked svg{fill:var(--purple2)}
.pagination{display:flex;gap:0.5rem;justify-content:center;align-items:center}
.page-btn{
  padding:0.45rem 0.9rem;border-radius:9px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  color:var(--text2);font-size:0.82rem;font-weight:500;
  transition:.2s;
}
.page-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.page-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.page-btn:disabled{opacity:.35;pointer-events:none}
.single-wrap{max-width:720px;margin:0 auto;padding:3rem 2rem;width:100%}
.post-back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.8rem;color:var(--text3);text-decoration:none;
  margin-bottom:2rem;transition:color .2s;
}
.post-back:hover{color:var(--text)}
.single-header{margin-bottom:2rem}
.single-header h1{
  font-family:var(--font-display);
  font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:900;letter-spacing:0.03em;
  color:var(--text);line-height:1.15;
  margin-bottom:0.8rem;
}
.single-header .post-meta{margin-bottom:0}
.single-hero-img{
  width:100%;border-radius:var(--radius);
  border:1px solid var(--border);
  margin-bottom:2rem;
  max-height:420px;object-fit:cover;
}
.post-body{
  color:var(--text2);line-height:1.8;font-size:1rem;
}
.post-body p{margin-bottom:1.1em}
.post-body h2{
  font-family:var(--font-display);
  color:var(--text);font-size:1.4rem;font-weight:800;
  margin:1.8em 0 0.6em;
}
.post-body h3{
  color:var(--text);font-size:1.1rem;font-weight:600;
  margin:1.4em 0 0.4em;
}
.post-body img{
  max-width:100%;border-radius:10px;
  border:1px solid var(--border);
  margin:1rem 0;
}
.post-body a{color:var(--purple2);text-decoration:underline;text-underline-offset:3px}
.post-body code{
  background:var(--surface2);padding:0.1em 0.4em;
  border-radius:5px;font-size:0.85em;
}
.post-body pre{
  background:var(--surface2);padding:1.2rem;
  border-radius:12px;overflow-x:auto;
  border:1px solid var(--border);margin:1rem 0;
}
.post-actions{
  display:flex;align-items:center;gap:1rem;
  padding:1.2rem 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin:2.5rem 0;
}
.action-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:0.5rem 1rem;
  font-size:0.82rem;font-weight:500;color:var(--text2);
  transition:.2s;
}
.action-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.action-btn.liked{background:var(--purple-dim);border-color:var(--purple);color:var(--purple2)}
.action-btn.liked svg{fill:var(--purple2)}
.comments-section{margin-top:0.5rem}
.comments-section h3{
  font-family:var(--font-display);
  font-size:1.1rem;font-weight:800;letter-spacing:0.04em;
  color:var(--text);margin-bottom:1.4rem;
}
.comment-form{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:1.2rem;
  margin-bottom:1.6rem;
}
.form-row{display:flex;gap:0.7rem;margin-bottom:0.7rem}
.form-row input{flex:1}
.form-input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:9px;
  padding:0.6rem 0.9rem;
  color:var(--text);font-family:var(--font-body);font-size:0.875rem;
  transition:.2s;outline:none;
}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.form-textarea{
  min-height:80px;resize:vertical;
}
.form-row-submit{display:flex;justify-content:flex-end;margin-top:0.7rem}
.submit-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--purple);color:#fff;
  border:none;border-radius:9px;
  padding:0.5rem 1.2rem;
  font-family:var(--font-body);font-size:0.82rem;font-weight:600;
  transition:.2s;
}
.submit-btn:hover{background:#7c3aed;transform:translateY(-1px)}
.submit-btn:disabled{opacity:.5;pointer-events:none}
.comment-list{display:flex;flex-direction:column;gap:1rem}
.comment{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem 1.1rem;
}
.comment.deleted{opacity:.55}
.comment.reply{
  background:rgba(255,255,255,0.02);
  border-color:rgba(255,255,255,0.05);
  border-radius:10px;
  margin-top:0.7rem;
  margin-left:1.5rem;
  padding:0.8rem 1rem;
}
.comment-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.4rem}
.comment-avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--purple-dim);border:1px solid rgba(139,92,246,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:700;color:var(--purple2);
  flex-shrink:0;
}
.comment-name{font-size:0.82rem;font-weight:600;color:var(--text)}
.comment-ts{font-size:0.7rem;color:var(--text3);margin-left:auto}
.comment-body{font-size:0.875rem;color:var(--text2);line-height:1.55;margin-bottom:0.6rem}
.comment-body.deleted-msg{color:var(--text3);font-style:italic}
.comment-actions{display:flex;align-items:center;gap:0.6rem}
.comment-like{
  display:inline-flex;align-items:center;gap:4px;
  background:none;border:none;
  font-size:0.73rem;color:var(--text3);
  padding:3px 7px;border-radius:6px;transition:.2s;
}
.comment-like:hover{background:var(--purple-dim);color:var(--purple2)}
.comment-like.liked{color:var(--purple2)}
.reply-toggle{
  background:none;border:none;
  font-size:0.73rem;color:var(--text3);
  padding:3px 7px;border-radius:6px;transition:.2s;
}
.reply-toggle:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.reply-form{
  margin-top:0.8rem;margin-left:1.5rem;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;padding:0.9rem;
}
.name-locked-hint{
  font-size:0.68rem;color:var(--text3);margin-top:0.3rem;
  font-style:italic;
}
.empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
.spinner{
  width:28px;height:28px;border:2px solid var(--border2);
  border-top-color:var(--purple);border-radius:50%;
  animation:spin .7s linear infinite;
  margin:2rem auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:0.7rem 1.1rem;
  font-size:0.82rem;color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  z-index:9999;transform:translateY(12px);opacity:0;
  transition:.3s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}
.rata-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.rata-sprite{
  position:absolute;opacity:0;
  will-change:transform,opacity;
  filter:grayscale(20%) brightness(0.65);
  animation:rataFloat linear infinite;
  transform-origin:center;user-select:none;
}
@keyframes rataFloat{
  0%{opacity:0;transform:translateY(0px) rotate(0deg) scale(1)}
  8%{opacity:0.18}
  50%{opacity:0.10;transform:translateY(-28px) rotate(7deg) scale(1.05)}
  92%{opacity:0.18}
  100%{opacity:0;transform:translateY(-55px) rotate(-4deg) scale(0.95)}
}
footer{
  position:relative;z-index:1;
  border-top:1px solid var(--border);
  padding:1.5rem 3rem;text-align:center;
}
.footer-bottom{font-size:0.75rem;color:var(--text3)}
@media(max-width:768px){
  nav{padding:0 1.2rem}
  .nav-links{display:none}
  .nav-mobile-toggle{display:flex}
  nav.open .nav-links{
    display:flex;flex-direction:column;position:fixed;
    top:64px;left:0;right:0;
    background:rgba(13,13,13,0.97);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:1.5rem 1.5rem 2rem;gap:1.2rem;z-index:99;
  }
  .blog-wrap{padding:2rem 1.2rem}
  .single-wrap{padding:2rem 1.2rem}
  .form-row{flex-direction:column}
  .post-card-img{height:160px}
}
</style>
</head>
<body>

<div class="rata-bg" id="rataBg" aria-hidden="true"></div>

<nav id="mainNav">
  <a class="nav-logo" href="https://raton.lol/">
    <img src="https://raton.lol/img/RATA.png" width="28" height="28" alt="">
    Raton
  </a>
  <ul class="nav-links">
    <li><a href="https://raton.lol/#features">Features</a></li>
    <li><a href="https://raton.lol/#testimonials">Reviews</a></li>
    <li><a href="https://raton.lol/#pricing">Pricing</a></li>
    <li><a href="https://raton.lol/#showcase">Showcase</a></li>
    <li><a href="https://raton.lol/download">Download</a></li>
    <li><a href="#" class="active" id="blogNavLink">Blog</a></li>
  </ul>
  <button class="nav-mobile-toggle" onclick="document.getElementById('mainNav').classList.toggle('open')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</nav>

<div id="app"></div>

<footer>
  <p class="footer-bottom">© 2026 SillyCS. All rights reserved</p>
</footer>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://bold-glitter-3cd0.sillycro.workers.dev';
const SITE   = window.location.origin + window.location.pathname;

(function(){
  var bg = document.getElementById('rataBg');
  [{x:5,y:8,s:56,d:20,dl:0},{x:18,y:22,s:48,d:24,dl:5},{x:32,y:5,s:64,d:18,dl:9},
   {x:65,y:3,s:72,d:22,dl:13},{x:78,y:20,s:48,d:30,dl:7},{x:90,y:8,s:60,d:16,dl:11},
   {x:10,y:55,s:56,d:28,dl:3},{x:72,y:75,s:64,d:25,dl:6}].forEach(r=>{
    var img = document.createElement('img');
    img.src = 'https://raton.lol/img/RATA.png';
    img.className = 'rata-sprite'; img.alt=''; img.draggable=false;
    img.style.cssText=`width:${r.s}px;height:${r.s}px;left:${r.x}%;top:${r.y}%;animation-duration:${r.d}s;animation-delay:-${r.dl}s`;
    bg.appendChild(img);
  });
})();

function showToast(msg, dur=2800){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}
function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

let currentPage=1, currentPostId=null, searchQuery='';
const likedPosts = JSON.parse(localStorage.getItem('liked_posts')||'{}');
const likedComments = JSON.parse(localStorage.getItem('liked_comments')||'{}');
let commentAuthorName = localStorage.getItem('comment_author_name')||'';

function saveLikedPosts(){ localStorage.setItem('liked_posts',JSON.stringify(likedPosts)); }
function saveLikedComments(){ localStorage.setItem('liked_comments',JSON.stringify(likedComments)); }
function saveAuthorName(n){ commentAuthorName=n; localStorage.setItem('comment_author_name',n); }

async function api(path, opts={}){
  const r = await fetch(WORKER+path, opts);
  return r.json();
}

function getUrlParam(k){ return new URLSearchParams(window.location.search).get(k); }
function setUrl(params){
  const u = new URL(window.location);
  Object.keys(params).forEach(k=>{
    if(params[k]!=null) u.searchParams.set(k,params[k]);
    else u.searchParams.delete(k);
  });
  history.pushState({},''  ,u);
}

function route(){
  const postId = getUrlParam('post');
  const page = parseInt(getUrlParam('page')||'1');
  currentPage = page;
  if(postId){ renderPost(postId); }
  else { renderList(); }
}
window.addEventListener('popstate', route);

let allPostsCache = [];
let searchDebounce = null;

async function renderList(){
  currentPostId = null;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="blog-hero" style="position:relative;z-index:1">
      <div class="hero-eyebrow"><span></span>Blog<span></span></div>
      <h1>Notes & Updates</h1>
      <p>The latest from the Raton team — updates, guides, and behind the scenes.</p>
    </div>
    <div class="blog-wrap" style="position:relative;z-index:1">
      <div class="search-bar-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" placeholder="Search posts..." value="${escHtml(searchQuery)}" oninput="handleSearch(this.value)">
      </div>
      <div class="posts-grid" id="postsGrid"><div class="spinner"></div></div>
      <div class="pagination" id="pagination"></div>
    </div>`;

  await loadAndRender();
}

async function loadAndRender(){
  if(!allPostsCache.length){
    const data = await api(`/posts?page=1&limit=100`);
    if(!data.ok){ document.getElementById('postsGrid').innerHTML='<div class="empty">Failed to load posts.</div>'; return; }
    allPostsCache = (data.posts||[]).filter(p=>p.published);
  }
  applySearchAndRender();
}

function handleSearch(val){
  searchQuery = val;
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(()=>{
    currentPage=1;
    setUrl({page:null});
    applySearchAndRender();
  }, 250);
}

function applySearchAndRender(){
  const q = searchQuery.trim().toLowerCase();
  const filtered = q
    ? allPostsCache.filter(p=>
        (p.title||'').toLowerCase().includes(q)||
        (p.excerpt||'').toLowerCase().includes(q)||
        (p.author||'').toLowerCase().includes(q)||
        (p.tags||[]).some(t=>t.toLowerCase().includes(q))
      )
    : allPostsCache;

  const limit = 8;
  const total = filtered.length;
  const pages = Math.ceil(total/limit);
  const page = Math.min(currentPage, Math.max(1, pages));
  const slice = filtered.slice((page-1)*limit, page*limit);

  renderCards(slice);
  renderPagination(total, page, limit);
}

function renderCards(posts){
  const grid = document.getElementById('postsGrid');
  if(!grid) return;
  if(!posts.length){ grid.innerHTML='<div class="empty">No posts found.</div>'; return; }
  grid.innerHTML = posts.map(p=>cardHTML(p)).join('');
}

function cardHTML(p){
  const liked = likedPosts[p.id];
  const tags = (p.tags||[]).map(t=>`<span class="post-tag">${t}</span>`).join('');
  return `<a class="post-card" href="#" onclick="openPost('${p.id}',event)">
    ${p.imageUrl?`<img class="post-card-img" src="${escHtml(p.imageUrl)}" alt="" loading="lazy">`:''}
    <div class="post-card-body">
      <div class="post-meta">
        <span>${escHtml(p.author||'Admin')}</span>
        <span class="dot"></span>
        <span>${fmtDate(p.ts)}</span>
        ${tags?`<span class="dot"></span>${tags}`:''}
      </div>
      <h2>${escHtml(p.title)}</h2>
      <p>${escHtml(p.excerpt||'')}</p>
    </div>
    <div class="post-card-footer">
      <div class="post-stats">
        <span class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${p.commentCount||0}
        </span>
        <span class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="views-${p.id}">${p.views||0}</span>
        </span>
      </div>
      <button class="like-btn ${liked?'liked':''}" onclick="likePost(event,'${p.id}')" id="like-${p.id}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="lc-${p.id}">${p.likes||0}</span>
      </button>
    </div>
  </a>`;
}

function renderPagination(total, page, limit){
  const pages = Math.ceil(total/limit);
  const el = document.getElementById('pagination');
  if(!el) return;
  if(pages<=1){el.innerHTML='';return;}
  let html='';
  html+=`<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Prev
  </button>`;
  for(let i=1;i<=pages;i++){
    html+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>Next
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </button>`;
  el.innerHTML=html;
}

function goPage(p){ currentPage=p; setUrl({page:p}); applySearchAndRender(); scrollTo({top:0,behavior:'smooth'}); }

async function likePost(e, id){
  e.preventDefault(); e.stopPropagation();
  const data = await api('/like',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId:id,type:'post'})
  });
  if(!data.ok){showToast(data.error);return;}
  likedPosts[id]=data.liked; saveLikedPosts();
  const btn = document.getElementById(`like-${id}`);
  const cnt = document.getElementById(`lc-${id}`);
  if(btn){ btn.classList.toggle('liked',data.liked); btn.querySelector('svg').setAttribute('fill',data.liked?'currentColor':'none'); }
  if(cnt) cnt.textContent=data.count;
  showToast(data.liked?'Liked':'Unliked');
}

function openPost(id, e){
  e&&e.preventDefault();
  allPostsCache=[];
  setUrl({post:id,page:null});
  renderPost(id);
  scrollTo({top:0,behavior:'smooth'});
}

async function renderPost(id){
  currentPostId = id;
  const app = document.getElementById('app');
  app.innerHTML = `<div class="single-wrap" style="position:relative;z-index:1"><div class="spinner"></div></div>`;

  await api('/view',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId:id})
  });

  const [pData, cData] = await Promise.all([
    api(`/post?id=${id}`),
    api(`/comments?postId=${id}`)
  ]);

  if(!pData.ok){ app.innerHTML='<div class="single-wrap" style="position:relative;z-index:1"><div class="empty">Post not found.</div></div>'; return; }
  const p = pData.post;
  const comments = cData.comments||[];
  const liked = likedPosts[p.id];
  const tags = (p.tags||[]).map(t=>`<span class="post-tag">${t}</span>`).join('');

  app.innerHTML = `<div class="single-wrap" style="position:relative;z-index:1">
    <a class="post-back" href="#" onclick="goList(event)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back to blog
    </a>
    <div class="single-header">
      <div class="post-meta">
        <span>${escHtml(p.author||'Admin')}</span>
        <span class="dot"></span>
        <span>${fmtDate(p.ts)}</span>
        ${p.editedAt?`<span class="dot"></span><span style="color:var(--text3);font-style:italic">edited ${timeAgo(p.editedAt)}</span>`:''}
        ${tags?`<span class="dot"></span>${tags}`:''}
      </div>
      <h1>${escHtml(p.title)}</h1>
    </div>
    ${p.imageUrl?`<img class="single-hero-img" src="${escHtml(p.imageUrl)}" alt="">`:''}
    <div class="post-body">${renderMarkdown(p.body)}</div>
    <div class="post-actions">
      <button class="action-btn ${liked?'liked':''}" id="post-like-btn" onclick="likePostSingle('${p.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="single-lc">${p.likes||0}</span> Likes
      </button>
      <button class="action-btn" onclick="copyLink('${p.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Share
      </button>
      <span style="margin-left:auto;font-size:0.78rem;color:var(--text3)">
        ${p.commentCount||0} comments
        <span style="margin:0 4px">·</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        ${p.views||0}
      </span>
    </div>
    <div class="comments-section" id="commentsSection">
      ${renderCommentsHTML(comments, id)}
    </div>
  </div>`;
}

function renderCommentsHTML(comments, postId){
  const savedName = commentAuthorName;
  return `<h3>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Comments (${comments.filter(c=>!c.parentId).length})
  </h3>
  <div class="comment-form">
    <div class="form-row">
      <input class="form-input" id="cName" placeholder="Your name" maxlength="32" value="${escHtml(savedName)}" oninput="handleNameInput(this.value)">
    </div>
    ${savedName?`<p class="name-locked-hint">Commenting as <strong>${escHtml(savedName)}</strong>. <a href="#" onclick="clearName(event)" style="color:var(--purple2)">Change</a></p>`:''}
    <textarea class="form-input form-textarea" id="cBody" placeholder="Write a comment..." maxlength="1000"></textarea>
    <div class="form-row-submit">
      <button class="submit-btn" onclick="submitComment(null,'${postId}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Post Comment
      </button>
    </div>
  </div>
  <div class="comment-list" id="commentList">
    ${comments.filter(c=>!c.parentId).map(c=>commentHTML(c,postId,comments)).join('')}
    ${!comments.filter(c=>!c.parentId).length?'<div class="empty" style="padding:2rem 0">No comments yet. Be the first!</div>':''}
  </div>`;
}

function commentHTML(c, postId, allComments){
  const isDeleted = c.deleted;
  const cLiked = likedComments[`c:${c.id}`];
  const replies = (c.replies||[]);
  return `<div class="comment ${isDeleted?'deleted':''}" id="comment-${c.id}">
    <div class="comment-header">
      <div class="comment-avatar">${(c.name||'?')[0].toUpperCase()}</div>
      <span class="comment-name">${escHtml(isDeleted?'deleted':c.name)}</span>
      <span class="comment-ts">${timeAgo(c.ts)}</span>
    </div>
    <div class="comment-body ${isDeleted?'deleted-msg':''}">${escHtml(c.body)}</div>
    <div class="comment-actions">
      <button class="comment-like ${cLiked?'liked':''}" onclick="likeComment(event,'${postId}','comment','${c.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="${cLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="cl-${c.id}">${c.likes||0}</span>
      </button>
      ${!isDeleted?`<button class="reply-toggle" onclick="toggleReplyForm('${c.id}','${postId}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
        Reply
      </button>`:''}
    </div>
    <div id="replyForm-${c.id}"></div>
    ${replies.length?`<div class="reply-list" id="replies-${c.id}">${replies.map(r=>replyHTML(r,c.id,postId)).join('')}</div>`:`<div id="replies-${c.id}"></div>`}
  </div>`;
}

function replyHTML(r, parentId, postId){
  const isDeleted = r.deleted;
  const rLiked = likedComments[`r:${r.id}`];
  return `<div class="comment reply ${isDeleted?'deleted':''}" id="reply-${r.id}">
    <div class="comment-header">
      <div class="comment-avatar" style="width:20px;height:20px;font-size:0.6rem">${(r.name||'?')[0].toUpperCase()}</div>
      <span class="comment-name">${escHtml(isDeleted?'deleted':r.name)}</span>
      <span class="comment-ts">${timeAgo(r.ts)}</span>
    </div>
    <div class="comment-body ${isDeleted?'deleted-msg':''}">${escHtml(r.body)}</div>
    <div class="comment-actions">
      <button class="comment-like ${rLiked?'liked':''}" onclick="likeComment(event,'${postId}','reply','${parentId}','${r.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="${rLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="rl-${r.id}">${r.likes||0}</span>
      </button>
    </div>
  </div>`;
}

function handleNameInput(val){
  commentAuthorName = val;
}

function clearName(e){
  e&&e.preventDefault();
  saveAuthorName('');
  const postId = currentPostId;
  if(postId){
    api(`/comments?postId=${postId}`).then(cData=>{
      document.getElementById('commentsSection').innerHTML = renderCommentsHTML(cData.comments||[], postId);
    });
  }
}

function toggleReplyForm(commentId, postId){
  const el = document.getElementById(`replyForm-${commentId}`);
  if(el.innerHTML){el.innerHTML='';return;}
  const savedName = commentAuthorName;
  el.innerHTML=`<div class="reply-form">
    <div class="form-row">
      <input class="form-input" id="rName-${commentId}" placeholder="Your name" maxlength="32" value="${escHtml(savedName)}" oninput="commentAuthorName=this.value">
    </div>
    ${savedName?`<p class="name-locked-hint">Replying as <strong>${escHtml(savedName)}</strong></p>`:''}
    <textarea class="form-input form-textarea" id="rBody-${commentId}" placeholder="Write a reply..." style="min-height:60px" maxlength="500"></textarea>
    <div class="form-row-submit">
      <button class="submit-btn" onclick="submitComment('${commentId}','${postId}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
        Reply
      </button>
    </div>
  </div>`;
}

async function submitComment(parentId, postId){
  const nameEl = document.getElementById(parentId?`rName-${parentId}`:'cName');
  const bodyEl = document.getElementById(parentId?`rBody-${parentId}`:'cBody');
  const name = nameEl?.value.trim();
  const body = bodyEl?.value.trim();
  if(!name||name.length<2){showToast('Name must be at least 2 characters');return;}
  if(!body||body.length<2){showToast('Comment must be at least 2 characters');return;}

  const nameCheck = await api('/check-name',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId,name})
  });
  if(!nameCheck.ok){showToast(nameCheck.error);return;}

  const data = await api('/comment',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId,name,body,parentId})
  });
  if(!data.ok){showToast(data.error);return;}

  saveAuthorName(name);
  showToast('Comment posted!');
  const cData = await api(`/comments?postId=${postId}`);
  document.getElementById('commentsSection').innerHTML = renderCommentsHTML(cData.comments||[], postId);
}

async function likeComment(e, postId, type, commentId, replyId){
  e.stopPropagation();
  const body = {postId,type,commentId};
  if(replyId) body.replyId=replyId;
  const data = await api('/like',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!data.ok){showToast(data.error);return;}
  const lKey = type==='reply'?`r:${replyId}`:`c:${commentId}`;
  likedComments[lKey]=data.liked; saveLikedComments();
  const countEl = document.getElementById(type==='reply'?`rl-${replyId}`:`cl-${commentId}`);
  if(countEl) countEl.textContent=data.count;
  const btn = e.currentTarget;
  btn.classList.toggle('liked',data.liked);
  btn.querySelector('svg').setAttribute('fill',data.liked?'currentColor':'none');
  showToast(data.liked?'Liked':'Unliked');
}

async function likePostSingle(id){
  const data = await api('/like',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({postId:id,type:'post'})
  });
  if(!data.ok){showToast(data.error);return;}
  likedPosts[id]=data.liked; saveLikedPosts();
  const btn = document.getElementById('post-like-btn');
  const cnt = document.getElementById('single-lc');
  if(btn){ btn.classList.toggle('liked',data.liked); btn.querySelector('svg').setAttribute('fill',data.liked?'currentColor':'none'); }
  if(cnt) cnt.textContent=data.count;
  showToast(data.liked?'Liked':'Unliked');
}

function copyLink(id){
  const url = `${SITE}?post=${id}`;
  navigator.clipboard.writeText(url).then(()=>showToast('Link copied!'));
}

function goList(e){ e&&e.preventDefault(); currentPostId=null; allPostsCache=[]; setUrl({post:null,page:null}); renderList(); scrollTo({top:0}); }

function renderMarkdown(md){
  if(!md) return '';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}

function escHtml(s){
  if(typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

route();
</script>
