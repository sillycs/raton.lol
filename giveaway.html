<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loading giveaway...</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/nishiki-teki" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/kunal" rel="stylesheet">

<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Raton Giveaways"/>
<meta property="og:title" content="🎁 Giveaway"/>
<meta property="og:description" content="A free giveaway is here, click to enter and check your win chances :)"/>

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --purple: #8b5cf6;
  --purple2: #a78bfa;
  --purple-dim: rgba(139,92,246,0.15);
  --text: #f4f4f8;
  --text2: #a0a0b8;
  --text3: #606078;
  --font-display: 'Nishiki-teki', sans-serif;
  --font-logo: 'kunal', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 20px;
}

* { cursor: url('https://raton.wtf/img/default.png') 0 0, auto; }
a, button, [role="button"] {
  cursor: url('https://raton.wtf/img/handpointing.png') 0 0, pointer;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

.rata-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.rata-sprite {
  position: absolute; opacity: 0;
  will-change: transform, opacity;
  filter: grayscale(20%) brightness(0.55);
  animation: rataFloat linear infinite;
  transform-origin: center; user-select: none;
}
@keyframes rataFloat {
  0%   { opacity: 0;    transform: translateY(0px)   rotate(0deg)  scale(1);    }
  8%   { opacity: 0.14; }
  50%  { opacity: 0.08; transform: translateY(-28px) rotate(7deg)  scale(1.05); }
  92%  { opacity: 0.14; }
  100% { opacity: 0;    transform: translateY(-55px) rotate(-4deg) scale(0.95); }
}

nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 60px;
  background: rgba(13,13,13,0.88);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-logo); font-weight: 800;
  font-size: 1.4rem; color: var(--text); text-decoration: none;
}

.page {
  position: relative; z-index: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem 5rem;
}

.container {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.6rem;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease both;
}

.card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(139,92,246,0.1), transparent 70%);
  pointer-events: none;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.kicker {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.kicker-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--purple);
  box-shadow: 0 0 8px rgba(139,92,246,0.7);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.6; transform: scale(1.3); }
}

.giveaway-title {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.giveaway-title .accent { color: var(--purple); }

.prize-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.2rem;
}
.prize-icon {
  width: 52px; height: 52px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--purple-dim);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: 12px;
  color: var(--purple2);
}
.prize-info { display: flex; flex-direction: column; gap: 3px; }
.prize-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.prize-name  { font-size: 1rem; font-weight: 600; color: var(--text); }
.prize-desc  { font-size: 0.82rem; color: var(--text2); margin-top: 2px; }

.winner-box {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(87, 242, 135, 0.06);
  border: 1px solid rgba(87, 242, 135, 0.2);
  border-radius: 14px;
  padding: 1rem 1.2rem;
}
.winner-trophy { width: 40px; height: 40px; object-fit: contain; }
.winner-info   { display: flex; flex-direction: column; gap: 2px; }
.winner-label  { font-size: 0.72rem; color: rgba(87,242,135,0.7); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.winner-name   { font-size: 0.95rem; font-weight: 600; color: #57f287; }

.cd-wrap { display: flex; flex-direction: column; gap: 10px; }
.cd-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.cd-units { display: flex; gap: 8px; align-items: center; }
.cd-unit  { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.cd-num-wrap {
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: 12px;
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 800;
  color: var(--text);
  letter-spacing: 0.02em;
}
.cd-sep { font-size: 1.2rem; color: var(--text3); font-weight: 300; margin-bottom: 18px; }
.cd-unit-label { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

.entries-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 0.8rem 1rem;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.e-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.875rem; color: var(--text);
}
.e-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--purple2);
}
.e-count { font-weight: 600; }
.e-chance {
  font-size: 0.78rem;
  color: var(--purple2);
  font-weight: 600;
  background: var(--purple-dim);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: 8px;
  padding: 3px 10px;
}

.input-wrap { display: flex; flex-direction: column; gap: 6px; }
.input-label { font-size: 0.75rem; color: var(--text3); font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }
.input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.input::placeholder { color: var(--text3); }
.input:focus {
  border-color: rgba(139,92,246,0.5);
  background: rgba(139,92,246,0.05);
}

.btn-wrap { width: 100%; }
.plan-cta {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--purple), #7c3aed);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-family: var(--font-body);
  font-size: 0.95rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.plan-cta:not(:disabled):hover {
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(139,92,246,0.3);
}
.plan-cta:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border2);
}

.status {
  min-height: 18px;
  font-size: 0.82rem;
  color: var(--text2);
  text-align: center;
}
.status.error { color: #f87171; }
.status.success { color: #57f287; }

.closed-msg {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.85rem;
  border-radius: 10px; padding: 0.75rem 1rem;
}
.closed-msg svg { flex-shrink: 0; }
.closed-msg.closed-admin {
  color: #f87171;
  background: rgba(248, 113, 113, 0.08);
  border: 1px solid rgba(248, 113, 113, 0.25);
}
.closed-msg.closed-winner {
  color: #57f287;
  background: rgba(87, 242, 135, 0.08);
  border: 1px solid rgba(87, 242, 135, 0.25);
}

.loader {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  padding: 4rem 2rem;
}
.loader-spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 0.85rem; color: var(--text3); }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 0.85rem; color: var(--text);
  opacity: 0; pointer-events: none;
  transition: all 0.25s ease;
  z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.footer-note {
  margin-top: 1.5rem;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 0.75rem; color: var(--text3);
  text-decoration: none;
}
.footer-note img { border-radius: 4px; }
.footer-note:hover { color: var(--text2); }

@keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

@media (max-width: 480px) {
  .cd-num-wrap { width: 48px; height: 48px; font-size: 1.2rem; }
  .cd-sep { font-size: 1rem; }
}
</style>
</head>
<body>

<div class="rata-bg" id="rataBg" aria-hidden="true"></div>

<nav>
  <a class="nav-logo" href="https://raton.wtf">
    <img src="https://raton.wtf/img/RATA.png" width="24" height="24" alt="Raton" onerror="this.style.display='none'">
    Raton
  </a>
</nav>

<div class="page">
  <div class="container">
    <div id="root">
      <div class="card">
        <div class="loader">
          <div class="loader-spinner"></div>
          <div class="loader-text">loading giveaway...</div>
        </div>
      </div>
    </div>
    <a class="footer-note" href="https://raton.wtf">
      <img src="https://raton.wtf/img/RATA.png" width="14" height="14" alt="" onerror="this.style.display='none'">
      &copy; 2026 SillyCS. All rights reserved
    </a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://steep-sun-85c4.sillykuadro.workers.dev';

(function() {
  var bg = document.getElementById('rataBg');
  var data = [
    {x:5,  y:10, s:52, d:20, dl:0 },
    {x:20, y:25, s:44, d:24, dl:5 },
    {x:38, y:5,  s:60, d:18, dl:9 },
    {x:55, y:18, s:48, d:26, dl:2 },
    {x:70, y:4,  s:66, d:22, dl:13},
    {x:85, y:22, s:44, d:30, dl:7 },
    {x:92, y:10, s:56, d:16, dl:11},
    {x:12, y:58, s:52, d:28, dl:3 },
    {x:30, y:72, s:72, d:32, dl:16},
    {x:52, y:62, s:44, d:20, dl:8 },
    {x:74, y:78, s:60, d:25, dl:6 },
    {x:90, y:52, s:48, d:19, dl:14},
  ];
  data.forEach(function(r) {
    var img = document.createElement('img');
    img.src = 'https://raton.wtf/img/RATA.png';
    img.className = 'rata-sprite'; img.alt = ''; img.draggable = false;
    img.style.cssText = 'width:'+r.s+'px;height:'+r.s+'px;left:'+r.x+'%;top:'+r.y+'%;animation-duration:'+r.d+'s;animation-delay:-'+r.dl+'s';
    bg.appendChild(img);
  });
})();

const toast = document.getElementById('toast');
function showToast(t) {
  toast.textContent = t;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}

var COLS = ['#8b5cf6','#a78bfa','#ffffff','#c4b5fd','#7c3aed','#ddd6fe'];
function confetti() {
  for (var i = 0; i < 600; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        var size = Math.random() * 9 + 4;
        el.style.cssText = [
          'position:fixed',
          'left:'+(Math.random()*100)+'vw',
          'top:-10px',
          'width:'+size+'px',
          'height:'+(size*0.6)+'px',
          'background:'+COLS[i%COLS.length],
          'border-radius:'+(Math.random()>0.5?'50%':'2px'),
          'animation:fall '+(2+Math.random()*2.5)+'s linear '+(Math.random()*0.8)+'s forwards',
          'transform:rotate('+(Math.random()*360)+'deg)',
          'opacity:'+(0.55+Math.random()*0.45),
          'pointer-events:none',
          'z-index:9999'
        ].join(';');
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 6000);
      }, i * 12);
    })(i);
  }
}

function parseMentions(text) {
  if (!text) return '';
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped.replace(/@([\w.\-]{2,32})/g, (_, name) =>
    `<span style="color:var(--purple2);background:var(--purple-dim);border-radius:4px;padding:0 4px;">@${name}</span>`
  );
}

function pad(n) { return String(n).padStart(2, '0'); }

function countdown(endsAt) {
  const d = endsAt - Date.now();
  if (d <= 0) return null;
  return {
    d: Math.floor(d / 86400000),
    h: Math.floor(d % 86400000 / 3600000),
    m: Math.floor(d % 3600000 / 60000),
    s: Math.floor(d % 60000 / 1000)
  };
}

function flipNum(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = pad(val);
}

function setStatus(msg, type = '') {
  const el = document.getElementById('st');
  if (!el) return;
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function patchOG(g, ended, hasWon) {
  const titleText = `${g.emoji} ${g.title} giveaway`;
  document.title = `${titleText}`;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', titleText);
}

const ID = new URLSearchParams(location.search).get('id');
const JOINED_KEY = `raton_joined_${ID}`;

const SVG = {
  gift: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>`,
  check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  arrow: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
  lock: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
  sparkles: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>`,
};

async function render() {
  const root = document.getElementById('root');

  if (!ID) {
    root.innerHTML = notFound('', 'Check the link or contact the host.');
    return;
  }

  const res = await fetch(`${WORKER}/giveaway?id=${encodeURIComponent(ID)}`).catch(() => null);

  if (!res?.ok) {
    root.innerHTML = notFound('Giveaway not found', 'Check the link or contact the host.');
    return;
  }

  const { giveaway: g } = await res.json();

  const ended  = !g.active || (g.endsAt && Date.now() > g.endsAt);
  const hasWon = !!g.winner;
  const joined = !!localStorage.getItem(JOINED_KEY);

  patchOG(g, ended, hasWon);

  if (hasWon) confetti();

  const descHtml = g.description
    ? `<div class="prize-desc">${parseMentions(g.description)}</div>`
    : '';

  const winChance = g.entryCount > 0
    ? ((1 / g.entryCount) * 100).toFixed(1) + '% win chance'
    : 'Be the first in!';

  root.innerHTML = `
  <div class="card">

    <div class="kicker">
      <div class="kicker-dot"></div>
      Raton Giveaway
    </div>

    <div>
      <h1 class="giveaway-title">Free <span class="accent">${g.title}</span></h1>
    </div>

    <div class="prize-row">
      <div class="prize-icon">${SVG.gift}</div>
      <div class="prize-info">
        <div class="prize-label">Prize</div>
        <div class="prize-name">${g.title}</div>
        ${descHtml}
      </div>
    </div>

    ${hasWon ? `
    <div class="winner-box">
      <img class="winner-trophy" src="https://raton.wtf/img/bigdonator.png" alt="Winner" onerror="this.style.display='none'">
      <div class="winner-info">
        <div class="winner-label">Winner Announced</div>
        <div class="winner-name">${g.winner}</div>
      </div>
    </div>
    ` : ''}

    ${!ended ? `
    <div class="cd-wrap">
      <div class="cd-label">Ends in</div>
      <div class="cd-units">
        <div class="cd-unit">
          <div class="cd-num-wrap"><span id="cdd">00</span></div>
          <div class="cd-unit-label">days</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num-wrap"><span id="cdh">00</span></div>
          <div class="cd-unit-label">hrs</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num-wrap"><span id="cdm">00</span></div>
          <div class="cd-unit-label">min</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num-wrap"><span id="cds">00</span></div>
          <div class="cd-unit-label">sec</div>
        </div>
      </div>
    </div>
    ` : ''}

    <div class="entries-row">
      <div class="e-pill">
        <div class="e-dot"></div>
        <span id="ec" class="e-count">${g.entryCount}</span>
        <span>participant${g.entryCount !== 1 ? 's' : ''}</span>
      </div>
      <div id="ech" class="e-chance">${winChance}</div>
    </div>

    ${!ended && !hasWon ? `

    <div class="input-wrap">
      <label class="input-label" for="un">Your Discord username</label>
      <input
        class="input" id="un" type="text" maxlength="32"
        placeholder="e.g. sillycs"
        autocomplete="off" spellcheck="false"
      />
    </div>

    <div class="btn-wrap">
      <button class="plan-cta" id="jb" ${joined ? 'disabled' : ''}>
        ${joined
          ? `${SVG.check} Already joined`
          : `Join giveaway ${SVG.arrow}`}
      </button>
    </div>

    <div class="status" id="st"></div>

    ` : `
    <div class="closed-msg ${hasWon ? 'closed-winner' : 'closed-admin'}">
      ${hasWon ? SVG.sparkles : SVG.lock}
      <span>${hasWon ? 'Congrats to the winner :)' : 'Giveaway closed by an administrator'}</span>
    </div>
    `}

  </div>
  `;

  if (!ended && !hasWon && g.endsAt) {
    const tick = () => {
      const cd = countdown(g.endsAt);
      if (!cd) return;
      flipNum('cdd', cd.d);
      flipNum('cdh', cd.h);
      flipNum('cdm', cd.m);
      flipNum('cds', cd.s);
    };
    tick();
    setInterval(tick, 1000);
  }

  const jb = document.getElementById('jb');
  if (jb && !joined) {
    jb.addEventListener('click', async () => {
      const un = document.getElementById('un').value.trim();

      if (!un) { setStatus('Enter your Discord username', 'error'); return; }
      if (un.length < 2) { setStatus('Username too short...', 'error'); return; }

      jb.disabled = true;
      jb.innerHTML = 'Joining\u2026';
      setStatus('');

      try {
        const r = await fetch(`${WORKER}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ giveawayId: ID, username: un })
        });
        const d = await r.json();

        if (d.ok) {
          jb.innerHTML = `${SVG.check} Joined`;
          setStatus("You're in! Good luck :3", 'success');
          localStorage.setItem(JOINED_KEY, '1');
          document.getElementById('ec').textContent = d.count;
          document.getElementById('ech').textContent = ((1/d.count)*100).toFixed(1) + '% win chance';
        } else {
          jb.disabled = false;
          jb.innerHTML = `Join giveaway ${SVG.arrow}`;
          setStatus(d.error || 'Something went wrong...', 'error');
        }
      } catch {
        jb.disabled = false;
        jb.innerHTML = `Join giveaway ${SVG.arrow}`;
        setStatus('Network error. Try again.', 'error');
      }
    });
  }
}

function notFound(h, p) {
  return `Sorry, this giveaway doesn't exist, please use a valid giveaway link... :(`;
}

render();
</script>
