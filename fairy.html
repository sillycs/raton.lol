
<style>
  #stage {
    position: relative;
    width: 100%;
    height: 520px;
    background: radial-gradient(ellipse at 35% 30%, #0d0520 0%, #05020f 65%, #000 100%);
    overflow: hidden;
    border-radius: 12px;
  }
  #stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 38%, rgba(255,255,255,.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 52% 8%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 58%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 14% 78%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 82%, rgba(255,255,255,.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 68%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 63% 32%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 52%, rgba(255,255,255,.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 37% 88%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 44%, rgba(255,255,255,.35) 0%, transparent 100%);
    pointer-events: none;
  }
  #sparkleCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #fairy {
    position: absolute;
    width: 72px;
    height: 72px;
    pointer-events: none;
    transform-origin: center center;
    filter: drop-shadow(0 0 6px rgba(160,255,190,.85)) drop-shadow(0 0 18px rgba(100,210,140,.5));
  }
</style>

<div id="stage">
  <canvas id="sparkleCanvas"></canvas>
  <img id="fairy" src="fairy.gif" alt="">
</div>

<script>
const stage   = document.getElementById('stage');
const canvas  = document.getElementById('sparkleCanvas');
const ctx     = canvas.getContext('2d');
const fairy   = document.getElementById('fairy');
const FW = 72, FH = 72;

function resize() {
  canvas.width  = stage.clientWidth;
  canvas.height = stage.clientHeight;
}
resize();
new ResizeObserver(resize).observe(stage);

const sparkles = [];

const COLORS = [
  [255,255,200],[180,255,220],[255,210,255],
  [255,240,160],[200,255,255],[255,185,210]
];

function spawn(x, y, vx, vy) {
  const n = Math.floor(Math.random() * 2) + 1;
  for (let i = 0; i < n; i++) {
    const c = COLORS[Math.floor(Math.random() * COLORS.length)];
    const spd = Math.random() * .9 + .2;
    const a = Math.random() * Math.PI * 2;
    sparkles.push({
      x, y,
      vx: Math.cos(a) * spd + vx * .05,
      vy: Math.sin(a) * spd + vy * .05,
      size: Math.random() * 4 + 1.5,
      color: c,
      alpha: 1,
      decay: Math.random() * .016 + .009,
      rot: Math.random() * Math.PI * 2,
      rotSpd: (Math.random() - .5) * .1,
      pulse: Math.random() * Math.PI * 2,
      star: Math.random() < .6
    });
  }
}

function star4(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const rad = i % 2 === 0 ? r : r * .22;
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    i === 0 ? ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad)
             : ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
  }
  ctx.closePath();
  ctx.restore();
}

function cross(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  const w = r * .14;
  ctx.beginPath();
  ctx.rect(-r, -w, r*2, w*2);
  ctx.rect(-w, -r, w*2, r*2);
  ctx.restore();
}

function tickSparkles() {
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += .012; s.vx *= .985;
    s.alpha -= s.decay;
    s.rot += s.rotSpd;
    s.pulse += .14;
    if (s.alpha <= 0) { sparkles.splice(i, 1); continue; }

    const pf = 1 + Math.sin(s.pulse) * .2;
    const r  = s.size * pf * s.alpha;
    const [cr,cg,cb] = s.color;

    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 2.2);
    g.addColorStop(0, `rgba(${cr},${cg},${cb},${s.alpha * .35})`);
    g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(s.x, s.y, r*2.2, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = `rgba(${cr},${cg},${cb},${s.alpha})`;
    if (s.star) { star4(s.x, s.y, r, s.rot); ctx.fill(); }
    else { cross(s.x, s.y, r, s.rot); ctx.fill(); }

    ctx.fillStyle = `rgba(255,255,255,${s.alpha * .85})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, r*.18, 0, Math.PI*2); ctx.fill();
  }
}

let t = 0;
let prevAngle = 0;
let spawnAcc = 0;

function noise(t, seed) {
  return Math.sin(t * 1.1 + seed) * .4
       + Math.sin(t * 2.4 + seed*2) * .2
       + Math.sin(t * .68 + seed*3) * .4;
}

function pos(t) {
  const W = canvas.width, H = canvas.height;
  const cx = W * .5, cy = H * .5;
  const rx = W * .3, ry = H * .28;
  const bx = cx + rx * Math.sin(t * 1.0 + .3);
  const by = cy + ry * Math.sin(t * 1.7 + 1.1);
  const dx = W * .05 * noise(t * .16, 1.2);
  const dy = H * .04 * noise(t * .20, 3.7);
  const fx = 2 * Math.sin(t * 8.8 + .5);
  const fy = 1.5 * Math.cos(t * 10.6 + 1.2);
  return { x: bx+dx+fx, y: by+dy+fy };
}

function vel(t) {
  const dt = .006;
  const p0 = pos(t - dt), p1 = pos(t + dt);
  return { vx: (p1.x-p0.x)/(2*dt), vy: (p1.y-p0.y)/(2*dt) };
}

function speedMult(t) {
  return .7 + Math.abs(Math.sin(t * 1.7)) * .55;
}

function frame() {
  ctx.fillStyle = 'rgba(5,2,16,.20)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  t += .014 * speedMult(t);

  const p = pos(t);
  const v = vel(t);

  const targetAngle = Math.atan2(v.vy, v.vx);
  let delta = targetAngle - prevAngle;
  if (delta >  Math.PI) delta -= Math.PI*2;
  if (delta < -Math.PI) delta += Math.PI*2;
  const angle = prevAngle + delta * .10;
  prevAngle = angle;

  fairy.style.left = (p.x - FW/2) + 'px';
  fairy.style.top  = (p.y - FH/2) + 'px';

  const sx = v.vx < 0 ? -1 : 1;
  const tilt = (angle * 180/Math.PI) * .2;
  fairy.style.transform = `scaleX(${sx}) rotate(${tilt}deg)`;

  const spd = Math.sqrt(v.vx**2 + v.vy**2);
  spawnAcc += spd;
  if (spawnAcc > 7) {
    spawnAcc = 0;
    const tx = p.x - Math.cos(angle)*16;
    const ty = p.y - Math.sin(angle)*16;
    spawn(tx, ty, v.vx, v.vy);
    if (Math.random() < .25)
      spawn(p.x + (Math.random()-.5)*12, p.y + (Math.random()-.5)*12, v.vx*.15, v.vy*.15);
  }

  const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 48);
  gr.addColorStop(0, 'rgba(130,255,170,.06)');
  gr.addColorStop(1, 'rgba(130,255,170,0)');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.arc(p.x, p.y, 48, 0, Math.PI*2); ctx.fill();

  tickSparkles();
  requestAnimationFrame(frame);
}

setTimeout(() => requestAnimationFrame(frame), 80);
</script>
