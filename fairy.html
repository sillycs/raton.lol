<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(ellipse at 30% 20%, #0d0520 0%, #050210 60%, #000000 100%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #fairy {
    position: fixed;
    width: 80px;
    height: 80px;
    pointer-events: none;
    z-index: 10;
    transform-origin: center center;
    filter: drop-shadow(0 0 8px rgba(180, 255, 200, 0.9))
            drop-shadow(0 0 20px rgba(120, 220, 160, 0.6))
            drop-shadow(0 0 40px rgba(80, 180, 120, 0.3));
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>
<img id="fairy" src="fairy.gif" alt="fairy">

<script>
const canvas = document.getElementById('sparkleCanvas');
const ctx    = canvas.getContext('2d');
const fairy  = document.getElementById('fairy');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const sparkles = [];

const COLORS = [
  [255, 255, 200],
  [180, 255, 220],
  [255, 210, 255],
  [255, 240, 150],
  [200, 255, 255],
  [255, 180, 200],
];

function spawnSparkles(x, y, vx, vy) {
  const count = Math.floor(Math.random() * 3) + 2;
  for (let i = 0; i < count; i++) {
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const speed = Math.random() * 1.2 + 0.3;
    const angle = Math.random() * Math.PI * 2;
    const size  = Math.random() * 5 + 2;
    const type  = Math.random() < 0.6 ? 'star' : 'cross';

    sparkles.push({
      x, y,
      vx: Math.cos(angle) * speed + vx * 0.08,
      vy: Math.sin(angle) * speed + vy * 0.08,
      size,
      maxSize: size,
      color,
      alpha: 1,
      decay: Math.random() * 0.018 + 0.010,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.12,
      type,
      pulse: Math.random() * Math.PI * 2,
    });
  }
}

function drawStar4(ctx, x, y, r, rotation) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.beginPath();
  const outer = r;
  const inner = r * 0.25;
  for (let i = 0; i < 8; i++) {
    const rad = i % 2 === 0 ? outer : inner;
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    if (i === 0) ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad);
    else ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
  }
  ctx.closePath();
  ctx.restore();
}

function drawCross(ctx, x, y, r, rotation) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.beginPath();
  const w = r * 0.15;
  ctx.rect(-r, -w, r * 2, w * 2);
  ctx.rect(-w, -r, w * 2, r * 2);
  ctx.restore();
}

function updateSparkles() {
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.x        += s.vx;
    s.y        += s.vy;
    s.vy       += 0.015;
    s.vx       *= 0.98;
    s.alpha    -= s.decay;
    s.rotation += s.rotSpeed;
    s.pulse    += 0.15;

    if (s.alpha <= 0) { sparkles.splice(i, 1); continue; }

    const pulseFactor = 1 + Math.sin(s.pulse) * 0.25;
    const r = s.size * pulseFactor * s.alpha;
    const [cr, cg, cb] = s.color;

    const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 2.5);
    grd.addColorStop(0, `rgba(${cr},${cg},${cb},${s.alpha * 0.4})`);
    grd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(${cr},${cg},${cb},${s.alpha})`;
    if (s.type === 'star') {
      drawStar4(ctx, s.x, s.y, r, s.rotation);
      ctx.fill();
    } else {
      ctx.save();
      drawCross(ctx, s.x, s.y, r, s.rotation);
      ctx.fill();
      ctx.restore();
    }

    ctx.fillStyle = `rgba(255,255,255,${s.alpha * 0.9})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

let t = 0;

function organicNoise(t, seed) {
  return Math.sin(t * 1.1 + seed)    * 0.4
       + Math.sin(t * 2.3 + seed * 2) * 0.2
       + Math.sin(t * 0.7 + seed * 3) * 0.4;
}

function getPosition(t) {
  const W = canvas.width;
  const H = canvas.height;

  const cx = W * 0.5;
  const cy = H * 0.5;

  const rx = W * 0.38;
  const ry = H * 0.36;

  const baseX = cx + rx * Math.sin(t * 1.0 + 0.3);
  const baseY = cy + ry * Math.sin(t * 1.7 + 1.1);

  const driftX = W * 0.07 * organicNoise(t * 0.18, 1.2);
  const driftY = H * 0.06 * organicNoise(t * 0.22, 3.7);

  const flutterX = 3 * Math.sin(t * 9.3 + 0.5);
  const flutterY = 2 * Math.cos(t * 11.1 + 1.2);

  return {
    x: baseX + driftX + flutterX,
    y: baseY + driftY + flutterY,
  };
}

function getVelocity(t) {
  const dt = 0.005;
  const p0 = getPosition(t - dt);
  const p1 = getPosition(t + dt);
  return {
    vx: (p1.x - p0.x) / (2 * dt),
    vy: (p1.y - p0.y) / (2 * dt),
  };
}

let baseSpeed = 0.018;

function getSpeedMult(t) {
  const { vy } = getVelocity(t);
  const norm = Math.abs(Math.sin(t * 1.7));
  return 0.65 + norm * 0.7;
}

let prevPos    = getPosition(0);
let prevAngle  = 0;
let spawnTimer = 0;

const FAIRY_W = 80;
const FAIRY_H = 80;

function frame() {
  ctx.fillStyle = 'rgba(5, 2, 16, 0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  t += baseSpeed * getSpeedMult(t);

  const pos = getPosition(t);
  const vel = getVelocity(t);

  const targetAngle = Math.atan2(vel.vy, vel.vx);

  let delta = targetAngle - prevAngle;
  if (delta >  Math.PI) delta -= Math.PI * 2;
  if (delta < -Math.PI) delta += Math.PI * 2;
  const angle = prevAngle + delta * 0.12;
  prevAngle = angle;

  const movingLeft = vel.vx < 0;
  const scaleX     = movingLeft ? -1 : 1;

  fairy.style.left = (pos.x - FAIRY_W / 2) + 'px';
  fairy.style.top  = (pos.y - FAIRY_H / 2) + 'px';

  const tiltDeg = (angle * 180 / Math.PI) * 0.25;
  fairy.style.transform = `scaleX(${scaleX}) rotate(${tiltDeg}deg)`;

  const speed = Math.sqrt(vel.vx ** 2 + vel.vy ** 2);
  spawnTimer += speed;
  if (spawnTimer > 6) {
    spawnTimer = 0;
    const trailX = pos.x - Math.cos(angle) * 18;
    const trailY = pos.y - Math.sin(angle) * 18;
    spawnSparkles(trailX, trailY, vel.vx, vel.vy);

    if (Math.random() < 0.3) {
      const wingOff = 14;
      spawnSparkles(
        pos.x + (Math.random() - 0.5) * wingOff,
        pos.y + (Math.random() - 0.5) * wingOff,
        vel.vx * 0.2, vel.vy * 0.2
      );
    }
  }

  const glowR = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 55);
  glowR.addColorStop(0, 'rgba(140, 255, 180, 0.07)');
  glowR.addColorStop(1, 'rgba(140, 255, 180, 0)');
  ctx.fillStyle = glowR;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 55, 0, Math.PI * 2);
  ctx.fill();

  updateSparkles();

  prevPos = pos;
  requestAnimationFrame(frame);
}

setTimeout(() => requestAnimationFrame(frame), 100);
</script>
</body>
</html>
