<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translate(-50%, -50%);
    object-fit: cover;
}
</style>
</head>

<body>

<video id="vid" autoplay muted loop playsinline>
    <source src="coolvideo.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("vid");

document.addEventListener("click", () => {
    video.muted = false;
    video.volume = 1.0;
    video.play();
}, { once: true });
</script>

</body>
</html>
