<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

#enter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 40px;
    font-size: 24px;
    background: black;
    color: white;
    border: 2px solid white;
    cursor: pointer;
}

video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}
</style>
</head>

<body>

<button id="enter">Verify yourself before entering</button>

<video id="vid" loop>
    <source src="coolvideo.mp4" type="video/mp4">
</video>

<script>
const btn = document.getElementById("enter");
const video = document.getElementById("vid");

btn.onclick = () => {
    btn.style.display = "none";
    video.style.display = "block";

    if (video.requestFullscreen) {
        video.requestFullscreen();
    }

    video.muted = false;
    video.volume = 1.0;
    video.play();
};
</script>

</body>
