<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
}

input,textarea,button{
  display:block;
  margin-bottom:10px;
  padding:8px;
}

textarea{
  min-height:60px;
}

.gw-item{
  border:1px solid #999;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div id="root">
  <h1>Raton Admin</h1>

  <input
    type="password"
    id="keyIn"
    placeholder="Admin Key"
    onkeydown="if(event.key==='Enter')unlock()"
  />

  <button onclick="unlock()">Login</button>

  <div id="lockMsg"></div>
</div>

<script>
const WORKER   = 'https://steep-sun-85c4.sillykuadro.workers.dev';
const BASE_URL = 'https://raton.lol/giveaway';

let KEY = '';

function unlock(){

  const k = document.getElementById('keyIn').value.trim();

  if(!k){
    showMsg('lockMsg','Enter your admin key');
    return;
  }

  KEY = k;

  renderAdmin();
}

function renderAdmin(){

  document.getElementById('root').innerHTML = `
    <h1>Raton Admin</h1>

    <h2>Create Giveaway</h2>

    <input id="nId" placeholder="ID"/>

    <input id="nEmoji" placeholder="Emoji"/>

    <input id="nTitle" placeholder="Title"/>

    <textarea id="nDesc" placeholder="Description"></textarea>

    <input
      id="nHours"
      type="number"
      value="24"
      placeholder="Hours"
    />

    <button onclick="createGW()">Create</button>

    <div id="createMsg"></div>

    <hr>

    <h2>Giveaways</h2>

    <div id="gwList">Loading...</div>
  `;

  loadList();
}

async function createGW(){

  const id = document
    .getElementById('nId')
    .value
    .trim()
    .replace(/[^a-zA-Z0-9_-]/g,'');

  const title = document
    .getElementById('nTitle')
    .value
    .trim();

  const desc = document
    .getElementById('nDesc')
    .value
    .trim();

  const emoji = document
    .getElementById('nEmoji')
    .value
    .trim() || '🎁';

  const hours = Number(
    document.getElementById('nHours').value
  );

  if(!id || !title){
    showMsg('createMsg','ID and title are required');
    return;
  }

  try{

    const r = await post('/admin/create',{
      adminKey:KEY,
      id,
      title,
      description:desc,
      emoji,
      hours
    });

    if(r.ok){

      const ids = JSON.parse(
        localStorage.getItem('gw_ids') || '[]'
      );

      if(!ids.includes(id)){
        ids.push(id);

        localStorage.setItem(
          'gw_ids',
          JSON.stringify(ids)
        );
      }

      showMsg(
        'createMsg',
        `Created:
        <a href="${BASE_URL}?id=${id}" target="_blank">
          ${BASE_URL}?id=${id}
        </a>`
      );

      loadList();

    } else {
      showMsg('createMsg',r.error);
    }

  } catch(e){
    showMsg('createMsg',e.message);
  }
}

async function loadList(){

  const ids = JSON.parse(
    localStorage.getItem('gw_ids') || '[]'
  );

  const el = document.getElementById('gwList');

  if(!ids.length){
    el.innerHTML = 'No giveaways';
    return;
  }

  el.innerHTML = '';

  for(const id of [...ids].reverse()){

    try{

      const res = await fetch(
        `${WORKER}/giveaway?id=${id}`
      );

      const data = await res.json();

      if(!data.ok) continue;

      const g = data.giveaway;

      const ended =
        !g.active || Date.now() > g.endsAt;

      const div = document.createElement('div');

      div.className = 'gw-item';

      div.innerHTML = `
        <div>
          <b>${g.emoji || '🎁'} ${g.title}</b>
        </div>

        <div>
          ${id} · ${g.entryCount} entries
          ${g.winner ? ' · Winner: ' + g.winner : ''}
        </div>

        <br>

        <button onclick="pickWinner('${id}')">
          Pick Winner
        </button>

        <button
          onclick="endGW('${id}')"
          ${ended ? 'disabled' : ''}
        >
          End
        </button>

        <a
          href="${BASE_URL}?id=${id}"
          target="_blank"
        >
          Open
        </a>
      `;

      el.appendChild(div);

    } catch(e){}
  }
}

async function pickWinner(id){

  if(!confirm(`Pick winner for ${id}?`)) return;

  const r = await post('/admin/winner',{
    adminKey:KEY,
    giveawayId:id
  });

  if(r.ok){
    alert("Winner: " + r.winner);
  } else {
    alert("Error: " + r.error);
  }

  loadList();
}

async function endGW(id){

  if(!confirm(`End ${id}?`)) return;

  await post('/admin/end',{
    adminKey:KEY,
    giveawayId:id
  });

  loadList();
}

function post(path,body){

  return fetch(WORKER + path,{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify(body)
  }).then(r => r.json());
}

function showMsg(id,txt){

  const e = document.getElementById(id);

  if(e){
    e.innerHTML = txt;
  }
}
</script>

</body>
</html>
