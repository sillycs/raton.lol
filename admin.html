<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="icon" type="image/png" href="https://raton.lol/img/RATA.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/kunal" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --surface2:#181818;
  --surface3:#1e1e1e;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --purple-dim:rgba(139,92,246,0.15);
  --text:#f4f4f8;
  --text2:#a0a0b8;
  --text3:#606078;
  --red:#ef4444;
  --red-dim:rgba(239,68,68,0.15);
  --green:#22c55e;
  --green-dim:rgba(34,197,94,0.12);
  --yellow:#f59e0b;
  --font-logo:'kunal',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--purple2);text-decoration:none}
a:hover{text-decoration:underline}
.layout{display:flex;flex:1;min-height:100vh}
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:1.2rem 0;
  position:sticky;top:0;height:100vh;
  overflow-y:auto;
}
.sidebar-logo{
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-logo);font-size:1.1rem;font-weight:800;
  color:var(--text);padding:0 1.2rem 1.2rem;
  border-bottom:1px solid var(--border);margin-bottom:0.8rem;
}
.sidebar-section{padding:0 0.8rem;margin-bottom:0.4rem}
.sidebar-label{
  font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--text3);padding:0.4rem 0.6rem;margin-bottom:0.2rem;
}
.sidebar-item{
  display:flex;align-items:center;gap:8px;
  padding:0.5rem 0.8rem;border-radius:8px;
  color:var(--text2);font-size:0.82rem;font-weight:500;
  cursor:pointer;transition:.15s;user-select:none;
}
.sidebar-item:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.sidebar-item.active{background:var(--purple-dim);color:var(--purple2)}
.sidebar-item svg{flex-shrink:0;opacity:.7}
.sidebar-footer{margin-top:auto;padding:0.8rem;border-top:1px solid var(--border)}
.sidebar-footer span{font-size:0.72rem;color:var(--text3)}
.main{flex:1;display:flex;flex-direction:column;overflow-x:hidden}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:58px;
  background:rgba(10,10,10,0.9);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(16px);
}
.topbar-title{font-size:0.9rem;font-weight:600;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:0.6rem}
.content{padding:2rem;flex:1}
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.login-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:2.4rem;width:100%;max-width:360px;
  text-align:center;
}
.login-card h1{font-family:var(--font-logo);font-size:1.5rem;margin-bottom:0.3rem}
.login-card p{color:var(--text3);font-size:0.82rem;margin-bottom:1.6rem}
.login-err{
  color:var(--red);font-size:0.78rem;text-align:center;
  margin-top:0.5rem;min-height:1.2em;
}
.input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:8px;
  padding:0.6rem 0.9rem;
  color:var(--text);font-family:var(--font-body);font-size:0.875rem;
  outline:none;transition:.2s;
}
.input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,0.12)}
.textarea{min-height:120px;resize:vertical;line-height:1.5}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:0.5rem 1.1rem;border-radius:8px;border:none;
  font-family:var(--font-body);font-size:0.8rem;font-weight:600;
  transition:.2s;cursor:pointer;
}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:#7c3aed}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.btn-danger{background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-success{background:var(--green-dim);border:1px solid rgba(34,197,94,0.3);color:var(--green)}
.btn-sm{padding:0.35rem 0.7rem;font-size:0.73rem}
.btn:disabled{opacity:.45;pointer-events:none}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:1.4rem;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem;
}
.card-title{font-size:0.9rem;font-weight:600;color:var(--text)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:1.2rem;
}
.stat-label{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:0.3rem}
.stat-value{font-size:1.8rem;font-weight:700;color:var(--text)}
.stat-sub{font-size:0.72rem;color:var(--text3);margin-top:0.2rem}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:0.7rem 1rem;text-align:left;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:0.8rem 1rem;font-size:0.82rem;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.td-title{color:var(--text);font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-id{font-family:monospace;font-size:0.72rem;color:var(--text3)}
.td-actions{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap}
.badge{
  display:inline-block;padding:0.2rem 0.55rem;border-radius:99px;
  font-size:0.67rem;font-weight:700;letter-spacing:0.06em;
}
.badge-pub{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.badge-draft{background:rgba(245,158,11,0.12);color:var(--yellow);border:1px solid rgba(245,158,11,0.25)}
.badge-del{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.form-grid{display:grid;gap:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:0.4rem}
.form-label{font-size:0.72rem;font-weight:600;color:var(--text2);letter-spacing:0.04em}
.form-hint{font-size:0.68rem;color:var(--text3)}
.img-upload-area{
  border:2px dashed var(--border2);border-radius:10px;
  padding:1.2rem;text-align:center;
  transition:.2s;cursor:pointer;position:relative;
}
.img-upload-area:hover{border-color:var(--purple);background:var(--purple-dim)}
.img-upload-area input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.img-upload-area p{font-size:0.78rem;color:var(--text3);margin-top:0.4rem}
.img-preview{
  width:100%;max-height:160px;object-fit:cover;
  border-radius:8px;margin-top:0.6rem;
  border:1px solid var(--border);
  display:none;
}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);z-index:200;
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
}
.modal-overlay.hidden{display:none}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:2rem;width:100%;max-width:640px;
  max-height:90vh;overflow-y:auto;
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.modal-title{font-size:1rem;font-weight:700;color:var(--text)}
.modal-close{
  background:none;border:none;color:var(--text3);
  font-size:1.2rem;line-height:1;padding:4px;
  cursor:pointer;transition:color .2s;
}
.modal-close:hover{color:var(--text)}
.comment-item{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:0.9rem 1rem;margin-bottom:0.7rem;
}
.comment-item.deleted{opacity:.5}
.comment-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;flex-wrap:wrap}
.comment-meta-name{font-weight:600;color:var(--text);font-size:0.82rem}
.comment-meta-ts{font-size:0.7rem;color:var(--text3)}
.comment-meta-ip{font-family:monospace;font-size:0.68rem;color:var(--text3);background:var(--surface);padding:2px 6px;border-radius:4px}
.comment-text{font-size:0.82rem;color:var(--text2);line-height:1.5;margin-bottom:0.5rem}
.comment-text.deleted-msg{font-style:italic;color:var(--text3)}
.reply-indent{margin-left:1.2rem;margin-top:0.5rem}
.ip-list{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.4rem}
.ip-tag{font-family:monospace;font-size:0.68rem;background:var(--surface2);padding:2px 8px;border-radius:4px;color:var(--text3);border:1px solid var(--border)}
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:0.7rem 1.1rem;
  font-size:0.82rem;color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:9999;
  transform:translateY(12px);opacity:0;transition:.3s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}
.search-bar{position:relative;margin-bottom:1.2rem}
.search-bar input{padding-left:2.2rem}
.search-bar svg{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:0.85rem}
.section-divider{
  display:flex;align-items:center;gap:0.6rem;
  font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text3);margin:1.6rem 0 0.8rem;
}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.gw-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:1.2rem;margin-bottom:0.8rem;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
}
.gw-info{flex:1;min-width:0}
.gw-title{font-weight:600;color:var(--text);font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gw-meta{font-size:0.72rem;color:var(--text3);margin-top:0.2rem}
.gw-actions{display:flex;gap:0.4rem;flex-shrink:0;flex-wrap:wrap}
@media(max-width:900px){
  .sidebar{display:none}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>Raton Admin</h1>
    <p>Enter your admin key to continue</p>
    <div style="display:flex;flex-direction:column;gap:0.8rem">
      <input type="password" class="input" id="keyIn" placeholder="Admin key" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-primary" style="justify-content:center;width:100%" onclick="login()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Login
      </button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>
</div>

<div class="layout" id="appWrap" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="https://raton.lol/img/RATA.png" width="22" height="22" alt="">
      Admin
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Blog</div>
      <div class="sidebar-item active" id="nav-dashboard" onclick="showView('dashboard')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" id="nav-posts" onclick="showView('posts')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Posts
      </div>
      <div class="sidebar-item" id="nav-new" onclick="showView('new')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Post
      </div>
      <div class="sidebar-item" id="nav-comments" onclick="showView('comments')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Comments
      </div>
    </div>
    <div class="sidebar-section" style="margin-top:0.5rem">
      <div class="sidebar-label">Giveaways</div>
      <div class="sidebar-item" id="nav-giveaways" onclick="showView('giveaways')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        Giveaways
      </div>
      <div class="sidebar-item" id="nav-giveaway-new" onclick="showView('giveaway-new')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Giveaway
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="showView('new')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Post
        </button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
    <div class="content" id="mainContent">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="postModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Edit Post</span>
      <button class="modal-close" onclick="closeModal('postModal')">&#x2715;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="commentsModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Comments</span>
      <button class="modal-close" onclick="closeModal('commentsModal')">&#x2715;</button>
    </div>
    <div id="commentsModalBody"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="likesModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">Like IPs</span>
      <button class="modal-close" onclick="closeModal('likesModal')">&#x2715;</button>
    </div>
    <div id="likesModalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BLOG_WORKER = 'https://bold-glitter-3cd0.sillycro.workers.dev';
const GW_WORKER   = 'https://steep-sun-85c4.sillykuadro.workers.dev';
const BLOG_URL    = 'https://raton.lol/blog';
const GW_URL      = 'https://raton.lol/giveaway';

let ADMIN_KEY = '';
let allPosts = [];
let gwList = [];

async function login(){
  const k = document.getElementById('keyIn').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if(!k){ errEl.textContent='Enter your admin key'; return; }

  const btn = document.querySelector('#loginWrap .btn-primary');
  btn.disabled = true; btn.textContent = 'Checking...';

  try{
    const r = await fetch(BLOG_WORKER+'/admin/posts?adminKey='+encodeURIComponent(k));
    const data = await r.json();
    if(!data.ok){
      errEl.textContent = 'Invalid admin key. Access denied.';
      btn.disabled=false; btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Login';
      return;
    }
    ADMIN_KEY = k;
    allPosts = data.posts||[];
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').style.display='flex';
    showView('dashboard');
  } catch(e){
    errEl.textContent = 'Network error. Check connection.';
    btn.disabled=false; btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Login';
  }
}

function logout(){
  ADMIN_KEY=''; allPosts=[];
  document.getElementById('appWrap').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('keyIn').value='';
  document.getElementById('loginErr').textContent='';
  const btn = document.querySelector('#loginWrap .btn-primary');
  btn.disabled=false;
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Login';
}

function toast(msg, dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function esc(s){ if(typeof s!=='string')return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(ts){ return new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}

async function api(worker, path, opts={}){
  const r = await fetch(worker+path, opts);
  return r.json();
}
async function blogGet(path){ return api(BLOG_WORKER, path+'&adminKey='+encodeURIComponent(ADMIN_KEY)); }
async function blogPost(path,body){ return api(BLOG_WORKER, path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminKey:ADMIN_KEY,...body})}); }
async function gwPost(path,body){ return api(GW_WORKER, path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminKey:ADMIN_KEY,...body})}); }
async function gwGet(path){ return api(GW_WORKER, path); }

function showView(v){
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${v}`);
  if(navEl) navEl.classList.add('active');
  const titles={dashboard:'Dashboard',posts:'All Posts',new:'New Post',comments:'Moderation',giveaways:'Giveaways',['giveaway-new']:'New Giveaway'};
  document.getElementById('topbarTitle').textContent = titles[v]||v;
  const c = document.getElementById('mainContent');
  c.innerHTML='<div class="spinner"></div>';
  if(v==='dashboard') renderDashboard();

let pendingImageBase64 = null;
let pendingImageMime = null;

function handleImageFile(file, previewId, labelId){
  if(!file) return;
  const allowed = ['image/jpeg','image/png','image/gif','image/webp'];
  if(!allowed.includes(file.type)){toast('Only JPG, PNG, GIF, WEBP allowed');return;}
  if(file.size > 5*1024*1024){toast('Image must be under 5MB');return;}
  const reader = new FileReader();
  reader.onload = e => {
    pendingImageBase64 = e.target.result.split(',')[1];
    pendingImageMime = file.type;
    const preview = document.getElementById(previewId);
    if(preview){ preview.src=e.target.result; preview.style.display='block'; }
    const lbl = document.getElementById(labelId);
    if(lbl) lbl.textContent = file.name;
  };
  reader.readAsDataURL(file);
}

async function createPost(){
  const title = document.getElementById('nTitle').value.trim();
  const body = document.getElementById('nBody').value.trim();
  const author = document.getElementById('nAuthor').value.trim()||'Admin';
  const excerpt = document.getElementById('nExcerpt').value.trim();
  const tags = document.getElementById('nTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const published = document.getElementById('nPublish').checked;
  if(!title){toast('Title is required');return;}
  if(!body){toast('Content is required');return;}
  const btn = document.getElementById('createBtn');
  btn.disabled=true; btn.textContent='Publishing...';

  let imageUrl = null;
  if(pendingImageBase64){
    const upRes = await blogPost('/admin/upload-image',{imageData:pendingImageBase64,mimeType:pendingImageMime});
    if(!upRes.ok){toast('Image upload failed: '+upRes.error);btn.disabled=false;btn.textContent='Publish Post';return;}
    imageUrl = upRes.url;
  }

  const data = await blogPost('/admin/post',{title,body,excerpt,author,tags,imageUrl,published});
  if(!data.ok){toast(data.error);btn.disabled=false;btn.textContent='Publish Post';return;}
  toast('Post published! ID: '+data.post.id);
  pendingImageBase64=null; pendingImageMime=null;
  allPosts=[];
  setTimeout(()=>showView('posts'),1000);
}

async function saveEdit(id){
  let imageUrl = undefined;
  if(pendingImageBase64){
    const upRes = await blogPost('/admin/upload-image',{imageData:pendingImageBase64,mimeType:pendingImageMime});
    if(!upRes.ok){toast('Image upload failed: '+upRes.error);return;}
    imageUrl = upRes.url;
  }
  const payload = {
    id,
    title:document.getElementById('eTitle').value.trim(),
    author:document.getElementById('eAuthor').value.trim(),
    excerpt:document.getElementById('eExcerpt').value.trim(),
    body:document.getElementById('eBody').value.trim(),
    tags:document.getElementById('eTags').value.split(',').map(t=>t.trim()).filter(Boolean)
  };
  if(imageUrl !== undefined) payload.imageUrl = imageUrl;
  const data = await blogPost('/admin/update-post', payload);
  if(!data.ok){toast(data.error);return;}
  toast('Post updated!');
  pendingImageBase64=null; pendingImageMime=null;
  closeModal('postModal');
  allPosts=[];
  renderPosts();
}

function renderAdminComments(comments, postId){
  if(!comments.length) return '<div class="empty">No comments yet</div>';
  return comments.map(c=>`
    <div class="comment-item ${c.deleted?'deleted':''}" id="ac-${c.id}">
      <div class="comment-meta">
        <span class="comment-meta-name">${esc(c.deleted?'[deleted]':c.name)}</span>
        <span class="comment-meta-ts">${timeAgo(c.ts)}</span>
        ${!c.deleted?`<span class="comment-meta-ip">${esc(c.ip||'?')}</span>`:''}
        ${c.deleted?'<span class="badge badge-del">Deleted</span>':''}
        <span style="margin-left:auto;font-size:0.72rem;color:var(--text3)">${c.likes||0} likes · ID: ${esc(c.id)}</span>
      </div>
      <div class="comment-text ${c.deleted?'deleted-msg':''}">${esc(c.body)}</div>
      ${!c.deleted?`<div style="display:flex;gap:0.4rem;margin-top:0.5rem">
        <button class="btn btn-danger btn-sm" onclick="deleteComment('${postId}','${c.id}')">Delete</button>

    </div>`).join('');

async function renderGiveaways(){
  const c = document.getElementById('mainContent');
  c.innerHTML='<div class="spinner"></div>';
  try{
    const ids = JSON.parse(localStorage.getItem('gw_ids')||'[]');
    if(!ids.length){
      c.innerHTML='<div class="empty">No giveaways yet. <a href="#" onclick="showView(\'giveaway-new\')">Create one</a></div>';
      return;
    }
    const results = await Promise.all(ids.map(id=>gwGet(`/giveaway?id=${id}`).catch(()=>null)));
    gwList = results.filter(r=>r&&r.ok).map(r=>r.giveaway);

    c.innerHTML=`<div style="display:flex;flex-direction:column;gap:0.8rem">
      ${gwList.map(g=>{
        const ended = !g.active || Date.now() > g.endsAt;
        const timeLeft = ended ? 'Ended' : fmtTimeLeft(g.endsAt - Date.now());
        return `<div class="gw-card">
          <div class="gw-info">
            <div class="gw-title">${esc(g.title)}</div>
            <div class="gw-meta">${g.entryCount||0} entries · ${timeLeft}${g.winner?' · Winner: '+esc(g.winner):''}</div>
          </div>
          <div class="gw-actions">
            <a class="btn btn-ghost btn-sm" href="${GW_URL}?id=${g.id}" target="_blank">View</a>
            ${!ended?`<button class="btn btn-danger btn-sm" onclick="endGiveaway('${g.id}')">End</button>`:''}
            <button class="btn btn-primary btn-sm" onclick="pickWinner('${g.id}')">Pick Winner</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } catch(e){
    c.innerHTML='<div class="empty">Failed to load giveaways.</div>';
  }
}

function fmtTimeLeft(ms){
  if(ms<=0) return 'Ended';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if(h>24) return Math.floor(h/24)+'d left';
  if(h>0) return h+'h '+m+'m left';
  return m+'m left';
}

async function createGiveaway(){
  const id = document.getElementById('gwId').value.trim().replace(/[^a-zA-Z0-9_-]/g,'');
  const title = document.getElementById('gwTitle').value.trim();
  const desc = document.getElementById('gwDesc').value.trim();
  const hours = Number(document.getElementById('gwHours').value)||24;
  if(!id||!title){toast('ID and title are required');return;}
  const btn = document.getElementById('gwCreateBtn');
  btn.disabled=true; btn.textContent='Creating...';
  try{
    const r = await gwPost('/admin/create',{adminKey:ADMIN_KEY,id,title,description:desc,hours});
    if(r.ok){
      const ids = JSON.parse(localStorage.getItem('gw_ids')||'[]');
      if(!ids.includes(id)) ids.push(id);
      localStorage.setItem('gw_ids',JSON.stringify(ids));
      toast('Giveaway created!');
      showView('giveaways');
    } else {
      toast(r.error||'Failed to create');
      btn.disabled=false; btn.textContent='Create Giveaway';
    }
  } catch(e){
    toast('Network error');
    btn.disabled=false; btn.textContent='Create Giveaway';
  }
}

async function pickWinner(id){
  if(!confirm(`Pick a winner for "${id}"?`)) return;
  const r = await gwPost('/admin/winner',{adminKey:ADMIN_KEY,giveawayId:id});
  if(r.ok){ toast('Winner: '+r.winner); renderGiveaways(); }
  else toast(r.error||'Failed');
}

async function endGiveaway(id){
  if(!confirm(`End giveaway "${id}"?`)) return;
  const r = await gwPost('/admin/end',{adminKey:ADMIN_KEY,giveawayId:id});
  if(r.ok){ toast('Giveaway ended'); renderGiveaways(); }
  else toast(r.error||'Failed');
}

function openModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.add('hidden')); });
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.add('hidden'); }));
</script>
