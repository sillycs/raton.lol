<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="https://raton.click/img/RATA.png"/>
<meta charset="utf-8" />
<title>Goal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/nishiki-teki" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/kunal" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --purple: #8b5cf6;
  --purple2: #a78bfa;
  --purple-dim: rgba(139,92,246,0.15);
  --text: #f4f4f8;
  --text2: #a0a0b8;
  --text3: #606078;
  --font-display: 'Nishiki-teki', sans-serif;
  --font-logo: 'kunal', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

* { cursor: url('https://raton.click/img/default.png') 0 0, auto; }
a, button { cursor: url('https://raton.click/img/handpointing.png') 0 0, pointer; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

.rata-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.rata-sprite {
  position: absolute; opacity: 0;
  will-change: transform, opacity;
  filter: grayscale(20%) brightness(0.55);
  animation: rataFloat linear infinite;
  transform-origin: center; user-select: none;
}
@keyframes rataFloat {
  0%   { opacity: 0;    transform: translateY(0px)   rotate(0deg)  scale(1);    }
  8%   { opacity: 0.12; }
  50%  { opacity: 0.07; transform: translateY(-28px) rotate(7deg)  scale(1.05); }
  92%  { opacity: 0.12; }
  100% { opacity: 0;    transform: translateY(-55px) rotate(-4deg) scale(0.95); }
}

canvas { position: fixed; inset: 0; z-index: 9999; pointer-events: none; }

nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 60px;
  background: rgba(13,13,13,0.88);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-logo); font-weight: 800;
  font-size: 1.4rem; color: var(--text); text-decoration: none;
}

.page {
  position: relative; z-index: 1;
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
  padding: 3rem 1.5rem 5rem;
  gap: 1rem;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardGlow {
  0%, 100% { box-shadow: 0 0 0 1px rgba(139,92,246,.22), 0 32px 80px rgba(0,0,0,.6), 0 0 60px rgba(139,92,246,.1); }
  50%       { box-shadow: 0 0 0 1px rgba(167,139,250,.4), 0 32px 80px rgba(0,0,0,.65), 0 0 100px rgba(139,92,246,.22); }
}

.card {
  width: 100%; max-width: 560px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 2rem;
  position: relative; overflow: hidden;
  animation: fadeUp 0.5s ease both;
  transition: border-color 0.6s, box-shadow 0.6s;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(139,92,246,0.1), transparent 70%);
  pointer-events: none;
}

.card-stripe {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--purple), var(--purple2));
}

.kicker {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 1rem;
}
.kicker-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--purple);
  box-shadow: 0 0 8px rgba(139,92,246,0.7);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.6; transform: scale(1.3); }
}

.card-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 6vw, 2.8rem);
  font-weight: 800; line-height: 1.0;
  letter-spacing: 0.04em; text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.card-title .accent { color: var(--purple); }
.card-sub { font-size: 0.875rem; color: var(--text2); line-height: 1.6; margin-bottom: 1.8rem; }

.amounts {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 0.75rem;
}
.a-raised .lbl, .a-goal .lbl {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 3px;
}
.a-raised .val {
  font-size: clamp(2.2rem, 7vw, 3.4rem);
  font-weight: 800; letter-spacing: -0.04em; line-height: 1;
  background: linear-gradient(90deg, var(--purple), var(--purple2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.a-goal { text-align: right; }
.a-goal .val { font-size: 1.2rem; font-weight: 700; color: var(--text2); }

.bar-track {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 999px; height: 20px;
  overflow: hidden; margin-bottom: 8px; position: relative;
}
.bar-fill {
  height: 100%; border-radius: 999px; width: 0%;
  background: linear-gradient(90deg, var(--purple), var(--purple2));
  position: relative; overflow: hidden;
}
.bar-fill.anim { animation: fillBar 2.3s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes fillBar { from { width: 0% } to { width: var(--tw) } }
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 18px rgba(139,92,246,.4), 0 0 40px rgba(139,92,246,.2); }
  50%       { box-shadow: 0 0 35px rgba(167,139,250,.75), 0 0 75px rgba(139,92,246,.38); }
}
.bar-fill.done { animation: pulseGlow 2s ease-in-out infinite; }
@keyframes rainbow {
  from {
    background-position: 0% 0;
  }
  to {
    background-position: 100% 0;
  }
}

.bar-fill.rainbow-bar {
  background: linear-gradient(
    90deg,
    #ff4d4d 0%,
    #ff9a4d 12.5%,
    #ffd37a 25%,
    #6dffb1 37.5%,
    #7cc4ff 50%,
    #b07cff 62.5%,
    #ff6ad5 75%,
    #ff4d4d 87.5%,
    #ff9a4d 100%
  );

  background-size: 200% 100%;
  animation: rainbow 3s linear infinite;
}
.sheen {
  position: absolute; inset: 0; width: 28%;
  background: linear-gradient(105deg, transparent, rgba(255,255,255,.2) 50%, transparent);
  animation: sheen 2.5s cubic-bezier(.4,0,.6,1) infinite 1.1s;
}
@keyframes sheen {
  0%   { transform: translateX(-120%) skewX(-18deg); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateX(600%) skewX(-18deg); opacity: 0; }
}

.bar-lbl { text-align: right; font-size: 0.75rem; font-weight: 700; color: var(--text2); margin-bottom: 1.2rem; }
#pn { font-weight: 900; color: var(--purple2); }

.stats { display: flex; gap: 10px; }
.stat {
  flex: 1;
  background: rgba(139,92,246,0.06);
  border: 1px solid rgba(139,92,246,0.12);
  border-radius: 12px; padding: 12px 14px;
}
.sl { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
.sv { font-size: 1.05rem; font-weight: 800; }

.badge {
  display: none; align-items: center; gap: 8px;
  margin-top: 1.2rem; padding: 10px 20px; border-radius: 999px;
  background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(167,139,250,0.15));
  border: 1px solid rgba(167,139,250,0.35);
  font-size: 0.8rem; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--purple2);
  animation: badgePop 2.5s ease-in-out infinite;
}
.badge.show { display: inline-flex; }
@keyframes badgePop {
  0%, 100% { transform: scale(1) rotate(-1deg); }
  50%       { transform: scale(1.05) rotate(1deg); }
}

.thanks-card {
  width: 100%; max-width: 560px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px; padding: 1.6rem;
  position: relative; overflow: hidden;
  animation: fadeUp 0.5s ease 0.15s both;
}
.thanks-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(139,92,246,0.07), transparent 70%);
  pointer-events: none;
}
.thanks-stripe {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, rgba(139,92,246,0.5), rgba(167,139,250,0.3));
}
.thanks-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1.2rem; }
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  14%       { transform: scale(1.3); }
  28%       { transform: scale(1); }
  42%       { transform: scale(1.2); }
  70%       { transform: scale(1); }
}
.thanks-icon { font-size: 15px; animation: heartbeat 2.4s ease-in-out infinite; display: inline-block; }
.thanks-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
.thanks-list { display: flex; flex-direction: column; gap: 6px; }

@keyframes thanksPop {
  from { opacity: 0; transform: translateY(10px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.thanks-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 12px;
  background: rgba(139,92,246,0.05);
  border: 1px solid rgba(139,92,246,0.09);
  opacity: 0;
  animation: thanksPop .45s cubic-bezier(.22,1,.36,1) forwards;
  transition: background .2s, border-color .2s;
}
.thanks-row:hover { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.2); }

.donor-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  flex-shrink: 0; overflow: hidden;
  border: 1.5px solid rgba(139,92,246,0.3);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
}
.donor-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

.thanks-info { flex: 1; min-width: 0; }
.thanks-name { font-size: 0.82rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thanks-msg { font-size: 0.72rem; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.thanks-amount {
  font-size: 0.82rem; font-weight: 800;
  background: linear-gradient(90deg, var(--purple), var(--purple2));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  flex-shrink: 0;
}

.sp-outer { opacity: 0; border-radius: 12px; transition: opacity 0.45s cubic-bezier(.22,1,.36,1); }
.sp-outer.visible { opacity: 1; animation: redPulse 1.8s ease-in-out infinite; }
@keyframes redPulse {
  0%, 100% { box-shadow: 0 0 0 1px rgba(255,60,60,.45), 0 0 14px rgba(255,60,60,.18); }
  50%       { box-shadow: 0 0 0 2px rgba(255,80,80,.8), 0 0 28px rgba(255,50,50,.38); }
}
.sp-inner {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 12px;
  background: rgba(255,45,45,.09);
  border: 1px solid rgba(255,75,75,.32);
}
@keyframes wiggle {
  0%   { transform: translate(0,0); }
  10%  { transform: translate(-5px,3px); }
  20%  { transform: translate(4px,-3px); }
  30%  { transform: translate(-3px,-4px); }
  40%  { transform: translate(5px,2px); }
  50%  { transform: translate(-4px,2px); }
  60%  { transform: translate(3px,-3px); }
  70%  { transform: translate(-2px,4px); }
  80%  { transform: translate(4px,2px); }
  90%  { transform: translate(-3px,-2px); }
  100% { transform: translate(0,0); }
}
.sp-inner.wiggling { animation: wiggle 0.08s linear infinite; }
.sp-name { color: #ff7070 !important; }
.sp-amount { font-size: 0.82rem; font-weight: 900; color: #ff6b6b; flex-shrink: 0; }

.sp-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  flex-shrink: 0; overflow: hidden;
  border: 1.5px solid rgba(255,80,80,.45);
  background: rgba(255,80,80,.1);
  display: flex; align-items: center; justify-content: center;
}
.sp-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

.purchase-btn {
  display: block; text-align: center; text-decoration: none;
  padding: 11px 20px; border-radius: 12px;
  font-size: 0.85rem; font-weight: 700; color: var(--text);
  background: linear-gradient(135deg, rgba(139,92,246,0.18), rgba(167,139,250,0.1));
  border: 1px solid rgba(139,92,246,0.3);
  transition: all 0.2s;
}
.purchase-btn:hover {
  background: linear-gradient(135deg, rgba(139,92,246,0.28), rgba(167,139,250,0.2));
  border-color: rgba(167,139,250,0.55);
  transform: translateY(-1px);
}

.fp { position: fixed; pointer-events: none; z-index: 9998; animation: floatUp 1.3s ease-out forwards; }
@keyframes floatUp {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-90px) scale(.5); opacity: 0; }
}

.footer-note {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 0.72rem; color: var(--text3);
  text-decoration: none; padding-top: 0.5rem;
}
.footer-note:hover { color: var(--text2); }
</style>
</head>
<body>

<div class="rata-bg" id="rataBg" aria-hidden="true"></div>
<canvas id="cc"></canvas>

<nav>
  <a class="nav-logo" href="https://raton.click">
    <img src="https://raton.click/img/RATA.png" width="24" height="24" alt="Raton" onerror="this.style.display='none'">
    Raton
  </a>
</nav>

<div class="page">

  <div class="card" id="card">
    <div class="card-stripe" id="stripe"></div>
    <div class="kicker"><span class="kicker-dot"></span>Live fundraiser</div>
    <h1 class="card-title">Support <span class="accent">Raton</span></h1>
    <p class="card-sub">Every dollar helps me and my cat, also, this can keep Raton alive</p>

    <div class="amounts">
      <div class="a-raised">
        <div class="lbl">Raised</div>
        <div class="val" id="rv">$0</div>
      </div>
      <div class="a-goal">
        <div class="lbl">Goal</div>
        <div class="val" id="gv"></div>
      </div>
    </div>

    <div class="bar-track">
      <div class="bar-fill" id="bar"><div class="sheen"></div></div>
    </div>
    <div class="bar-lbl"><span id="pn">0%</span> funded</div>

    <div class="stats">
      <div class="stat"><div class="sl">Remaining</div><div class="sv" id="rem">—</div></div>
      <div class="stat"><div class="sl">Progress</div><div class="sv" id="prog">0%</div></div>
      <div class="stat"><div class="sl">Goal</div><div class="sv" id="gs"></div></div>
    </div>

    <div class="badge" id="badge">🎉 Reached</div>
  </div>

  <div class="thanks-card">
    <div class="thanks-stripe"></div>
    <div class="thanks-header">
      <span class="thanks-icon">💜</span>
      <span class="thanks-title">Thanks to the following users</span>
    </div>
    <div class="thanks-list" id="tl"></div>
  </div>

  <a class="footer-note" href="https://raton.click">
    <img src="https://raton.click/img/RATA.png" width="13" height="13" alt="" onerror="this.style.display='none'">
    © 2026 SillyCS. All rights reserved
  </a>

</div>

<script>
const RAISED = 3300, GOAL = 3500;
const SUPPORTERS = [
  {name:"@ElSalchipapas",      amount:550, msg:"Purchase (src x2)",             isBigDonor:true},
  {name:"@ElChappo",           amount:180, msg:"Purchase + plugin",             isBigDonor:true},
  {name:"@Yups",               amount:150, msg:"Purchase + donation",  isBigDonor:true},
  {name:"@Azlu95",             amount:150, msg:"Purchase",             isBigDonor:true},
  {name:"@elvenemissary",      amount:149, msg:"Purchase + donation",  isBigDonor:true},
  {name:"@iwearpads",           amount:120, msg:"Purchase",             isBigDonor:true},
  {name:"@mrbr3ast",           amount:120, msg:"Purchase",             isBigDonor:true},
  {name:"@AXSN",               amount:110, msg:"Purchase",             isBigDonor:true},
  {name:"@grape",          amount:100, msg:"Purchase",             isBigDonor:true},
  {name:"@meomeoz28",          amount:100, msg:"Purchase",             isBigDonor:true},
  {name:"@anemy666",           amount:100, msg:"Purchase + donation",  isBigDonor:true},
  {name:"@mozen20",            amount:90,  msg:"Purchase"},
  {name:"@CFuzion",            amount:80,  msg:"Purchase"},
  {name:"@lol",                amount:80,  msg:"Purchase"},
  {name:"@gostskilk",          amount:80,  msg:"Purchase"},
  {name:"@fluttxrshyne",       amount:80,  msg:"Purchase"},
  {name:"@MrRome",             amount:80,  msg:"Purchase"},
  {name:"@se8t",               amount:80,  msg:"Purchase"},
  {name:"@darksideno.01",      amount:80,  msg:"Purchase"},
  {name:"@_v82xeg_",           amount:80,  msg:"Purchase"},
  {name:"@timebilgates", amount:80,  msg:"Purchase"},
  {name:"@???",                amount:80,  msg:"Purchase"},
  {name:"@zapper",             amount:80,  msg:"Purchase (PROMO)"},
  {name:"@response",           amount:60,  msg:"Purchase (PROMO)"},
  {name:"@Hade",               amount:50,  msg:"Purchase (PROMO)"},
  {name:"@Serotonine",         amount:50,  msg:"Donation"},
  {name:"@3.dll",              amount:15,  msg:"Donation"},
  {name:"@lknrq",              amount:0,   msg:"Protection to Raton"},
  {name:"@Dwey",               amount:0,   msg:"Protection to Raton"},
];

const BIG_IMG   = 'https://raton.click/img/bigdonator.png';
const SMALL_IMG = 'https://raton.click/img/smalldonator.png';

const pct = Math.min(RAISED / GOAL, 1);
const hit = RAISED >= GOAL;
const BAR_DUR = 2300, NUM_DUR = 2100;
const $ = id => document.getElementById(id);
const bar = $('bar'), card = $('card'), badge = $('badge');

$('gv').textContent = '$' + GOAL.toLocaleString();
$('gs').textContent = '$' + GOAL.toLocaleString();

function easeInOut(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

function animNum(el, to, dur) {
  const t0 = performance.now();
  (function f(now) {
    const p = Math.min((now-t0)/dur, 1), e = easeInOut(p);
    el.textContent = '$' + Math.round(to*e).toLocaleString();
    if (p < 1) requestAnimationFrame(f);
  })(t0);
}

function animPct(dur) {
  const t0 = performance.now();
  (function f(now) {
    const p = Math.min((now-t0)/dur, 1), e = easeInOut(p);
    const v = (pct*e*100).toFixed(1) + '%';
    $('pn').textContent = v;
    $('prog').textContent = v;
    $('rem').textContent = Math.max(GOAL-RAISED, 0) > 0 ? '$' + Math.max(GOAL-RAISED, 0).toLocaleString() : '—';
    if (p < 1) requestAnimationFrame(f);
    else { const f2 = (pct*100).toFixed(1)+'%'; $('pn').textContent = f2; $('prog').textContent = f2; }
  })(t0);
}

(function() {
  var bg = document.getElementById('rataBg');
  var data = [
    {x:5,y:10,s:52,d:20,dl:0},{x:20,y:25,s:44,d:24,dl:5},{x:38,y:5,s:60,d:18,dl:9},
    {x:55,y:18,s:48,d:26,dl:2},{x:70,y:4,s:66,d:22,dl:13},{x:85,y:22,s:44,d:30,dl:7},
    {x:92,y:10,s:56,d:16,dl:11},{x:12,y:58,s:52,d:28,dl:3},{x:30,y:72,s:72,d:32,dl:16},
    {x:52,y:62,s:44,d:20,dl:8},{x:74,y:78,s:60,d:25,dl:6},{x:90,y:52,s:48,d:19,dl:14},
  ];
  data.forEach(function(r) {
    var img = document.createElement('img');
    img.src = 'https://raton.click/img/RATA.png';
    img.className = 'rata-sprite'; img.alt = ''; img.draggable = false;
    img.style.cssText = 'width:'+r.s+'px;height:'+r.s+'px;left:'+r.x+'%;top:'+r.y+'%;animation-duration:'+r.d+'s;animation-delay:-'+r.dl+'s';
    bg.appendChild(img);
  });
})();

const cv = $('cc'), cx = cv.getContext('2d');
cv.width = innerWidth; cv.height = innerHeight;
addEventListener('resize', () => { cv.width = innerWidth; cv.height = innerHeight; });
const COLS = ['#8b5cf6','#a78bfa','#ffd37a','#6dffb1','#7cc4ff','#ff6ad5','#ff4d4d','#ffffff','#ffb3f7'];
let pieces = [], raf = null;

function spawn(n) {
  for (let i = 0; i < n; i++) pieces.push({
    x: Math.random()*cv.width, y: -20-Math.random()*80,
    w: 5+Math.random()*10, h: 3+Math.random()*7,
    color: COLS[Math.floor(Math.random()*COLS.length)],
    vx: (Math.random()-.5)*6, vy: 1.8+Math.random()*4.5,
    angle: Math.random()*Math.PI*2, spin: (Math.random()-.5)*.18,
    g: .07+Math.random()*.06, drag: .997,
    life: 1, decay: .0025+Math.random()*.004
  });
}

function draw() {
  cx.clearRect(0, 0, cv.width, cv.height);
  for (let i = pieces.length-1; i >= 0; i--) {
    const p = pieces[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.g;
    p.vx *= p.drag; p.vy *= p.drag;
    p.angle += p.spin; p.life -= p.decay;
    if (p.life <= 0) { pieces.splice(i, 1); continue; }
    cx.save(); cx.globalAlpha = Math.max(0, p.life);
    cx.translate(p.x, p.y); cx.rotate(p.angle);
    cx.fillStyle = p.color; cx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cx.restore();
  }
  if (pieces.length) raf = requestAnimationFrame(draw);
  else { raf = null; cx.clearRect(0, 0, cv.width, cv.height); }
}

function confetti(n) { spawn(n); if (!raf) raf = requestAnimationFrame(draw); }

const EMOJ = ['💜'];
function floats(c) {
  for (let i = 0; i < c; i++) setTimeout(() => {
    const el = document.createElement('div');
    el.className = 'fp';
    el.textContent = EMOJ[Math.floor(Math.random()*EMOJ.length)];
    el.style.cssText = `left:${5+Math.random()*90}vw;top:${15+Math.random()*60}vh;font-size:${14+Math.random()*22}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }, i * 75);
}

function goalFX() {
  card.style.borderColor = 'rgba(139,92,246,.55)';
  card.style.animation = 'cardGlow 2s ease-in-out infinite';
  badge.classList.add('show');
  const s = $('stripe');
s.style.cssText = 'position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ff4d4d 0%,#ff9a4d 12.5%,#ffd37a 25%,#6dffb1 37.5%,#7cc4ff 50%,#b07cff 62.5%,#ff6ad5 75%,#ff4d4d 87.5%,#ff9a4d 100%);background-size:200% 100%;animation:rainbow 4s linear infinite;';  bar.classList.remove('anim','done');
  bar.classList.add('rainbow-bar');
  confetti(220); floats(12);
  [350,750,1300,2000,2800,3700].forEach(d => setTimeout(() => { confetti(90); floats(8); }, d));
}

function makeAvatar(isBig) {
  const wrap = document.createElement('div');
  wrap.className = isBig ? 'sp-avatar' : 'donor-avatar';
  const img = document.createElement('img');
  img.src = isBig ? BIG_IMG : SMALL_IMG;
  img.alt = '';
  wrap.appendChild(img);
  return wrap;
}

function buildThanks() {
  const list = $('tl');
  SUPPORTERS.forEach((s, i) => {
    const popDelay = (i * .07 + .3) * 1000;

    if (s.isLast) {
      const btn = document.createElement('a');
      btn.href = 'https://raton.click/deluxe'; btn.target = '_blank';
      btn.className = 'purchase-btn'; btn.textContent = 'Purchase or Donate';
      list.appendChild(btn);

      const row = document.createElement('div');
      row.className = 'thanks-row';
      row.style.backgroundImage = 'linear-gradient(90deg,rgba(255,77,77,.45),rgba(255,154,77,.45),rgba(255,211,122,.45),rgba(109,255,177,.45),rgba(124,196,255,.45),rgba(176,124,255,.45),rgba(255,106,213,.45))';
      row.style.backgroundSize = '300% 100%';
      row.style.animation = `rainbow 3s linear infinite, thanksPop .45s cubic-bezier(.22,1,.36,1) ${popDelay}ms forwards`;
      row.style.borderColor = 'rgba(255,106,213,.7)';
      row.style.justifyContent = 'center'; row.style.textAlign = 'center';
      row.innerHTML = `<div class="thanks-info"><div class="thanks-name" style="color:#fff;font-weight:800">${s.name}</div><div class="thanks-msg" style="color:rgba(255,255,255,.8)">${s.msg}</div></div>`;
      list.appendChild(row);
      return;
    }

    if (s.isBigDonor) {
      const outer = document.createElement('div');
      outer.className = 'sp-outer';

      const inner = document.createElement('div');
      inner.className = 'sp-inner';
      inner.appendChild(makeAvatar(true));

      const info = document.createElement('div');
      info.className = 'thanks-info';
      info.innerHTML = `<div class="thanks-name sp-name">${s.name}</div><div class="thanks-msg">${s.msg}</div>`;
      inner.appendChild(info);

      const amt = document.createElement('div');
      amt.className = 'sp-amount'; amt.textContent = '+$' + s.amount;
      inner.appendChild(amt);

      outer.appendChild(inner);
      list.appendChild(outer);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        outer.style.opacity = '1';
        setTimeout(() => {
          inner.classList.add('wiggling');
          outer.style.animation = 'redPulse 1.8s ease-in-out infinite';
        }, popDelay + 500);
      }));
      return;
    }

    const row = document.createElement('div');
    row.className = 'thanks-row';
    row.style.animationDelay = popDelay + 'ms';

    if (s.amount >= 80) {
      row.style.backgroundImage = 'linear-gradient(90deg,rgba(255,77,77,.45),rgba(255,154,77,.45),rgba(255,211,122,.45),rgba(109,255,177,.45),rgba(124,196,255,.45),rgba(176,124,255,.45),rgba(255,106,213,.45))';
      row.style.backgroundSize = '300% 100%';
      row.style.animation = `rainbow 3s linear infinite, thanksPop .45s cubic-bezier(.22,1,.36,1) ${popDelay}ms forwards`;
      row.style.borderColor = 'rgba(255,106,213,.7)';
    }

    row.appendChild(makeAvatar(false));

    const info = document.createElement('div');
    info.className = 'thanks-info';
    info.innerHTML = `<div class="thanks-name">${s.name}</div><div class="thanks-msg">${s.msg}</div>`;
    row.appendChild(info);

    if (s.amount != null && s.amount > 0) {
      const amt = document.createElement('div');
      amt.className = 'thanks-amount'; amt.textContent = '+$' + s.amount;
      row.appendChild(amt);
    }

    list.appendChild(row);
  });
}

window.addEventListener('load', () => {
  bar.style.setProperty('--tw', (pct*100).toFixed(2)+'%');
  animNum($('rv'), RAISED, NUM_DUR);
  animPct(NUM_DUR);
  requestAnimationFrame(() => bar.classList.add('anim'));
  buildThanks();
  setTimeout(() => {
    bar.classList.remove('anim');
    if (hit) goalFX();
    else { bar.style.width = (pct*100).toFixed(2)+'%'; bar.classList.add('done'); }
  }, BAR_DUR + 80);
});
</script>
