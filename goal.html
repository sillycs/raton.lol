<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        :root {
            --p1: #AE7FE2;
            --p2: #D59DFF;
            --text: #F2F0FF;
            --muted: rgba(242, 240, 255, .72);
            --dim: rgba(242, 240, 255, .28);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Inter, sans-serif;
            color: var(--text);
            background: radial-gradient(900px 600px at 15% 10%, rgba(174, 127, 226, .18) 0%, transparent 60%), radial-gradient(800px 600px at 85% 15%, rgba(213, 157, 255, .15) 0%, transparent 60%), linear-gradient(180deg, #080A10 0%, #0B0D14 50%, #101323 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
        }

        .blob {
            position: fixed;
            pointer-events: none;
            filter: blur(50px);
            opacity: .22;
            animation: drift 16s ease-in-out infinite;
        }

        .b1 {
            width: 500px;
            height: 500px;
            left: -150px;
            top: -150px;
            background: radial-gradient(circle, rgba(174, 127, 226, .9), transparent 65%);
        }

        .b2 {
            width: 600px;
            height: 600px;
            right: -170px;
            top: 20px;
            opacity: .18;
            background: radial-gradient(circle, rgba(213, 157, 255, .9), transparent 62%);
            animation-duration: 19s;
        }

        .b3 {
            width: 700px;
            height: 700px;
            left: 50%;
            bottom: -250px;
            opacity: .16;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(125, 75, 214, .85), transparent 65%);
            animation-duration: 22s;
        }

        @keyframes drift {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1) }
            50% { transform: translate3d(20px, -16px, 0) scale(1.03) }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) }
            to { opacity: 1; transform: translateY(0) }
        }

        @keyframes fillBar {
            from { width: 0% }
            to { width: var(--tw) }
        }

        @keyframes rainbow {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 18px rgba(174, 127, 226, .4), 0 0 40px rgba(174, 127, 226, .2) }
            50% { box-shadow: 0 0 35px rgba(213, 157, 255, .75), 0 0 75px rgba(174, 127, 226, .38) }
        }

        @keyframes sheen {
            0% { transform: translateX(-120%) skewX(-18deg); opacity: 0 }
            10% { opacity: 1 }
            90% { opacity: 1 }
            100% { transform: translateX(600%) skewX(-18deg); opacity: 0 }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1 }
            100% { transform: translateY(-90px) scale(.5); opacity: 0 }
        }

        @keyframes badgePop {
            0%, 100% { transform: scale(1) rotate(-2deg) }
            50% { transform: scale(1.07) rotate(2deg) }
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 0 0 1px rgba(174, 127, 226, .22), 0 32px 80px rgba(0, 0, 0, .6), 0 0 60px rgba(174, 127, 226, .1) }
            50% { box-shadow: 0 0 0 1px rgba(213, 157, 255, .4), 0 32px 80px rgba(0, 0, 0, .65), 0 0 100px rgba(174, 127, 226, .22) }
        }

        @keyframes thanksPop {
            0% { opacity: 0; transform: translateY(12px) scale(.96) }
            100% { opacity: 1; transform: translateY(0) scale(1) }
        }

        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 0 2px rgba(174, 127, 226, .25) }
            50% { box-shadow: 0 0 0 3px rgba(213, 157, 255, .55), 0 0 16px rgba(174, 127, 226, .3) }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1) }
            14% { transform: scale(1.3) }
            28% { transform: scale(1) }
            42% { transform: scale(1.2) }
            70% { transform: scale(1) }
        }

        @keyframes wiggle {
            0%   { transform: translate(0, 0) }
            10%  { transform: translate(-6px, 4px) }
            20%  { transform: translate(5px, -3px) }
            30%  { transform: translate(-4px, -5px) }
            40%  { transform: translate(6px, 3px) }
            50%  { transform: translate(-5px, 2px) }
            60%  { transform: translate(4px, -4px) }
            70%  { transform: translate(-3px, 5px) }
            80%  { transform: translate(5px, 2px) }
            90%  { transform: translate(-4px, -3px) }
            100% { transform: translate(0, 0) }
        }

        @keyframes redPulse {
            0%, 100% {
                box-shadow: 0 0 0 1px rgba(255, 60, 60, .45), 0 0 14px rgba(255, 60, 60, .18);
                border-color: rgba(255, 80, 80, .5);
            }
            50% {
                box-shadow: 0 0 0 2px rgba(255, 80, 80, .8), 0 0 28px rgba(255, 50, 50, .38);
                border-color: rgba(255, 110, 110, .85);
            }
        }

        .sp-outer {
            opacity: 0;
            border-radius: 12px;
        }

        .sp-outer.visible {
            opacity: 1;
            animation: redPulse 1.8s ease-in-out infinite;
        }

        .sp-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 45, 45, .09);
            border: 1px solid rgba(255, 75, 75, .32);
        }

        .sp-inner.wiggling {
            animation: wiggle 0.08s linear infinite;
        }

        .sp-name {
            color: #ff7070 !important;
        }

        .sp-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(255, 80, 80, .28), rgba(255, 50, 50, .14));
            border: 1.5px solid rgba(255, 80, 80, .45);
        }

        .sp-amount {
            font-size: 14px;
            font-weight: 900;
            color: #ff6b6b;
            flex-shrink: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            padding: 40px 20px 60px;
            width: 100%;
            max-width: 580px;
            animation: fadeUp .55s cubic-bezier(.22, 1, .36, 1) both;
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .02));
            border: 1px solid rgba(255, 255, 255, .10);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            padding: 36px 32px 32px;
            position: relative;
            overflow: hidden;
            transition: border-color .6s, box-shadow .6s;
        }

        .stripe {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--p1), var(--p2));
        }

        .glow-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: 24px;
            background: radial-gradient(ellipse 80% 55% at 50% 35%, rgba(174, 127, 226, .13), transparent 70%);
            opacity: 0;
            transition: opacity .7s;
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--p1), var(--p2));
            box-shadow: 0 0 0 5px rgba(174, 127, 226, .12);
        }

        .title {
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 900;
            letter-spacing: -.04em;
            margin-bottom: 6px;
        }

        .grad {
            background: linear-gradient(90deg, var(--p1), var(--p2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            font-size: 13.5px;
            color: var(--muted);
            margin-bottom: 28px;
            line-height: 1.55;
        }

        .amounts {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .a-raised .lbl, .a-goal .lbl {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 3px;
        }

        .a-raised .val {
            font-size: clamp(34px, 7vw, 54px);
            font-weight: 900;
            letter-spacing: -.04em;
            line-height: 1;
            background: linear-gradient(90deg, var(--p1), var(--p2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .a-goal { text-align: right; }

        .a-goal .val {
            font-size: 19px;
            font-weight: 800;
            color: var(--muted);
        }

        .bar-track {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 999px;
            height: 22px;
            overflow: hidden;
            margin-bottom: 9px;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 999px;
            width: 0%;
            background: linear-gradient(90deg, var(--p1), var(--p2));
            position: relative;
            overflow: hidden;
        }

        .bar-fill.anim { animation: fillBar 2.3s cubic-bezier(.4, 0, .2, 1) forwards; }
        .bar-fill.done { animation: pulseGlow 2s ease-in-out infinite; }

        .bar-fill.rainbow {
            background: linear-gradient(90deg, #ff4d4d, #ff9a4d, #ffd37a, #6dffb1, #7cc4ff, #b07cff, #ff6ad5, #ff4d4d);
            background-size: 300% 100%;
            animation: rainbow 3s linear infinite, pulseGlow 2s ease-in-out infinite;
        }

        .sheen {
            position: absolute;
            inset: 0;
            width: 28%;
            background: linear-gradient(105deg, transparent, rgba(255, 255, 255, .22) 50%, transparent);
            animation: sheen 2.5s cubic-bezier(.4, 0, .6, 1) infinite 1.1s;
        }

        .bar-lbl {
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        #pn { font-weight: 900; color: var(--p2); }

        .stats {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .stat {
            flex: 1;
            background: rgba(174, 127, 226, .07);
            border: 1px solid rgba(174, 127, 226, .13);
            border-radius: 12px;
            padding: 12px 14px;
        }

        .sl {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 3px;
        }

        .sv { font-size: 17px; font-weight: 900; }

        .badge {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(174, 127, 226, .25), rgba(213, 157, 255, .18));
            border: 1px solid rgba(213, 157, 255, .4);
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--p2);
            animation: badgePop 2.5s ease-in-out infinite;
        }

        .badge.show { display: inline-flex; }

        .fp {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            animation: floatUp 1.3s ease-out forwards;
        }

        .thanks-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(255, 255, 255, .02));
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            padding: 28px 32px 28px;
            margin-top: 16px;
            position: relative;
            overflow: hidden;
        }

        .thanks-stripe {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, rgba(174, 127, 226, .5), rgba(213, 157, 255, .3));
        }

        .thanks-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .thanks-icon {
            font-size: 16px;
            animation: heartbeat 2.4s ease-in-out infinite;
            display: inline-block;
        }

        .thanks-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .thanks-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .thanks-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(174, 127, 226, .05);
            border: 1px solid rgba(174, 127, 226, .09);
            opacity: 0;
            animation: thanksPop .45s cubic-bezier(.22, 1, .36, 1) forwards;
            transition: background .2s, border-color .2s;
        }

        .thanks-row:hover {
            background: rgba(174, 127, 226, .11);
            border-color: rgba(174, 127, 226, .22);
        }

        .thanks-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(174, 127, 226, .25), rgba(213, 157, 255, .15));
            border: 1.5px solid rgba(174, 127, 226, .3);
            animation: avatarGlow 3s ease-in-out infinite;
        }

        .thanks-info { flex: 1; min-width: 0; }

        .thanks-name {
            font-size: 13px;
            font-weight: 800;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .thanks-msg {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .purchase-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 11px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: .04em;
            color: var(--text);
            background: linear-gradient(135deg, rgba(174, 127, 226, .2), rgba(213, 157, 255, .12));
            border: 1px solid rgba(174, 127, 226, .35);
            transition: background .2s, border-color .2s, transform .15s;
        }

        .purchase-btn:hover {
            background: linear-gradient(135deg, rgba(174, 127, 226, .32), rgba(213, 157, 255, .22));
            border-color: rgba(213, 157, 255, .6);
            transform: translateY(-1px);
        }

        .thanks-amount {
            font-size: 13px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--p1), var(--p2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <canvas id="cc"></canvas>
    <div class="page">
        <div class="card" id="card">
            <div class="stripe" id="stripe"></div>
            <div class="glow-bg" id="glow"></div>
            <div class="kicker"><span class="dot"></span>Live fundraiser</div>
            <div class="title"><span class="grad">Support</span> the project</div>
            <p class="sub">Every dollar helps me and my cat. Thank you 💜</p>
            <div class="amounts">
                <div class="a-raised">
                    <div class="lbl">Raised</div>
                    <div class="val" id="rv">$0</div>
                </div>
                <div class="a-goal">
                    <div class="lbl">Goal</div>
                    <div class="val" id="gv"></div>
                </div>
            </div>
            <div class="bar-track">
                <div class="bar-fill" id="bar">
                    <div class="sheen"></div>
                </div>
            </div>
            <div class="bar-lbl"><span id="pn">0%</span> funded</div>
            <div class="stats">
                <div class="stat">
                    <div class="sl">Remaining</div>
                    <div class="sv" id="rem">—</div>
                </div>
                <div class="stat">
                    <div class="sl">Progress</div>
                    <div class="sv" id="prog">0%</div>
                </div>
                <div class="stat">
                    <div class="sl">Goal</div>
                    <div class="sv" id="gs"></div>
                </div>
            </div>
            <div class="badge" id="badge">🎉 Reached</div>
        </div>
        <div class="thanks-card">
            <div class="thanks-stripe"></div>
            <div class="thanks-header">
                <span class="thanks-icon">💜</span><span class="thanks-title">Thanks to the following users</span>
            </div>
            <div class="thanks-list" id="tl"></div>
        </div>
    </div>

    <script>
        const RAISED=1232, GOAL=1500;
        const SUPPORTERS=[
            {name:"El Salchipapas",emoji:"🔥",amount:250,msg:"Purchase",isBigDonor:true},
            {name:"@Yups",emoji:"🔥",amount:150,msg:"Purchase + donation",isBigDonor:true},
            {name:"@Azlu95",emoji:"🔥",amount:150,msg:"Purchase",isBigDonor:true},
            {name:"@CFuzion",emoji:"💜",amount:80,msg:"Purchase"},
            {name:"@lol",emoji:"💜",amount:80,msg:"Purchase"},

{name:"@gostskilk",emoji:"💜",amount:80,msg:"Purchase"},

{name:"@fluttxrshyne",emoji:"💜",amount:80,msg:"Purchase"},

{name:"@MrRome",emoji:"💜",amount:80,msg:"Purchase"},
{name:"@se8t",emoji:"💜",amount:80,msg:"Purchase"},
{name:"???",emoji:"💜",amount:80,msg:"Purchase"},
            {name:"@Hade",emoji:"💜",amount:50,msg:"Purchase"},
            {name:"@Serotonine",emoji:"💜",amount:50,msg:"Donation"},
            {name:"@3.dll",emoji:"💜",amount:15,msg:"Donation"},
            {name:"@lknrq",emoji:"💜",amount:0,msg:"Protection to Raton"},
            {name:"@Dwey",emoji:"💜",amount:0,msg:"Protection to Raton"},
            {name:"Thanks to every deluxe user",emoji:"💜",msg:"Thanks for supporting me, appreciate it"},
        ];
        const pct=Math.min(RAISED/GOAL,1),hit=RAISED>=GOAL;
        const BAR_DUR=2300,NUM_DUR=2100;
        const $=id=>document.getElementById(id);
        const bar=$('bar'),card=$('card'),glow=$('glow'),badge=$('badge');
        $('gv').textContent='$'+GOAL.toLocaleString();
        $('gs').textContent='$'+GOAL.toLocaleString();

        function easeInOut(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
        function animNum(el,to,dur){const t0=performance.now();(function f(now){const p=Math.min((now-t0)/dur,1),e=easeInOut(p);el.textContent='$'+Math.round(to*e).toLocaleString();if(p<1)requestAnimationFrame(f);})(t0);}
        function animPct(dur){const t0=performance.now();(function f(now){const p=Math.min((now-t0)/dur,1),e=easeInOut(p);const v=(pct*e*100).toFixed(1)+'%';$('pn').textContent=v;$('prog').textContent=v;$('rem').textContent=Math.max(GOAL-RAISED,0)>0?'$'+Math.max(GOAL-RAISED,0).toLocaleString():'—';if(p<1)requestAnimationFrame(f);else{const f2=(pct*100).toFixed(1)+'%';$('pn').textContent=f2;$('prog').textContent=f2;}})(t0);}

        const cv=$('cc'),cx=cv.getContext('2d');
        cv.width=innerWidth;cv.height=innerHeight;
        addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;});
        const COLS=['#AE7FE2','#D59DFF','#ffd37a','#6dffb1','#7cc4ff','#ff6ad5','#ff4d4d','#ffffff','#ffb3f7'];
        let pieces=[],raf=null;
        function spawn(n){for(let i=0;i<n;i++)pieces.push({x:Math.random()*cv.width,y:-20-Math.random()*80,w:5+Math.random()*10,h:3+Math.random()*7,color:COLS[Math.floor(Math.random()*COLS.length)],vx:(Math.random()-.5)*6,vy:1.8+Math.random()*4.5,angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.18,g:.07+Math.random()*.06,drag:.997,life:1,decay:.0025+Math.random()*.004});}
        function draw(){cx.clearRect(0,0,cv.width,cv.height);for(let i=pieces.length-1;i>=0;i--){const p=pieces[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=p.drag;p.vy*=p.drag;p.angle+=p.spin;p.life-=p.decay;if(p.life<=0){pieces.splice(i,1);continue;}cx.save();cx.globalAlpha=Math.max(0,p.life);cx.translate(p.x,p.y);cx.rotate(p.angle);cx.fillStyle=p.color;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();}if(pieces.length)raf=requestAnimationFrame(draw);else{raf=null;cx.clearRect(0,0,cv.width,cv.height);}}
        function confetti(n){spawn(n);if(!raf)raf=requestAnimationFrame(draw);}
        const EMOJ=['🎉','💜','🎊','🥳'];
        function floats(c=10){for(let i=0;i<c;i++)setTimeout(()=>{const el=document.createElement('div');el.className='fp';el.textContent=EMOJ[Math.floor(Math.random()*EMOJ.length)];el.style.cssText=`left:${5+Math.random()*90}vw;top:${15+Math.random()*60}vh;font-size:${14+Math.random()*22}px`;document.body.appendChild(el);setTimeout(()=>el.remove(),1400);},i*75);}
        function goalFX(){card.style.borderColor='rgba(174,127,226,.55)';card.style.animation='cardGlow 2s ease-in-out infinite';glow.style.opacity='1';badge.classList.add('show');$('stripe').style.cssText='background:linear-gradient(90deg,#ff4d4d,#ff9a4d,#ffd37a,#6dffb1,#7cc4ff,#b07cff,#ff6ad5,#ff4d4d);background-size:300% 100%;animation:rainbow 3s linear infinite;';confetti(220);floats(12);[350,750,1300,2000,2800,3700].forEach(d=>setTimeout(()=>{confetti(90);floats(8);},d));}

        function buildThanks(){
            const list=$('tl');
            SUPPORTERS.forEach((s,i)=>{
                const isLast=i===SUPPORTERS.length-1;
                const popDelay=(i*.07+.3)*1000;

                if(s.isBigDonor){
                    const outer=document.createElement('div');
                    outer.className='sp-outer';
                    outer.style.transition=`opacity .45s cubic-bezier(.22,1,.36,1) ${popDelay}ms`;

                    const inner=document.createElement('div');
                    inner.className='sp-inner';
                    inner.innerHTML=`<div class="sp-avatar">${s.emoji}</div><div class="thanks-info"><div class="thanks-name sp-name">${s.name}</div><div class="thanks-msg">${s.msg}</div></div><div class="sp-amount">+$${s.amount}</div>`;
                    outer.appendChild(inner);
                    list.appendChild(outer);

                    requestAnimationFrame(()=>requestAnimationFrame(()=>{
                        outer.style.opacity='1';
                        setTimeout(()=>{
                            inner.classList.add('wiggling');
                            outer.style.animation='redPulse 1.8s ease-in-out infinite';
                        }, popDelay+500);
                    }));

                } else if(isLast){
                    const btn=document.createElement('a');
                    btn.href='https://raton.lol/deluxe';btn.target='_blank';btn.className='purchase-btn';btn.textContent='Purchase or Donate';
                    list.appendChild(btn);
                    const row=document.createElement('div');
                    row.className='thanks-row';
                    row.style.animationDelay=popDelay+'ms';
                    row.style.backgroundImage='linear-gradient(90deg,rgba(255,77,77,.45),rgba(255,154,77,.45),rgba(255,211,122,.45),rgba(109,255,177,.45),rgba(124,196,255,.45),rgba(176,124,255,.45),rgba(255,106,213,.45))';
                    row.style.backgroundSize='300% 100%';
                    row.style.animation=`rainbow 3s linear infinite, thanksPop .45s cubic-bezier(.22,1,.36,1) ${popDelay}ms forwards`;
                    row.style.borderColor='rgba(255,106,213,.7)';
                    row.style.justifyContent='center';row.style.textAlign='center';
                    row.innerHTML=`<div class="thanks-info"><div class="thanks-name" style="color:#fff;font-weight:800">${s.name}</div><div class="thanks-msg" style="color:rgba(255,255,255,.85)">${s.msg}</div></div>`;
                    list.appendChild(row);
                } else {
                    const row=document.createElement('div');
                    row.className='thanks-row';
                    row.style.animationDelay=popDelay+'ms';
                    if(s.amount===80){
                        row.style.backgroundImage='linear-gradient(90deg,rgba(255,77,77,.45),rgba(255,154,77,.45),rgba(255,211,122,.45),rgba(109,255,177,.45),rgba(124,196,255,.45),rgba(176,124,255,.45),rgba(255,106,213,.45))';
                        row.style.backgroundSize='300% 100%';
                        row.style.animation=`rainbow 3s linear infinite, thanksPop .45s cubic-bezier(.22,1,.36,1) ${popDelay}ms forwards`;
                        row.style.borderColor='rgba(255,106,213,.7)';
                    }
                    row.innerHTML=`<div class="thanks-avatar">${s.emoji}</div><div class="thanks-info"><div class="thanks-name">${s.name}</div><div class="thanks-msg">${s.msg}</div></div><div class="thanks-amount">+$${s.amount!==undefined?s.amount:''}</div>`;
                    list.appendChild(row);
                }
            });
        }

        window.addEventListener('load',()=>{
            bar.style.setProperty('--tw',(pct*100).toFixed(2)+'%');
            animNum($('rv'),RAISED,NUM_DUR);
            animPct(NUM_DUR);
            requestAnimationFrame(()=>bar.classList.add('anim'));
            buildThanks();
            setTimeout(()=>{
                bar.classList.remove('anim');
                if(hit){goalFX();}
                else{bar.style.width=(pct*100).toFixed(2)+'%';bar.classList.add('done');}
            },BAR_DUR+80);
        });
    </script>
</body>

</html>
