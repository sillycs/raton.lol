
<style>
  body { margin: 0; background: #000; overflow: hidden; height: 600px; position: relative; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  #bg { z-index: 0; }
  #fx { z-index: 1; }
  #text-overlay {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: Impact, sans-serif;
    font-size: 0px;
    color: #fff;
    text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300, 0 0 80px #ffaa00;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 8px;
    opacity: 0;
    white-space: nowrap;
  }
</style>
<canvas id="bg"></canvas>
<canvas id="fx"></canvas>
<div id="text-overlay">FUCK YOU PAKISTANI NIGGA MASON (jk love u)</div>
<script>
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const W = 680, H = 600;
bgCanvas.width = canvas.width = W;
bgCanvas.height = canvas.height = H;

const img = new Image();
img.crossOrigin = 'anonymous';
img.src = 'https://raton.lol/mason.png';

const groundY = H * 0.82;
const bombX = W * 0.5;
let bombY = -60;
let phase = 'fall';
let explodeT = 0;
let mushroomT = 0;
let particles = [];
let shockwaveR = 0;
let flashAlpha = 0;
let textShown = false;
let frame = 0;

function rnd(a, b) { return a + Math.random() * (b - a); }

function drawBg(exploding) {
  bgCtx.clearRect(0, 0, W, H);
  if (img.complete && img.naturalWidth > 0) {
    const scale = Math.max(W / img.naturalWidth, H / img.naturalHeight);
    const sw = img.naturalWidth * scale;
    const sh = img.naturalHeight * scale;
    bgCtx.drawImage(img, (W - sw) / 2, (H - sh) / 2, sw, sh);
  } else {
    bgCtx.fillStyle = '#111';
    bgCtx.fillRect(0, 0, W, H);
  }
  if (exploding) {
    const alpha = Math.min(explodeT / 60, 0.55);
    bgCtx.fillStyle = `rgba(80,10,0,${alpha})`;
    bgCtx.fillRect(0, 0, W, H);
  }
}

function spawnParticles(cx, cy) {
  for (let i = 0; i < 220; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = rnd(2, 20);
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rnd(0, 10),
      size: rnd(2, 14),
      life: 1,
      decay: rnd(0.007, 0.022),
      hue: rnd(10, 55),
      type: Math.random() > 0.45 ? 'fire' : 'debris'
    });
  }
}

function drawExplosion(cx, cy) {
  const p = Math.min(explodeT / 80, 1);

  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,220,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
    flashAlpha -= 0.035;
  }

  if (shockwaveR > 0 && shockwaveR < W * 1.2) {
    ctx.beginPath();
    ctx.arc(cx, cy, shockwaveR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,200,100,${Math.max(0, 0.9 - shockwaveR / W)})`;
    ctx.lineWidth = 7;
    ctx.stroke();
    shockwaveR += 13;
  }

  const fbR = 20 + p * 190;
  const fbGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, fbR);
  fbGrad.addColorStop(0, 'rgba(255,255,210,1)');
  fbGrad.addColorStop(0.2, 'rgba(255,230,50,0.95)');
  fbGrad.addColorStop(0.5, 'rgba(255,120,0,0.85)');
  fbGrad.addColorStop(0.8, 'rgba(200,40,0,0.5)');
  fbGrad.addColorStop(1, 'rgba(80,20,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy - fbR * 0.08, fbR, 0, Math.PI * 2);
  ctx.fillStyle = fbGrad;
  ctx.fill();

  if (mushroomT > 0) {
    const stemH = Math.min(mushroomT * 5.5, 260);
    const stemW = 16 + mushroomT * 0.35;
    const stemGrad = ctx.createLinearGradient(cx - stemW, cy, cx + stemW, cy);
    stemGrad.addColorStop(0, 'rgba(255,100,10,0.7)');
    stemGrad.addColorStop(0.5, 'rgba(255,190,50,0.9)');
    stemGrad.addColorStop(1, 'rgba(255,100,10,0.7)');
    ctx.fillStyle = stemGrad;
    ctx.fillRect(cx - stemW / 2, cy - stemH, stemW, stemH);

    if (mushroomT > 18) {
      const capR = Math.min((mushroomT - 18) * 4.5, 170);
      const capY = cy - stemH;
      const capGrad = ctx.createRadialGradient(cx, capY, 0, cx, capY, capR);
      capGrad.addColorStop(0, 'rgba(255,210,80,0.97)');
      capGrad.addColorStop(0.3, 'rgba(255,100,10,0.88)');
      capGrad.addColorStop(0.6, 'rgba(180,50,10,0.65)');
      capGrad.addColorStop(0.85, 'rgba(80,30,20,0.35)');
      capGrad.addColorStop(1, 'rgba(40,10,5,0)');
      ctx.beginPath();
      ctx.ellipse(cx, capY, capR, capR * 0.52, 0, 0, Math.PI * 2);
      ctx.fillStyle = capGrad;
      ctx.fill();

      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + mushroomT * 0.022;
        const bx = cx + Math.cos(angle) * capR * 0.68;
        const by = capY + Math.sin(angle) * capR * 0.24;
        const br = capR * 0.17;
        const bGrad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
        bGrad.addColorStop(0, 'rgba(255,220,100,0.65)');
        bGrad.addColorStop(1, 'rgba(255,80,0,0)');
        ctx.beginPath();
        ctx.arc(bx, by, br, 0, Math.PI * 2);
        ctx.fillStyle = bGrad;
        ctx.fill();
      }
    }
  }

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    if (p.type === 'fire') {
      const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      pg.addColorStop(0, `hsl(${p.hue},100%,80%)`);
      pg.addColorStop(1, `hsla(${p.hue},100%,40%,0)`);
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = `hsl(${p.hue},60%,40%)`;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  });
}

function drawBomb(x, y) {
  ctx.save();
  ctx.translate(x, y);
  const grad = ctx.createLinearGradient(-12, -35, 12, 35);
  grad.addColorStop(0, '#888');
  grad.addColorStop(0.5, '#ccc');
  grad.addColorStop(1, '#555');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 35, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.beginPath();
  ctx.moveTo(-10, -32);
  ctx.lineTo(0, -52);
  ctx.lineTo(10, -32);
  ctx.fill();
  ctx.fillStyle = '#666';
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.moveTo(side * 10, 15);
    ctx.lineTo(side * 26, 38);
    ctx.lineTo(side * 10, 35);
    ctx.fill();
  });
  ctx.strokeStyle = '#f00';
  ctx.lineWidth = 2;
  [-10, 0, 10].forEach(dy => {
    ctx.beginPath();
    ctx.ellipse(0, dy, 12, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  });
  ctx.restore();
}

function updateText() {
  const el = document.getElementById('text-overlay');
  if (mushroomT > 28 && !textShown) {
    textShown = true;
    let fs = 0, op = 0;
    const grow = setInterval(() => {
      fs = Math.min(fs + 4, 88);
      op = Math.min(op + 0.05, 1);
      el.style.fontSize = fs + 'px';
      el.style.opacity = op;
      if (fs >= 88) clearInterval(grow);
    }, 16);
  }
  if (mushroomT > 0) {
    const stemH = Math.min(mushroomT * 5.5, 260);
    const capY = groundY - stemH;
    el.style.top = Math.max(10, (capY / H) * 100) + '%';
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  if (phase === 'fall') {
    drawBg(false);
    bombY += 3.5 + frame * 0.035;
    if (bombY < groundY - 10) {
      drawBomb(bombX, bombY);
    } else {
      phase = 'explode';
      spawnParticles(bombX, groundY);
      flashAlpha = 1;
      shockwaveR = 10;
    }
  } else {
    explodeT++;
    if (explodeT > 8) mushroomT++;
    drawBg(true);
    drawExplosion(bombX, groundY);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.28;
      p.life -= p.decay;
      p.size *= 0.99;
    });
    particles = particles.filter(p => p.life > 0);
    updateText();
  }

  frame++;
  requestAnimationFrame(loop);
}

img.onload = loop;
img.onerror = loop;
</script>
