<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>rata vs raton</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #111;
  }
  #fairy, #spin {
    position: absolute;
    width: 100px;
    height: 100px;
    background-size: contain;
    background-repeat: no-repeat;
  }
  #fairy {
    right: 50px;
    bottom: 50px;
    background-image: url('fairy.gif');
  }
  #spin {
    left: -100px;
    bottom: 50px;
    background-image: url('spin.gif');
  }
</style>
</head>
<body>
<div id="fairy"></div>
<div id="spin"></div>
<script>
let fairy = document.getElementById('fairy');
let spin = document.getElementById('spin');
let spinMoving = false;
let fairyDefeated = false;
function animateSpin(){
  spinMoving = true;
  let pos = -100;
  let interval = setInterval(()=>{
    pos += 5;
    spin.style.left = pos + 'px';
    let spinRect = spin.getBoundingClientRect();
    let fairyRect = fairy.getBoundingClientRect();
    if(!fairyDefeated && spinRect.right > fairyRect.left && spinRect.left < fairyRect.right && spinRect.bottom > fairyRect.top && spinRect.top < fairyRect.bottom){
      fairyDefeated = true;
      fairy.style.backgroundImage = "url('defeat.gif')";
      let jump = 0;
      let velocity = -15;
      let gravity = 1;
      let fairyPos = fairyRect.top;
      let anim = setInterval(()=>{
        velocity += gravity;
        fairyPos += velocity;
        fairy.style.top = fairyPos + 'px';
        if(fairyPos > window.innerHeight){
          clearInterval(anim);
          fairy.style.display = 'none';
        }
      }, 20);
    }
    if(pos > window.innerWidth){
      clearInterval(interval);
    }
  }, 20);
}
setTimeout(animateSpin, 1000);
</script>
</body>
</html>
