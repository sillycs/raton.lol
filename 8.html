<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F. Torres #8</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow: hidden;
  }

  /* Fondo de estadio con luces */
  .bg-lights {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 30%, rgba(255,180,0,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,100,0,0.10) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 80%, rgba(255,200,50,0.08) 0%, transparent 50%),
                #0a0a0f;
  }

  /* Líneas de campo */
  .field-lines {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 45%;
    background: 
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 80px);
    transform: perspective(600px) rotateX(40deg);
    transform-origin: bottom center;
  }

  /* El gran número 8 de fondo */
  .bg-number {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(320px, 55vw, 520px);
    color: transparent;
    -webkit-text-stroke: 2px rgba(255, 180, 0, 0.08);
    letter-spacing: -20px;
    user-select: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    line-height: 1;
    z-index: 0;
  }

  /* Contenido principal */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    max-width: 900px;
  }

  /* Camiseta */
  .jersey-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 30px;
  }

  .jersey-svg {
    width: clamp(200px, 35vw, 320px);
    filter: drop-shadow(0 20px 60px rgba(255, 180, 0, 0.35));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }

  /* Número sobre la camiseta */
  .jersey-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -44%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    color: #0a0a0f;
    line-height: 1;
    letter-spacing: -2px;
    z-index: 3;
  }

  /* Nombre del jugador */
  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 110px);
    letter-spacing: 10px;
    line-height: 0.9;
    color: #fff;
    text-transform: uppercase;
  }

  .player-name span {
    color: #FFB400;
    display: block;
  }

  /* El número grande abajo */
  .big-eight {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(100px, 25vw, 200px);
    color: #FFB400;
    line-height: 0.85;
    letter-spacing: -5px;
    text-shadow: 0 0 80px rgba(255,180,0,0.5), 0 0 160px rgba(255,120,0,0.25);
    animation: pulse-glow 2.5s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 80px rgba(255,180,0,0.5), 0 0 160px rgba(255,120,0,0.25); }
    50% { text-shadow: 0 0 120px rgba(255,180,0,0.75), 0 0 220px rgba(255,120,0,0.45); }
  }

  /* Línea decorativa */
  .divider {
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #FFB400, transparent);
    margin: 18px auto;
  }

  /* Tagline */
  .tagline {
    font-size: clamp(11px, 2vw, 14px);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 10px;
  }

  /* Stats strip */
  .stats {
    display: flex;
    justify-content: center;
    gap: clamp(24px, 5vw, 60px);
    margin-top: 36px;
    padding: 20px 30px;
    border-top: 1px solid rgba(255,180,0,0.2);
    border-bottom: 1px solid rgba(255,180,0,0.2);
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 46px);
    color: #FFB400;
    display: block;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Badge posición */
  .position-badge {
    display: inline-block;
    background: #FFB400;
    color: #0a0a0f;
    font-weight: 900;
    font-size: 10px;
    letter-spacing: 4px;
    padding: 6px 18px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* Escudo decorativo arriba */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 30px;
    z-index: 5;
  }

  .top-label {
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }

  .corner-dec {
    width: 30px;
    height: 30px;
    border: 1px solid rgba(255,180,0,0.3);
    transform: rotate(45deg);
  }

  /* Partículas / destellos */
  .spark {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #FFB400;
    border-radius: 50%;
    animation: sparkle linear infinite;
  }

  @keyframes sparkle {
    0% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0) translateY(-20px); }
  }
</style>
</head>
<body>
<section class="hero">
  <div class="bg-lights"></div>
  <div class="field-lines"></div>
  <div class="bg-number">8</div>

  <!-- Destellos -->
  <div class="spark" style="top:15%;left:10%;animation-duration:2.1s;animation-delay:0.3s;width:3px;height:3px;"></div>
  <div class="spark" style="top:25%;left:88%;animation-duration:2.7s;animation-delay:1.1s;width:2px;height:2px;"></div>
  <div class="spark" style="top:65%;left:5%;animation-duration:1.9s;animation-delay:0.7s;"></div>
  <div class="spark" style="top:70%;left:92%;animation-duration:2.4s;animation-delay:0.2s;width:3px;height:3px;"></div>
  <div class="spark" style="top:40%;left:95%;animation-duration:3.1s;animation-delay:1.5s;"></div>
  <div class="spark" style="top:85%;left:20%;animation-duration:2.2s;animation-delay:0.9s;width:3px;height:3px;"></div>
  <div class="spark" style="top:10%;left:55%;animation-duration:1.8s;animation-delay:0.5s;width:2px;height:2px;"></div>

  <!-- Barra superior -->
  <div class="top-bar">
    <div class="top-label">Temporada 2025/26</div>
    <div class="corner-dec"></div>
    <div class="top-label">El Elegido</div>
  </div>

  <!-- Contenido -->
  <div class="content">

    <div class="position-badge">Mediocampista ✦ El 8</div>

    <!-- Camiseta SVG -->
    <div class="jersey-wrap">
      <svg class="jersey-svg" viewBox="0 0 300 280" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Sombra camiseta -->
        <ellipse cx="150" cy="272" rx="80" ry="8" fill="rgba(0,0,0,0.4)"/>
        <!-- Cuerpo de la camiseta -->
        <path d="M60 70 L30 110 L70 120 L70 260 L230 260 L230 120 L270 110 L240 70 L210 85 C210 85 185 100 150 100 C115 100 90 85 90 85 Z" fill="#FFB400"/>
        <!-- Mangas -->
        <path d="M60 70 L30 110 L70 120 L90 85 Z" fill="#e6a200"/>
        <path d="M240 70 L270 110 L230 120 L210 85 Z" fill="#e6a200"/>
        <!-- Cuello -->
        <path d="M130 70 Q150 90 170 70" stroke="#0a0a0f" stroke-width="3" fill="none"/>
        <!-- Líneas decorativas en camiseta -->
        <line x1="70" y1="140" x2="230" y2="140" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <line x1="70" y1="180" x2="230" y2="180" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
        <!-- Contorno -->
        <path d="M60 70 L30 110 L70 120 L70 260 L230 260 L230 120 L270 110 L240 70 L210 85 C210 85 185 100 150 100 C115 100 90 85 90 85 Z" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
      </svg>
      <div class="jersey-number">8</div>
    </div>

    <!-- Nombre -->
    <div class="player-name">
      F.<span>Torres</span>
    </div>

    <div class="divider"></div>

    <!-- Número grande -->
    <div class="big-eight">8</div>

    <p class="tagline">El número que define una era</p>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-value">8</span>
        <span class="stat-label">Número</span>
      </div>
      <div class="stat">
        <span class="stat-value">1</span>
        <span class="stat-label">Leyenda</span>
      </div>
      <div class="stat">
        <span class="stat-value">∞</span>
        <span class="stat-label">Pasión</span>
      </div>
    </div>

  </div>
</section>
</body>
</html>
