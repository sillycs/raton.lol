<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
}

canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

#num {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(120px, 22vw, 280px);
  color: #111318;
  letter-spacing: -.02em;
  user-select: none;
  z-index: 20;
  cursor: pointer;
  transition: opacity .2s;
}

#num.hidden {
  opacity: 0;
  pointer-events: none;
}

#pfp {
  position: fixed;
  border-radius: 50%;
  object-fit: cover;
  pointer-events: none;
  z-index: 10;
  transform: translate(-50%,-50%);
  transition: box-shadow .15s;
}

.particle {
  position: fixed;
  pointer-events: none;
  z-index: 30;
}

#explode-gif {
  position: fixed;
  pointer-events: none;
  z-index: 50;
  display: none;
  transform: translate(-50%, -50%);
  width: clamp(240px, 40vw, 520px);
  height: auto;
}


</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="num">404</div>
<img id="pfp" src="pfp.jpg" alt=""/>
<img id="explode-gif" src="explode.gif" alt=""/>
<audio id="explode-snd" src="explode.mp3" preload="auto"></audio>

<script>
const pfp        = document.getElementById('pfp');
const cvs        = document.getElementById('c');
const ctx        = cvs.getContext('2d');
const numEl      = document.getElementById('num');
const explodeEl  = document.getElementById('explode-gif');
const explodeSnd = document.getElementById('explode-snd');

let W = cvs.width  = window.innerWidth;
let H = cvs.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
});

const R = Math.min(W, H) * .1;
pfp.style.width  = R * 2 + 'px';
pfp.style.height = R * 2 + 'px';

let bx = W/2, by = H/2;
let vx = 0,   vy = 0;
let mx = -999, my = -999;
let dragging = false;
let lastMx = 0, lastMy = 0;
let throwVx = 0, throwVy = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  if (dragging) {
    throwVx = mx - lastMx;
    throwVy = my - lastMy;
    bx = mx; by = my;
    vx = 0; vy = 0;
  }
  lastMx = mx; lastMy = my;
});

document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
  if (dragging) {
    throwVx = mx - lastMx;
    throwVy = my - lastMy;
    bx = mx; by = my;
    vx = 0; vy = 0;
  }
  lastMx = mx; lastMy = my;
}, { passive:true });

document.addEventListener('mouseleave', () => { mx = -999; my = -999; });

document.addEventListener('mousedown', e => {
  const dx = e.clientX - bx, dy = e.clientY - by;
  if (Math.hypot(dx, dy) < R + 20) {
    dragging = true;
    throwVx = 0; throwVy = 0;
    lastMx = e.clientX; lastMy = e.clientY;
  }
});

document.addEventListener('mouseup', () => {
  if (dragging) {
    vx = throwVx * 1.1;
    vy = throwVy * 1.1;
    dragging = false;
  }
});

document.addEventListener('touchstart', e => {
  const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
  if (Math.hypot(tx - bx, ty - by) < R + 20) {
    dragging = true;
    throwVx = 0; throwVy = 0;
    lastMx = tx; lastMy = ty;
  }
}, { passive:true });

document.addEventListener('touchend', () => {
  if (dragging) {
    vx = throwVx * 1.1;
    vy = throwVy * 1.1;
    dragging = false;
  }
});

const trail = [];
const REPEL_DIST = Math.min(W, H) * .22;

function loop() {
  if (!dragging) {
    const dx = bx - mx, dy = by - my;
    const dist = Math.hypot(dx, dy);
    if (dist < REPEL_DIST && dist > 1) {
      const f = 2.2 * Math.pow(1 - dist / REPEL_DIST, 2);
      vx += (dx/dist)*f;
      vy += (dy/dist)*f;
    }
    vx *= 0.91;
    vy *= 0.91;
    bx += vx; by += vy;
    const pad = R + 4;
    if (bx < pad)   { bx = pad;   vx =  Math.abs(vx) * .55; }
    if (bx > W-pad) { bx = W-pad; vx = -Math.abs(vx) * .55; }
    if (by < pad)   { by = pad;   vy =  Math.abs(vy) * .55; }
    if (by > H-pad) { by = H-pad; vy = -Math.abs(vy) * .55; }
  }

  trail.push({ x:bx, y:by, spd: Math.hypot(vx,vy) });
  if (trail.length > 32) trail.shift();

  ctx.clearRect(0, 0, W, H);

  for (let i = 1; i < trail.length; i++) {
    const p = i / trail.length;
    const spd = Math.min(trail[i].spd / 18, 1);
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x,   trail[i].y);
    ctx.strokeStyle = `rgba(17,19,24,${p*p*.12*(0.2+spd)})`;
    ctx.lineWidth = p * R * .16;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  const dx2 = bx - mx, dy2 = by - my;
  const dist2 = Math.hypot(dx2, dy2);
  if (dist2 < REPEL_DIST && dist2 > 1 && !dragging) {
    const a = 1 - dist2 / REPEL_DIST;
    ctx.beginPath();
    ctx.arc(bx, by, R + 10 + a*20, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,80,80,${a*.18})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.save();
    ctx.setLineDash([4,8]);
    ctx.beginPath();
    ctx.moveTo(mx, my);
    ctx.lineTo(bx, by);
    ctx.strokeStyle = `rgba(255,80,80,${a*.2})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  pfp.style.left = bx + 'px';
  pfp.style.top  = by + 'px';

  const spd = Math.hypot(vx, vy);
  const sc = 1 - Math.min(spd/60, 1) * .08;
  pfp.style.transform = `translate(-50%,-50%) scale(${sc})`;
  pfp.style.boxShadow = spd > 2 ? `0 0 ${Math.min(spd*2,30)}px rgba(0,0,0,.12)` : '';

  requestAnimationFrame(loop);
}
loop();

let exploded = false;

numEl.addEventListener('click', () => {
  if (exploded) return;
  exploded = true;

  numEl.classList.add('hidden');

  explodeSnd.currentTime = 0;
  explodeSnd.play().catch(() => {});

  const colors = ['#ff5050','#ff9900','#ffee00','#111318','#ff3399','#00cfff'];
  const cx = W / 2, cy = H / 2;

  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = 4 + Math.random() * 10;
    el.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${cx}px;top:${cy}px;position:fixed;
      border-radius:${Math.random()>.5?'50%':'2px'};
    `;
    document.body.appendChild(el);

    const angle = Math.random() * Math.PI * 2;
    const speed = 6 + Math.random() * 18;
    let pvxc = Math.cos(angle)*speed, pvyc = Math.sin(angle)*speed;
    let px = cx, py = cy;
    const life = 600 + Math.random()*600;
    const start = performance.now();

    (function animP(now) {
      const t = now - start;
      if (t > life) { el.remove(); return; }
      pvyc += .4; pvxc *= .97; pvyc *= .97;
      px += pvxc; py += pvyc;
      el.style.left    = px + 'px';
      el.style.top     = py + 'px';
      el.style.opacity = 1 - t/life;
      requestAnimationFrame(animP);
    })(performance.now());
  }

  explodeEl.style.left    = cx + 'px';
  explodeEl.style.top     = cy + 'px';
  explodeEl.style.display = 'block';
  explodeEl.src = 'explode.gif?' + Date.now();

  setTimeout(() => {
    explodeEl.style.transition = 'opacity .4s';
    explodeEl.style.opacity = '0';
    setTimeout(() => {
      explodeEl.style.display = 'none';
      explodeEl.style.opacity = '1';
      explodeEl.style.transition = '';
    }, 400);
  }, 2200);
});

const URL_  = 'https://raton.lol/cool.gif';
const WIN_W = 320, WIN_H = 320;
let uid = 0;
const popups = [];

function makePopup() {
  const sw = screen.width, sh = screen.height;
  const x = Math.random() * (sw - WIN_W) | 0;
  const y = Math.random() * (sh - WIN_H) | 0;
  const feat = `width=${WIN_W},height=${WIN_H},left=${x},top=${y},toolbar=no,scrollbars=no,resizable=no,menubar=no,location=no`;
  const w = window.open(URL_, `p${uid++}`, feat);
  if (!w) return;
  const speed = 4 + Math.random() * 5;
  const angle = Math.random() * Math.PI * 2;
  popups.push({ win:w, x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed });
}

setTimeout(makePopup, 400);

setInterval(() => {
  const sw = screen.width, sh = screen.height;
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    if (!p.win || p.win.closed) {
      popups.splice(i, 1);
      makePopup(); makePopup();
      continue;
    }
    p.x += p.vx; p.y += p.vy;
    if (p.x <= 0)          { p.x = 0;          p.vx =  Math.abs(p.vx); }
    if (p.x >= sw - WIN_W) { p.x = sw - WIN_W; p.vx = -Math.abs(p.vx); }
    if (p.y <= 0)          { p.y = 0;          p.vy =  Math.abs(p.vy); }
    if (p.y >= sh - WIN_H) { p.y = sh - WIN_H; p.vy = -Math.abs(p.vy); }
    try { p.win.moveTo(Math.round(p.x), Math.round(p.y)); } catch(_) {}
  }
}, 16);
</script>
</body>
</html>
