<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Raton — Giveaway</title>
<link rel="icon" href="RATA.png"/>

<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Raton Giveaways"/>
<meta property="og:title" content="🎁 Giveaway"/>
<meta property="og:description" content="A free giveaway is here, click to enter and check your win chances :)"/>
<meta property="og:image" content="https://steep-sun-85c4.sillykuadro.workers.dev/og-image"/>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:sans-serif;
}

.page{
    width:100%;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    gap:16px;
    padding:20px;
}

.banner{
    width:100%;
    display:flex;
    justify-content:center;
    padding:10px;
}

.banner-inner{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.card{
    display:flex;
    flex-direction:column;
    gap:20px;
    border:1px solid #ccc;
    padding:20px;
}

.kicker{
    display:flex;
    align-items:center;
    gap:8px;
}

.prize-row{
    display:flex;
    gap:14px;
    align-items:flex-start;
}

.prize-icon{
    width:52px;
    height:52px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #ccc;
}

.prize-info{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.cd-wrap{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.cd-units{
    display:flex;
    gap:8px;
    align-items:center;
}

.cd-unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
}

.cd-num-wrap{
    width:52px;
    height:52px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #ccc;
}

.entries-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.e-pill{
    display:flex;
    align-items:center;
    gap:6px;
}

.input-wrap{
    width:100%;
}

.input{
    width:100%;
    padding:12px;
}

.btn-wrap{
    width:100%;
}

.plan-cta{
    width:100%;
    padding:14px;
    cursor:pointer;
}

.status{
    min-height:20px;
}

.loader{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding:60px 20px;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    border:1px solid #ccc;
    padding:10px 16px;
    display:none;
}

.toast.show{
    display:block;
}

.winner-box{
    display:flex;
    flex-direction:column;
    gap:6px;
    border:1px solid #ccc;
    padding:16px;
}

.mention{
    display:inline-flex;
    align-items:center;
    gap:4px;
}
</style>
</head>
<body>

<div class="page">
    <div class="container">
        <div id="root">
            <div class="loader">
                <div>loading giveaway...</div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://steep-sun-85c4.sillykuadro.workers.dev';

const toast = document.getElementById('toast');

function showToast(t) {
    toast.textContent = t;
    toast.classList.add('show');

    clearTimeout(showToast._t);

    showToast._t = setTimeout(() => {
        toast.classList.remove('show');
    }, 1800);
}

function parseMentions(text) {
    if (!text) return '';

    const escaped = text
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');

    return escaped.replace(/@([\w.\-]{2,32})/g, (_, name) =>
        `<span class="mention">@${name}</span>`
    );
}

function pad(n) {
    return String(n).padStart(2, '0');
}

function countdown(endsAt) {
    const d = endsAt - Date.now();

    if (d <= 0) return null;

    return {
        d: Math.floor(d / 86400000),
        h: Math.floor(d % 86400000 / 3600000),
        m: Math.floor(d % 3600000 / 60000),
        s: Math.floor(d % 60000 / 1000)
    };
}

function flipNum(id, val) {
    const el = document.getElementById(id);

    if (!el) return;

    el.textContent = pad(val);
}

function fmtRelative(ts) {
    if (!ts) return '';

    const diff = ts - Date.now();

    if (diff <= 0) return 'Ended';

    const d = Math.floor(diff / 86400000);
    const h = Math.floor(diff % 86400000 / 3600000);

    if (d > 0) return `${d}d ${h}h left`;

    const m = Math.floor(diff % 3600000 / 60000);

    if (h > 0) return `${h}h ${m}m left`;

    return `${m}m left`;
}

function setStatus(msg, type = '') {
    const el = document.getElementById('st');

    if (!el) return;

    el.textContent = msg;
    el.className = 'status';
}

function patchOG(g, ended, hasWon) {
    const titleText = `${g.emoji} ${g.title} giveaway`;

    const descParts = [
        g.description || 'A free giveaway is here',
        `${g.entryCount} participant${g.entryCount!==1?'s':''}.`,
        hasWon
            ? `Winner: ${g.winner}`
            : ended
                ? 'Giveaway closed.'
                : (fmtRelative(g.endsAt) || 'Ends soon.')
    ];

    document.title = titleText;

    document.querySelector('meta[property="og:title"]')
        ?.setAttribute('content', titleText);

    document.querySelector('meta[property="og:description"]')
        ?.setAttribute('content', descParts.join(' '));
}

const ID = new URLSearchParams(location.search).get('id');

const JOINED_KEY = `raton_joined_${ID}`;

async function render() {

    const root = document.getElementById('root');

    if (!ID) {
        root.innerHTML = notFound(
            'Raton Giveaways',
            'No giveaway ID in the URL.'
        );
        return;
    }

    const res = await fetch(
        `${WORKER}/giveaway?id=${encodeURIComponent(ID)}`
    ).catch(() => null);

    if (!res?.ok) {
        root.innerHTML = notFound(
            'Giveaway not found',
            'Check the link or contact the host.'
        );
        return;
    }

    const { giveaway: g } = await res.json();

    const ended  = !g.active || (g.endsAt && Date.now() > g.endsAt);
    const hasWon = !!g.winner;
    const joined = !!localStorage.getItem(JOINED_KEY);

    patchOG(g, ended, hasWon);

    const descHtml = g.description
        ? `<div>${parseMentions(g.description)}</div>`
        : '';

    root.innerHTML = `
    <div class="card">

        <div class="kicker">
            <span>●</span>
            <span>Raton Giveaway</span>
        </div>

        <div>
            <h1>
                Free ${g.title}
            </h1>
        </div>

        <div class="prize-row">
            <div class="prize-icon">
                ${g.emoji}
            </div>

            <div class="prize-info">
                <div>Prize</div>
                <div>${g.title}</div>
                ${descHtml}
            </div>
        </div>

        ${hasWon ? `
        <div class="winner-box">
            <div>🏆</div>
            <div>Winner Announced</div>
            <div>${g.winner}</div>
        </div>
        ` : ''}

        ${!ended ? `
        <div class="cd-wrap">

            <div>Ends in</div>

            <div class="cd-units">

                <div class="cd-unit">
                    <div class="cd-num-wrap">
                        <div id="cdd">00</div>
                    </div>
                    <div>days</div>
                </div>

                <div>:</div>

                <div class="cd-unit">
                    <div class="cd-num-wrap">
                        <div id="cdh">00</div>
                    </div>
                    <div>hrs</div>
                </div>

                <div>:</div>

                <div class="cd-unit">
                    <div class="cd-num-wrap">
                        <div id="cdm">00</div>
                    </div>
                    <div>min</div>
                </div>

                <div>:</div>

                <div class="cd-unit">
                    <div class="cd-num-wrap">
                        <div id="cds">00</div>
                    </div>
                    <div>sec</div>
                </div>

            </div>

        </div>
        ` : ''}

        <div class="entries-row">

            <div class="e-pill">
                <span>●</span>

                <span id="ec">
                    ${g.entryCount}
                </span>

                <span>
                    participant${g.entryCount !== 1 ? 's' : ''}
                </span>
            </div>

            <div id="ech">
                ${g.entryCount > 0
                    ? ((1/g.entryCount)*100).toFixed(1) + '% win chance'
                    : 'be the first in'}
            </div>

        </div>

        ${!ended && !hasWon ? `

        <div class="input-wrap">
            <input
                class="input"
                id="un"
                type="text"
                maxlength="32"
                placeholder="your discord username"
                autocomplete="off"
                spellcheck="false"
            />
        </div>

        <div class="btn-wrap">
            <button
                class="plan-cta"
                id="jb"
                ${joined ? 'disabled' : ''}
            >
                ${joined
                    ? 'Already joined'
                    : 'Join giveaway →'}
            </button>
        </div>

        <div class="status" id="st"></div>

        ` : `

        <div class="status">
            ${hasWon
                ? 'Congrats to the winner :)'
                : 'Giveaway closed by an administrator'}
        </div>

        `}

    </div>
    `;

    if (!ended && !hasWon && g.endsAt) {

        const tick = () => {

            const cd = countdown(g.endsAt);

            if (!cd) return;

            flipNum('cdd', cd.d);
            flipNum('cdh', cd.h);
            flipNum('cdm', cd.m);
            flipNum('cds', cd.s);
        };

        tick();

        setInterval(tick, 1000);
    }

    const jb = document.getElementById('jb');

    if (jb && !joined) {

        jb.addEventListener('click', async () => {

            const un = document.getElementById('un').value.trim();

            if (!un) {
                setStatus('enter your discord username');
                return;
            }

            if (un.length < 2) {
                setStatus('username too short...');
                return;
            }

            jb.disabled = true;
            jb.innerHTML = 'Joining…';

            setStatus('');

            try {

                const r = await fetch(`${WORKER}/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        giveawayId: ID,
                        username: un
                    })
                });

                const d = await r.json();

                if (d.ok) {

                    jb.innerHTML = 'Joined';

                    setStatus("you're in! good luck :3");

                    localStorage.setItem(JOINED_KEY, '1');

                    document.getElementById('ec').textContent = d.count;

                    document.getElementById('ech').textContent =
                        ((1/d.count)*100).toFixed(1) + '% win chance';

                } else {

                    jb.disabled = false;

                    jb.innerHTML = 'Join giveaway →';

                    setStatus(d.error || 'something went wrong...');
                }

            } catch {

                jb.disabled = false;

                jb.innerHTML = 'Join giveaway →';

                setStatus('network error. try again.');
            }

        });

    }

}

function notFound(h, p) {

    return `
    <div class="card">

        <h1>${h}</h1>

        <div>
            ${p}
        </div>

    </div>
    `;
}

render();
</script>

</body>
</html>
